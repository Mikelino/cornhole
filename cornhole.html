<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Cornhole Scorekeeper</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="firebase-config.js?v=4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#0a0a0a;color:#fff;font-family:'Barlow Condensed',sans-serif;min-height:100vh;overscroll-behavior:none;}
    input,button,select{outline:none;font-family:'Barlow Condensed',sans-serif;}
    @keyframes winner-in{from{transform:translateY(60px) scale(.9);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
    @keyframes trophy-bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-14px)}70%{transform:translateY(-8px)}}
    @keyframes last-round-pulse{0%,100%{opacity:1}50%{opacity:.6}}
    @keyframes flip-top{0%{transform:rotateX(0deg)}100%{transform:rotateX(-90deg)}}
    @keyframes flip-bot{0%{transform:rotateX(90deg)}100%{transform:rotateX(0deg)}}
    @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  </style>
</head>
<body>
<div id="root" style="max-width:520px;margin:0 auto;padding-bottom:40px;"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
// Init Firebase compat
const app = firebase.initializeApp(FIREBASE_CONFIG);
const db  = firebase.database();
const F   = "'Barlow Condensed', sans-serif";
const $   = id => document.getElementById(id);
const uid = () => Math.random().toString(36).slice(2,9);
const baseUrl = () => window.location.href.replace(/[^/]*$/, "");

const COLORS = [
  {bg:"linear-gradient(145deg,#7f0000,#e63946)",s:"#e63946"},
  {bg:"linear-gradient(145deg,#0d47a1,#1d6fa4)",s:"#1d6fa4"},
  {bg:"linear-gradient(145deg,#1b5e20,#2e7d32)",s:"#2e7d32"},
  {bg:"linear-gradient(145deg,#4a148c,#7b1fa2)",s:"#7b1fa2"},
  {bg:"linear-gradient(145deg,#e65100,#f77f00)",s:"#f77f00"},
  {bg:"linear-gradient(145deg,#006064,#00838f)",s:"#00838f"},
];
const GHOST = [{label:"Easy",min:0,max:3},{label:"Medium",min:2,max:6},{label:"Hard",min:4,max:9},{label:"Pro",min:6,max:12}];

let tournoi = null;
let tournoiId = localStorage.getItem("cornhole_admin_id") || null;
let sk = {
  cfg:{
    teamA:{name:"Red Team",colorIdx:0,players:["",""],photo:null},
    teamB:{name:"Blue Team",colorIdx:1,players:["",""],photo:null},
    playersPerTeam:1, gameMode:"standard",
    winScore:21, useWinScore:true,
    maxRounds:null, useMaxRounds:false,
    ghostMode:false, ghostDiff:1, tournamentName:"",
  },
  game:{scores:{a:0,b:0},round:1,history:[],winner:null,entry:{a:{hole:0,board:0},b:{hole:0,board:0}}},
  showScore:false, showStats:false,
};
window.sk = sk;

// ACL Cancellation scoring — règle par défaut
function calcManche(eA, eB) {
  const rawA=eA.hole*3+eA.board, rawB=eB.hole*3+eB.board;
  const d=rawA-rawB;
  return {ptsA:Math.max(0,d), ptsB:Math.max(0,-d), rawA, rawB};
}

// === FLIP COUNTER ===
function flipHTML(value, color, size, id) {
  size = size||60; id = id||"";
  var digits = String(Math.abs(Math.round(value))).padStart(2,"0").split("");
  var fs=Math.round(size*.66), w=Math.round(size*.76);
  return '<div style="display:inline-flex;gap:3px;">'+
    digits.map(function(d,i){
      var eid = id ? 'id="fd-'+id+'-'+i+'"' : '';
      return '<div '+eid+' data-val="'+d+'" style="position:relative;width:'+w+'px;height:'+size+'px;font-size:'+fs+'px;font-family:'+F+';font-weight:900;">'+
        '<div class="fd-top" style="position:absolute;top:0;left:0;right:0;height:50%;overflow:hidden;background:#252525;border-radius:8px 8px 0 0;display:flex;align-items:flex-end;justify-content:center;border-bottom:1.5px solid #111;"><span style="color:'+color+';transform:translateY(50%);display:block;line-height:1;">'+d+'</span></div>'+
        '<div class="fd-bot" style="position:absolute;bottom:0;left:0;right:0;height:50%;overflow:hidden;background:#1e1e1e;border-radius:0 0 8px 8px;display:flex;align-items:flex-start;justify-content:center;"><span style="color:'+color+';transform:translateY(-50%);display:block;line-height:1;">'+d+'</span></div>'+
        '<div class="fd-fold" style="position:absolute;top:0;left:0;right:0;height:50%;overflow:hidden;background:#252525;border-radius:8px 8px 0 0;display:flex;align-items:flex-end;justify-content:center;transform-origin:bottom center;z-index:2;backface-visibility:hidden;"><span style="color:'+color+';transform:translateY(50%);display:block;line-height:1;">'+d+'</span></div>'+
        '<div class="fd-unfold" style="position:absolute;bottom:0;left:0;right:0;height:50%;overflow:hidden;background:#1e1e1e;border-radius:0 0 8px 8px;display:flex;align-items:flex-start;justify-content:center;transform-origin:top center;z-index:2;transform:rotateX(90deg);backface-visibility:hidden;"><span style="color:'+color+';transform:translateY(-50%);display:block;line-height:1;">'+d+'</span></div>'+
      '</div>';
    }).join('')+
  '</div>';
}

function flipDigitTo(el, newVal) {
  if(!el) return;
  var cur=el.dataset.val; if(cur===String(newVal)) return;
  var fold=el.querySelector(".fd-fold"), unfold=el.querySelector(".fd-unfold");
  fold.querySelector("span").textContent=cur;
  unfold.querySelector("span").textContent=newVal;
  el.dataset.val=String(newVal);
  fold.style.animation=unfold.style.animation="none";
  void fold.offsetWidth;
  fold.style.animation="flip-top .2s ease-in forwards";
  unfold.style.animation="flip-bot .2s ease-out .18s forwards";
  setTimeout(function(){
    el.querySelector(".fd-top span").textContent=newVal;
    el.querySelector(".fd-bot span").textContent=newVal;
    fold.style.animation=unfold.style.animation="none";
    fold.querySelector("span").textContent=newVal;
  },450);
}

function flipTo(id, val) {
  String(Math.abs(Math.round(val))).padStart(2,"0").split("").forEach(function(d,i){
    flipDigitTo(document.getElementById("fd-"+id+"-"+i), d);
  });
}

// === ACCUEIL ===
function renderHome() {
  $("root").innerHTML =
    '<div style="padding:28px 18px 0;">'+
      '<div style="font-size:10px;letter-spacing:3px;color:#555;">CORNHOLE</div>'+
      '<div style="font-size:32px;font-weight:900;margin-bottom:28px;">SCOREKEEPER</div>'+
    '</div>'+
    '<div style="padding:0 18px;">'+
      card("goSK()", "📱", "Scorekeeper", "Match local · Sans Firebase · 1v1 ou 2v2 · Stats · Ghost", "#f4a100")+
      card("goTournoi()", "🏆", "Tournoi Live", "Firebase · Inscriptions · Multi-terrains · QR unique · TV", "#1d6fa4")+
      (tournoiId ?
        '<div style="margin-top:12px;background:#0d0d0d;border-radius:11px;padding:11px 14px;border:1px solid #1a1a1a;display:flex;justify-content:space-between;align-items:center;">'+
          '<div style="font-size:12px;color:#555;">Tournoi en cours</div>'+
          '<button onclick="reprendreTournoi()" style="padding:6px 14px;border-radius:8px;background:#1a1a1a;border:1px solid #2a2a2a;color:#f4a100;font-size:13px;font-weight:700;cursor:pointer;">Reprendre</button>'+
        '</div>' : "")+
    '</div>';
}

function card(fn, icon, title, desc, hoverColor) {
  return '<div onclick="'+fn+'" style="background:#111;border-radius:18px;padding:22px;margin-bottom:12px;border:1px solid #1e1e1e;cursor:pointer;" '+
    'onmouseover="this.style.borderColor=\''+hoverColor+'\'" onmouseout="this.style.borderColor=\'#1e1e1e\'">'+
    '<div style="display:flex;align-items:center;gap:14px;">'+
      '<div style="font-size:40px;">'+icon+'</div>'+
      '<div><div style="font-size:22px;font-weight:900;">'+title+'</div>'+
      '<div style="font-size:12px;color:#555;margin-top:3px;">'+desc+'</div></div>'+
      '<div style="margin-left:auto;color:#333;font-size:22px;">▶</div>'+
    '</div></div>';
}

function backBtn(fn) {
  return '<button onclick="'+fn+'()" style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:9px;padding:6px 12px;color:#aaa;font-size:12px;font-weight:700;cursor:pointer;">◀ Menu</button>';
}

function toggle(on, fn) {
  return '<div onclick="'+fn+'()" style="width:44px;height:24px;border-radius:12px;background:'+(on?"#f4a100":"#333")+';position:relative;cursor:pointer;flex-shrink:0;">'+
    '<div style="position:absolute;top:3px;left:'+(on?22:2)+'px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;"></div>'+
  '</div>';
}

window.goSK = function() { renderSKSetup(); };
window.goTournoi = function() { renderSetupTournoi(); };
window.reprendreTournoi = function() { loadTournoi(); };
window.renderHome = renderHome;

// === SCOREKEEPER SETUP ===
function renderSKSetup() {
  var c=sk.cfg, n=c.playersPerTeam;
  var mxOpts=[4,6,8,10,12,14].filter(function(r){return r%n===0;});
  var html='<div style="padding:18px 18px 0;display:flex;align-items:center;gap:10px;margin-bottom:6px;">'+backBtn("renderHome")+
    '<div><div style="font-size:10px;letter-spacing:3px;color:#555;">SCOREKEEPER</div><div style="font-size:22px;font-weight:900;">CONFIGURATION</div></div></div>'+
    '<div style="padding:0 18px 24px;">';

  // Nom événement
  html+='<div style="font-size:10px;letter-spacing:2px;color:#555;margin:16px 0 7px;">NOM DE L\'ÉVÉNEMENT</div>'+
    '<input value="'+c.tournamentName+'" oninput="sk.cfg.tournamentName=this.value" placeholder="Ex: Open Cornhole 2025" '+
    'style="width:100%;background:#111;border:1px solid #2a2a2a;border-radius:11px;padding:12px 14px;color:#fff;font-size:17px;font-weight:700;"/>';

  // Format
  html+='<div style="font-size:10px;letter-spacing:2px;color:#555;margin:16px 0 7px;">FORMAT</div>'+
    '<div style="display:flex;gap:10px;margin-bottom:4px;">'+
    [1,2].map(function(v){
      var sel=n===v;
      return '<button onclick="setSKPPT('+v+')" style="flex:1;padding:14px 0;border-radius:13px;background:'+(sel?"#fff":"#1a1a1a")+';border:'+(sel?"2px solid #fff":"2px solid #2a2a2a")+';color:'+(sel?"#000":"#888")+';font-size:22px;font-weight:900;cursor:pointer;line-height:1;">'+v+'v'+v+'<div style="font-size:11px;font-weight:600;margin-top:3px;opacity:.6;">'+(v===1?"Solo":"Duo")+'</div></button>';
    }).join('')+'</div>';

  // Équipes
  html+='<div style="font-size:10px;letter-spacing:2px;color:#555;margin:16px 0 7px;">ÉQUIPES</div>';
  ["teamA","teamB"].forEach(function(key,ki){
    var eq=c[key], cl=COLORS[eq.colorIdx];
    html+='<div style="background:#111;border-radius:13px;padding:13px;margin-bottom:9px;border:1px solid #1e1e1e;">'+
      '<div style="font-size:11px;color:#555;margin-bottom:7px;">Équipe '+(ki===0?"A":"B")+'</div>'+
      '<div style="display:flex;gap:9px;align-items:center;margin-bottom:9px;">'+
        '<div style="position:relative;flex-shrink:0;">'+
          '<div style="width:50px;height:50px;border-radius:10px;background:'+(eq.photo?"transparent":"#1a1a1a")+';border:2px dashed '+(eq.photo?cl.s:"#333")+';overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;">'+
            (eq.photo?'<img src="'+eq.photo+'" style="width:100%;height:100%;object-fit:cover;"/>'  :'<span style="font-size:20px;">📷</span>')+
          '</div>'+
          '<input type="file" accept="image/*" onchange="setSKPhoto(\''+key+'\',this)" style="position:absolute;inset:0;opacity:0;cursor:pointer;"/>'+
          (eq.photo?'<div onclick="clearSKPhoto(\''+key+'\')" style="position:absolute;top:-5px;right:-5px;width:17px;height:17px;border-radius:50%;background:#e63946;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:900;">✕</div>':"")  +
        '</div>'+
        '<input value="'+eq.name+'" oninput="sk.cfg.'+key+'.name=this.value" placeholder="Équipe '+(ki===0?"A":"B")+'" style="flex:1;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:9px;padding:10px 11px;color:#fff;font-size:15px;font-weight:700;"/>'+
      '</div>'+
      (n===2?'<div style="display:flex;gap:7px;margin-bottom:9px;"><input value="'+(eq.players[0]||"")+'" oninput="sk.cfg.'+key+'.players[0]=this.value" placeholder="Joueur 1" style="flex:1;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:7px;padding:8px 10px;color:#aaa;font-size:13px;"/><input value="'+(eq.players[1]||"")+'" oninput="sk.cfg.'+key+'.players[1]=this.value" placeholder="Joueur 2" style="flex:1;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:7px;padding:8px 10px;color:#aaa;font-size:13px;"/></div>'
       :n===1?'<div style="margin-bottom:9px;"><input value="'+(eq.players[0]||"")+'" oninput="sk.cfg.'+key+'.players[0]=this.value" placeholder="Nom du joueur" style="width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:7px;padding:8px 10px;color:#aaa;font-size:13px;"/></div>':"")  +
      '<div style="display:flex;gap:5px;flex-wrap:wrap;">'+
        COLORS.map(function(cl2,ci){
          return '<div onclick="setSKColor(\''+key+'\','+ci+')" style="width:26px;height:26px;border-radius:50%;background:'+cl2.s+';cursor:pointer;border:'+(eq.colorIdx===ci?"2px solid #fff":"2px solid transparent")+';box-shadow:'+(eq.colorIdx===ci?"0 0 8px "+cl2.s:"none")+'"></div>';
        }).join('')+
      '</div></div>';
  });

  // Règlement
  html+='<div style="font-size:10px;letter-spacing:2px;color:#555;margin:16px 0 7px;">RÈGLEMENT</div>';

  // Score cible
  html+='<div style="background:#111;border-radius:12px;padding:13px;margin-bottom:9px;border:1px solid #1e1e1e;">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:'+(c.useWinScore?"10px":"0")+';">'+
      '<div><div style="font-size:14px;font-weight:700;">Score cible</div><div style="font-size:11px;color:#555;margin-top:2px;">Premier à atteindre ce score</div></div>'+
      toggle(c.useWinScore,"toggleSKWinScore")+
    '</div>'+
    (c.useWinScore?'<div style="display:flex;gap:7px;">'+ [11,15,21,25].map(function(w){var s=c.winScore===w;return '<button onclick="setSKWinScore('+w+')" style="flex:1;padding:10px 0;border-radius:11px;background:'+(s?"#fff":"#1a1a1a")+';border:'+(s?"2px solid #fff":"2px solid #2a2a2a")+';color:'+(s?"#000":"#888")+';font-size:17px;font-weight:800;cursor:pointer;">'+w+'</button>';}).join('')+'</div>':"")+
  '</div>';

  // Max manches
  html+='<div style="background:#111;border-radius:12px;padding:13px;margin-bottom:9px;border:1px solid #1e1e1e;">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:'+(c.useMaxRounds?"10px":"0")+';">'+
      '<div><div style="font-size:14px;font-weight:700;">Max manches</div><div style="font-size:11px;color:#555;margin-top:2px;">'+(c.useMaxRounds&&c.maxRounds?"⚠️ Dernière manche affichée":"Arrêt après X manches")+'</div></div>'+
      '<div onclick="toggleSKMaxRounds()" style="width:44px;height:24px;border-radius:12px;background:'+(c.useMaxRounds?"#1d6fa4":"#333")+';position:relative;cursor:pointer;flex-shrink:0;"><div style="position:absolute;top:3px;left:'+(c.useMaxRounds?22:2)+'px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;"></div></div>'+
    '</div>'+
    (c.useMaxRounds?'<div style="display:flex;gap:6px;flex-wrap:wrap;">'+ mxOpts.map(function(r){var s=c.maxRounds===r;return '<button onclick="setSKMaxRounds('+r+')" style="flex:1;min-width:40px;padding:8px 0;border-radius:10px;background:'+(s?"#1d6fa4":"#1a1a1a")+';border:'+(s?"2px solid #1d6fa4":"2px solid #2a2a2a")+';color:'+(s?"#fff":"#888")+';font-size:14px;font-weight:800;cursor:pointer;line-height:1;">'+r+'<div style="font-size:9px;opacity:.6;margin-top:2px;">'+(r/n)+'×/j</div></button>';}).join('')+'</div>':"")+
  '</div>';

  // Bust
  html+='<div onclick="toggleSKBust()" style="background:#111;border-radius:12px;padding:13px;margin-bottom:9px;border:1px solid #1e1e1e;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">'+
    '<div><div style="font-size:14px;font-weight:700;">Mode Bust</div><div style="font-size:11px;color:#555;margin-top:2px;">Dépasser 21 → retour à 15</div></div>'+
    '<div style="width:44px;height:24px;border-radius:12px;background:'+(c.gameMode==="bust"?"#f4a100":"#333")+';position:relative;flex-shrink:0;margin-left:10px;"><div style="position:absolute;top:3px;left:'+(c.gameMode==="bust"?22:2)+'px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;"></div></div>'+
  '</div>';

  // Ghost
  html+='<div onclick="toggleSKGhost()" style="background:#111;border-radius:12px;padding:13px;margin-bottom:'+(c.ghostMode?"0":"9px")+';border:1px solid #1e1e1e;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">'+
    '<div><div style="font-size:14px;font-weight:700;">Ghost Mode 👻</div><div style="font-size:11px;color:#555;margin-top:2px;">Adversaire virtuel</div></div>'+
    '<div style="width:44px;height:24px;border-radius:12px;background:'+(c.ghostMode?"#f4a100":"#333")+';position:relative;flex-shrink:0;margin-left:10px;"><div style="position:absolute;top:3px;left:'+(c.ghostMode?22:2)+'px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;"></div></div>'+
  '</div>';
  if(c.ghostMode){
    html+='<div style="background:#111;border-radius:11px;padding:12px;margin-bottom:9px;border:1px solid #2a2a2a;">'+
      '<div style="font-size:11px;color:#555;margin-bottom:7px;">Difficulté</div>'+
      '<div style="display:flex;gap:6px;">'+ GHOST.map(function(g,i){return '<button onclick="setSKGhostDiff('+i+')" style="flex:1;padding:7px 0;border-radius:9px;background:'+(c.ghostDiff===i?"#f4a100":"#1a1a1a")+';border:none;color:'+(c.ghostDiff===i?"#000":"#888")+';font-size:12px;font-weight:700;cursor:pointer;">'+g.label+'</button>';}).join('')+'</div>'+
    '</div>';
  }

  // ACL info
  html+='<div style="background:#0d1a0d;border-radius:12px;padding:12px;margin-bottom:16px;border:1px solid #1a2e1a;">'+
    '<div style="font-size:11px;color:#2e7d32;font-weight:700;margin-bottom:4px;">📋 Règle ACL — Cancellation Scoring</div>'+
    '<div style="font-size:11px;color:#555;line-height:1.5;">Seule la différence compte par manche.<br/>Ex: A=12pts bruts, B=9pts bruts → <span style="color:#fff;font-weight:700;">A +3 · B +0</span></div>'+
  '</div>';

  // Preview + Start
  html+='<div style="display:flex;gap:9px;margin-bottom:14px;">'+
    ["teamA","teamB"].map(function(k,ki){
      return '<div style="flex:1;background:'+COLORS[c[k].colorIdx].bg+';border-radius:13px;padding:9px 0;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;">'+
        (c[k].photo?'<div style="width:24px;height:24px;border-radius:50%;overflow:hidden;border:1px solid rgba(255,255,255,.4);"><img src="'+c[k].photo+'" style="width:100%;height:100%;object-fit:cover;"/></div>':"")  +
        '<div style="font-size:14px;font-weight:900;color:#fff;">'+(c[k].name||("Équipe "+(ki===0?"A":"B")))+'</div>'+
      '</div>';
    }).join('')+'</div>'+
  '<button onclick="startSKGame()" style="width:100%;padding:17px;border-radius:15px;background:linear-gradient(135deg,#f4a100,#f77f00);border:none;color:#000;font-size:21px;font-weight:900;cursor:pointer;letter-spacing:1px;box-shadow:0 6px 24px rgba(244,161,0,.4);">🎯 Commencer la Partie</button>'+
  '</div>';
  $("root").innerHTML=html;
}

window.setSKPPT    = function(v){sk.cfg.playersPerTeam=v;renderSKSetup();};
window.setSKPhoto  = function(key,inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){sk.cfg[key].photo=e.target.result;renderSKSetup();};r.readAsDataURL(f);};
window.clearSKPhoto= function(key){sk.cfg[key].photo=null;renderSKSetup();};
window.setSKColor  = function(key,ci){sk.cfg[key].colorIdx=ci;renderSKSetup();};
window.setSKWinScore    = function(w){sk.cfg.winScore=w;renderSKSetup();};
window.toggleSKWinScore = function(){sk.cfg.useWinScore=!sk.cfg.useWinScore;renderSKSetup();};
window.setSKMaxRounds    = function(r){sk.cfg.maxRounds=r;renderSKSetup();};
window.toggleSKMaxRounds = function(){sk.cfg.useMaxRounds=!sk.cfg.useMaxRounds;renderSKSetup();};
window.toggleSKBust  = function(){sk.cfg.gameMode=sk.cfg.gameMode==="bust"?"standard":"bust";renderSKSetup();};
window.toggleSKGhost = function(){sk.cfg.ghostMode=!sk.cfg.ghostMode;renderSKSetup();};
window.setSKGhostDiff= function(i){sk.cfg.ghostDiff=i;renderSKSetup();};
window.startSKGame   = function(){
  sk.game={scores:{a:0,b:0},round:1,history:[],winner:null,entry:{a:{hole:0,board:0},b:{hole:0,board:0}}};
  sk.showScore=false;sk.showStats=false;renderSKGame();
};

// === SCOREKEEPER GAME ===
function renderSKGame() {
  var c=sk.cfg, g=sk.game;
  var cA=COLORS[c.teamA.colorIdx], cB=COLORS[c.teamB.colorIdx];
  var ghost=GHOST[c.ghostDiff];
  var isLast=c.useMaxRounds&&c.maxRounds&&g.round===c.maxRounds;

  function scorePanel(name,score,col,lead,photo,players,pid){
    return '<div style="flex:1;background:'+col.bg+';border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 10px;box-shadow:0 8px 32px '+col.s+'44;position:relative;overflow:hidden;">'+
      '<div style="position:absolute;top:-30px;right:-30px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.06);"></div>'+
      (lead?'<div style="position:absolute;top:6px;right:8px;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.7);background:rgba(0,0,0,.2);border-radius:5px;padding:2px 5px;">LEADING</div>':"")+
      (photo?'<img src="'+photo+'" style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.4);margin-bottom:4px;"/>':"")+
      '<div style="font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.8);margin-bottom:6px;text-align:center;">'+name+'</div>'+
      (c.playersPerTeam===2&&players&&players.filter(function(p){return p;}).length?'<div style="font-size:9px;color:rgba(255,255,255,.4);margin-bottom:4px;">'+players.filter(function(p){return p;}).slice(0,2).join(" · ")+'</div>':"")+
      '<div style="margin:4px 0;">'+flipHTML(score,"#fff",72,pid)+'</div>'+
      '<div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:4px;">/ '+c.winScore+' pts</div>'+
      '<div style="width:100%;background:rgba(0,0,0,.2);border-radius:6px;height:5px;margin-top:8px;"><div style="width:'+Math.min((score/c.winScore)*100,100)+'%;background:#fff;border-radius:6px;height:5px;opacity:.8;transition:width .5s;"></div></div>'+
    '</div>';
  }

  var html=
    '<div style="padding:13px 14px 0;display:flex;align-items:center;justify-content:space-between;">'+
      '<button onclick="renderSKSetup()" style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:9px;padding:5px 11px;color:#aaa;font-size:12px;font-weight:700;cursor:pointer;">◀ Setup</button>'+
      '<div style="text-align:center;">'+(c.tournamentName?'<div style="font-size:10px;color:#f4a100;letter-spacing:2px;font-weight:700;">'+c.tournamentName+'</div>':"")+
        '<div style="font-size:10px;letter-spacing:3px;color:#444;">CORNHOLE · ACL SCORING</div></div>'+
      '<div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:9px;padding:5px 11px;font-size:12px;font-weight:700;color:#aaa;">'+(c.useMaxRounds?g.round+"/"+c.maxRounds:"R"+g.round)+'</div>'+
    '</div>';

  if(isLast){
    html+='<div style="margin:8px 14px 0;background:#7f000022;border-radius:11px;padding:8px 14px;border:1px solid #e6394644;text-align:center;animation:last-round-pulse 1.2s ease-in-out infinite;">'+
      '<div style="font-size:14px;font-weight:900;color:#e63946;">⚠️ DERNIÈRE MANCHE</div></div>';
  }

  var badges=[c.playersPerTeam+"v"+c.playersPerTeam,"ACL Cancel.",c.gameMode==="bust"&&"BUST →15",c.ghostMode&&"👻 "+ghost.label,c.useMaxRounds&&c.maxRounds+" manches"].filter(Boolean);
  html+='<div style="padding:6px 14px;display:flex;gap:5px;flex-wrap:wrap;">'+
    badges.map(function(b){return '<div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:18px;padding:2px 9px;font-size:10px;color:#aaa;letter-spacing:1px;font-weight:700;">'+b+'</div>';}).join('')+'</div>';

  html+='<div style="padding:0 14px;display:flex;gap:9px;min-height:200px;">'+
    scorePanel(c.teamA.name,g.scores.a,cA,g.scores.a>g.scores.b,c.teamA.photo,c.teamA.players,"sk-a")+
    (c.ghostMode?
      '<div style="flex:1;background:#1a1a1a;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 10px;border:1px solid #2a2a2a;position:relative;">'+
        '<div style="position:absolute;top:8px;right:8px;font-size:18px;">👻</div>'+
        '<div style="font-size:11px;font-weight:800;letter-spacing:2px;color:#444;margin-bottom:6px;">GHOST</div>'+
        '<div style="margin:4px 0;">'+flipHTML(g.scores.b,"#555",72,"sk-b")+'</div>'+
      '</div>'
      :scorePanel(c.teamB.name,g.scores.b,cB,g.scores.b>g.scores.a,c.teamB.photo,c.teamB.players,"sk-b"))+
  '</div>';

  if(g.history.length){
    html+='<div style="padding:10px 14px 0;"><div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;">'+
      g.history.slice().reverse().map(function(h){
        return '<div style="background:#1a1a1a;border-radius:7px;padding:5px 9px;min-width:58px;text-align:center;border:1px solid #222;flex-shrink:0;">'+
          '<div style="font-size:9px;color:#444;margin-bottom:1px;">R'+h.round+'</div>'+
          '<div style="font-size:12px;font-weight:700;"><span style="color:'+cA.s+';">+'+h.pts.a+'</span><span style="color:#333;margin:0 2px;">|</span><span style="color:'+(c.ghostMode?"#555":cB.s)+';">+'+h.pts.b+'</span></div>'+
          '<div style="font-size:9px;color:#333;margin-top:1px;">'+h.raw.a+'–'+h.raw.b+'</div>'+
        '</div>';
      }).join('')+'</div></div>';
  }

  html+='<div style="padding:14px;display:flex;gap:7px;">'+
    '<button onclick="skStats()" style="flex:1;padding:11px 0;border-radius:11px;background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;font-size:13px;font-weight:700;cursor:pointer;">📊</button>'+
    '<button onclick="skUndo()" '+(g.history.length?"":"disabled")+' style="flex:1;padding:11px 0;border-radius:11px;background:#1a1a1a;border:1px solid #2a2a2a;color:'+(g.history.length?"#aaa":"#333")+';font-size:13px;font-weight:700;cursor:'+(g.history.length?"pointer":"not-allowed")+';">↩</button>'+
    '<button onclick="skReset()" style="flex:1;padding:11px 0;border-radius:11px;background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;font-size:13px;font-weight:700;cursor:pointer;">↺</button>'+
    '<button onclick="skOpenScore()" style="flex:3;padding:11px 0;border-radius:11px;background:linear-gradient(135deg,#f4a100,#f77f00);border:none;color:#000;font-size:15px;font-weight:900;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 20px rgba(244,161,0,.3);">+ ENTER SCORES</button>'+
  '</div>';

  if(sk.showScore) html+=renderSKScoreModal();
  if(sk.showStats) html+=renderSKStatsModal();
  if(g.winner&&g.winner!=="tie") html+=renderSKWinner();
  if(g.winner==="tie") html+=renderSKTie();
  $("root").innerHTML=html;
}

// === SK MODALS + ACTIONS ===
function renderSKScoreModal() {
  var c=sk.cfg, g=sk.game;
  var cA=COLORS[c.teamA.colorIdx], cB=COLORS[c.teamB.colorIdx];
  var m=calcManche(g.entry.a,g.entry.b);
  var ghost=GHOST[c.ghostDiff];
  function bagRow(key,type,color){
    return [1,2,3,4].map(function(n){
      var sel=g.entry[key][type]===n;
      return '<button onclick="setSKEntry(\''+key+'\',\''+type+'\','+n+')" style="width:46px;height:46px;border-radius:50%;background:'+(sel?color:"#2a2a2a")+';border:2px solid '+(sel?color:"#3a3a3a")+';color:#fff;font-size:18px;font-weight:800;cursor:pointer;box-shadow:'+(sel?"0 4px 14px "+color+"66":"none")+';transform:'+(sel?"scale(1.12)":"scale(1)")+';transition:all .15s;">'+n+'</button>';
    }).join('');
  }
  var html='<div style="position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(4px);">'+
    '<div style="background:#111;border-radius:18px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.8);border:1px solid #2a2a2a;max-height:90vh;overflow-y:auto;">'+
      '<div style="background:#1e1e1e;border-radius:18px 18px 0 0;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;">'+
        '<div style="font-size:18px;font-weight:900;letter-spacing:2px;">ENTER SCORES</div>'+
        '<div style="background:#fff;border-radius:20px;padding:4px 14px;font-size:14px;font-weight:900;color:#000;">Round '+g.round+'</div>'+
      '</div>'+
      '<div style="padding:18px;">'+
        // Team A
        '<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:14px;">'+
          '<div style="flex:1;">'+
            '<div style="font-size:20px;font-weight:900;color:'+cA.s+';letter-spacing:2px;margin-bottom:10px;text-align:center;">'+c.teamA.name.toUpperCase()+'</div>'+
            '<div style="font-size:12px;color:#888;margin-bottom:7px;">Bags In Hole <span style="color:'+cA.s+';font-weight:700;">(3 pts)</span></div>'+
            '<div style="display:flex;gap:8px;margin-bottom:12px;">'+bagRow("a","hole",cA.s)+'</div>'+
            '<div style="font-size:12px;color:#888;margin-bottom:7px;">Bags On Board <span style="color:'+cA.s+';font-weight:700;">(1 pt)</span></div>'+
            '<div style="display:flex;gap:8px;">'+bagRow("a","board",cA.s)+'</div>'+
          '</div>'+
          '<div style="background:'+cA.s+'18;border-radius:14px;padding:14px 10px;border:1px solid '+cA.s+'33;text-align:center;margin-top:32px;flex-shrink:0;">'+
            flipHTML(m.rawA,cA.s,48,"modal-ra")+
            '<div style="font-size:9px;color:'+cA.s+';opacity:.6;letter-spacing:2px;margin-top:4px;">BRUT</div>'+
          '</div>'+
        '</div>'+
        '<div style="height:1px;background:#222;margin:0 0 14px;"></div>'+
        // Team B / Ghost
        (!c.ghostMode?
          '<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:14px;">'+
            '<div style="flex:1;">'+
              '<div style="font-size:20px;font-weight:900;color:'+cB.s+';letter-spacing:2px;margin-bottom:10px;text-align:center;">'+c.teamB.name.toUpperCase()+'</div>'+
              '<div style="font-size:12px;color:#888;margin-bottom:7px;">Bags In Hole <span style="color:'+cB.s+';font-weight:700;">(3 pts)</span></div>'+
              '<div style="display:flex;gap:8px;margin-bottom:12px;">'+bagRow("b","hole",cB.s)+'</div>'+
              '<div style="font-size:12px;color:#888;margin-bottom:7px;">Bags On Board <span style="color:'+cB.s+';font-weight:700;">(1 pt)</span></div>'+
              '<div style="display:flex;gap:8px;">'+bagRow("b","board",cB.s)+'</div>'+
            '</div>'+
            '<div style="background:'+cB.s+'18;border-radius:14px;padding:14px 10px;border:1px solid '+cB.s+'33;text-align:center;margin-top:32px;flex-shrink:0;">'+
              flipHTML(m.rawB,cB.s,48,"modal-rb")+
              '<div style="font-size:9px;color:'+cB.s+';opacity:.6;letter-spacing:2px;margin-top:4px;">BRUT</div>'+
            '</div>'+
          '</div>'
          :'<div style="background:#111;border-radius:13px;padding:13px;margin-bottom:14px;border:1px solid #222;text-align:center;"><div style="font-size:13px;color:#555;">👻 Ghost: '+ghost.min+'–'+ghost.max+' pts</div></div>')+
        // Résultat cancellation
        '<div style="background:#0d1a0d;border-radius:12px;padding:12px 14px;margin-bottom:14px;border:1px solid #1a2e1a;">'+
          '<div style="font-size:10px;color:#2e7d32;letter-spacing:2px;margin-bottom:8px;font-weight:700;">RÉSULTAT MANCHE (CANCELLATION)</div>'+
          '<div style="display:flex;justify-content:center;align-items:center;gap:20px;">'+
            '<div style="text-align:center;"><div style="font-size:10px;color:'+cA.s+';opacity:.7;margin-bottom:4px;">'+c.teamA.name.slice(0,8).toUpperCase()+'</div>'+flipHTML(m.ptsA,cA.s,52,"modal-a")+'</div>'+
            '<div style="font-size:20px;color:#2a2a2a;font-weight:900;">|</div>'+
            '<div style="text-align:center;"><div style="font-size:10px;color:'+(c.ghostMode?"#555":cB.s)+';opacity:.7;margin-bottom:4px;">'+(c.ghostMode?"GHOST":c.teamB.name.slice(0,8).toUpperCase())+'</div>'+flipHTML(m.ptsB,c.ghostMode?"#555":cB.s,52,"modal-b")+'</div>'+
          '</div>'+
          ((m.rawA>0||m.rawB>0)?'<div style="text-align:center;font-size:10px;color:#333;margin-top:6px;">brut: '+m.rawA+' – '+m.rawB+'</div>':"")+
        '</div>'+
        '<div style="display:flex;flex-direction:column;gap:8px;">'+
          '<button onclick="skSaveRound()" style="width:100%;padding:15px;border-radius:14px;background:linear-gradient(135deg,#f4a100,#f77f00);border:none;color:#000;font-size:18px;font-weight:900;cursor:pointer;letter-spacing:1px;">✓ Save Round</button>'+
          '<button onclick="skCloseScore()" style="width:100%;padding:11px;border-radius:11px;background:transparent;border:none;color:#555;font-size:15px;font-weight:700;cursor:pointer;">Cancel</button>'+
        '</div>'+
      '</div>'+
    '</div>'+
  '</div>';
  return html;
}

function renderSKStatsModal() {
  var c=sk.cfg, g=sk.game, h=g.history;
  var cA=COLORS[c.teamA.colorIdx], cB=COLORS[c.teamB.colorIdx];
  var totA=h.reduce(function(s,x){return s+x.raw.a;},0);
  var totB=h.reduce(function(s,x){return s+x.raw.b;},0);
  var avgA=h.length?(g.scores.a/h.length).toFixed(1):"0.0";
  var avgB=h.length?(g.scores.b/h.length).toFixed(1):"0.0";
  function statRow(label,a,b){
    var tot=(Number(a)+Number(b))||1, pct=Math.round(Number(a)/tot*100);
    return '<div style="background:#1a1a1a;border-radius:11px;padding:9px 13px;margin-bottom:7px;border:1px solid #222;">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px;font-weight:700;"><span style="color:'+cA.s+';">'+a+'</span><span style="color:#555;font-size:11px;letter-spacing:1px;">'+label+'</span><span style="color:'+cB.s+';">'+b+'</span></div>'+
      '<div style="display:flex;border-radius:5px;overflow:hidden;height:6px;"><div style="width:'+pct+'%;background:'+cA.s+';"></div><div style="width:'+(100-pct)+'%;background:'+cB.s+';"></div></div>'+
    '</div>';
  }
  return '<div style="position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(4px);">'+
    '<div style="background:#111;border-radius:18px;padding:22px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.8);border:1px solid #2a2a2a;max-height:90vh;overflow-y:auto;">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><div style="font-size:19px;font-weight:900;">Statistiques</div><div style="font-size:13px;color:#555;">'+h.length+' manches</div></div>'+
      '<div style="display:flex;justify-content:center;gap:20px;margin-bottom:14px;">'+
        '<div style="text-align:center;"><div style="font-size:40px;font-weight:900;color:'+cA.s+';">'+g.scores.a+'</div><div style="font-size:11px;color:#555;">'+c.teamA.name+'</div></div>'+
        '<div style="font-size:24px;color:#333;font-weight:900;align-self:center;">–</div>'+
        '<div style="text-align:center;"><div style="font-size:40px;font-weight:900;color:'+cB.s+';">'+g.scores.b+'</div><div style="font-size:11px;color:#555;">'+c.teamB.name+'</div></div>'+
      '</div>'+
      statRow("Pts bruts totaux",totA,totB)+
      statRow("Moy. pts/manche",avgA,avgB)+
      '<button onclick="skCloseStats()" style="width:100%;padding:12px;border-radius:11px;margin-top:6px;background:#1a1a1a;border:1px solid #333;color:#fff;font-size:14px;font-weight:700;cursor:pointer;">Fermer</button>'+
    '</div></div>';
}

function renderSKWinner() {
  var c=sk.cfg, g=sk.game;
  var name=g.winner==="a"?c.teamA.name:c.teamB.name;
  var col=g.winner==="a"?COLORS[c.teamA.colorIdx]:COLORS[c.teamB.colorIdx];
  var cA=COLORS[c.teamA.colorIdx], cB=COLORS[c.teamB.colorIdx];
  return '<div style="position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.9);backdrop-filter:blur(6px);padding:16px;">'+
    '<div style="background:#111;border-radius:24px;padding:28px 22px;width:100%;max-width:400px;text-align:center;border:2px solid '+col.s+'44;animation:winner-in .45s cubic-bezier(.34,1.56,.64,1);">'+
      '<div style="font-size:68px;animation:trophy-bounce 1.5s ease-in-out .3s infinite;display:inline-block;margin-bottom:4px;">🏆</div>'+
      '<div style="font-size:10px;letter-spacing:4px;color:#555;margin-bottom:4px;">WINNER</div>'+
      '<div style="font-size:46px;font-weight:900;color:'+col.s+';letter-spacing:2px;text-shadow:0 0 40px '+col.s+'66;line-height:1;margin-bottom:14px;">'+name+'</div>'+
      '<div style="display:flex;justify-content:center;gap:16px;margin-bottom:20px;">'+
        '<div style="text-align:center;"><div style="font-size:40px;font-weight:900;color:'+cA.s+';">'+g.scores.a+'</div><div style="font-size:10px;color:#555;">'+c.teamA.name+'</div></div>'+
        '<div style="font-size:22px;color:#333;font-weight:900;align-self:center;">–</div>'+
        '<div style="text-align:center;"><div style="font-size:40px;font-weight:900;color:'+cB.s+';">'+g.scores.b+'</div><div style="font-size:10px;color:#555;">'+c.teamB.name+'</div></div>'+
      '</div>'+
      (tournoiId?'<a href="cornhole-classement.html?t='+tournoiId+'" target="_blank" style="display:block;width:100%;padding:13px;border-radius:12px;margin-bottom:8px;background:linear-gradient(135deg,#f4a100,#f77f00);color:#000;font-size:16px;font-weight:900;text-decoration:none;letter-spacing:1px;">🏆 Voir le Classement</a>':"")+
      '<button onclick="skUndo()" style="width:100%;padding:11px;border-radius:11px;margin-bottom:8px;background:#1a1a1a;border:1px solid #333;color:#aaa;font-size:14px;font-weight:700;cursor:pointer;">↩ Annuler dernier round</button>'+
      '<button onclick="skReset()" style="width:100%;padding:13px;border-radius:13px;margin-bottom:8px;background:linear-gradient(135deg,#f4a100,#f77f00);border:none;color:#000;font-size:18px;font-weight:900;cursor:pointer;">🎮 Nouvelle Partie</button>'+
      '<button onclick="renderSKSetup()" style="width:100%;padding:11px;border-radius:11px;background:#1a1a1a;border:1px solid #333;color:#aaa;font-size:14px;font-weight:700;cursor:pointer;">◀ Menu</button>'+
    '</div></div>';
}

function renderSKTie() {
  var g=sk.game;
  return '<div style="position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.9);backdrop-filter:blur(6px);padding:16px;">'+
    '<div style="background:#111;border-radius:24px;padding:28px 22px;width:100%;max-width:400px;text-align:center;border:1px solid #2a2a2a;">'+
      '<div style="font-size:52px;margin-bottom:8px;">🤝</div>'+
      '<div style="font-size:32px;font-weight:900;margin-bottom:6px;">ÉGALITÉ !</div>'+
      '<div style="font-size:22px;color:#aaa;margin-bottom:20px;">'+g.scores.a+' – '+g.scores.b+'</div>'+
      '<button onclick="skUndo()" style="width:100%;padding:12px;border-radius:11px;margin-bottom:9px;background:#1a1a1a;border:1px solid #333;color:#aaa;font-size:14px;font-weight:700;cursor:pointer;">↩ Annuler dernier round</button>'+
      '<button onclick="skReset()" style="width:100%;padding:13px;border-radius:13px;margin-bottom:9px;background:linear-gradient(135deg,#f4a100,#f77f00);border:none;color:#000;font-size:17px;font-weight:900;cursor:pointer;">🎮 Nouvelle Partie</button>'+
      '<button onclick="renderSKSetup()" style="width:100%;padding:12px;border-radius:11px;background:#1a1a1a;border:1px solid #333;color:#aaa;font-size:14px;font-weight:700;cursor:pointer;">◀ Menu</button>'+
    '</div></div>';
}

window.setSKEntry = function(key,type,val){
  sk.game.entry[key][type]=sk.game.entry[key][type]===val?0:val;
  renderSKGame();
  var m=calcManche(sk.game.entry.a,sk.game.entry.b);
  setTimeout(function(){ flipTo("modal-ra",m.rawA); flipTo("modal-rb",m.rawB); flipTo("modal-a",m.ptsA); flipTo("modal-b",m.ptsB); },20);
};
window.skOpenScore  = function(){sk.showScore=true; renderSKGame();};
window.skCloseScore = function(){sk.showScore=false; sk.game.entry={a:{hole:0,board:0},b:{hole:0,board:0}}; renderSKGame();};
window.skStats      = function(){sk.showStats=true; renderSKGame();};
window.skCloseStats = function(){sk.showStats=false; renderSKGame();};
window.skUndo = function(){
  if(!sk.game.history.length)return;
  var last=sk.game.history[sk.game.history.length-1];
  sk.game.scores={a:last.before.a,b:last.before.b};
  sk.game.round=last.round;
  sk.game.history=sk.game.history.slice(0,-1);
  sk.game.winner=null; renderSKGame();
};
window.skReset = function(){
  sk.game={scores:{a:0,b:0},round:1,history:[],winner:null,entry:{a:{hole:0,board:0},b:{hole:0,board:0}}};
  sk.showScore=false; renderSKGame();
};
window.skSaveRound = function(){
  var c=sk.cfg, g=sk.game;
  var m=calcManche(g.entry.a,g.entry.b);
  var ghost=GHOST[c.ghostDiff];
  var gPts=c.ghostMode?Math.floor(Math.random()*(ghost.max-ghost.min+1))+ghost.min:m.ptsB;
  var nA=g.scores.a+m.ptsA, nB=g.scores.b+(c.ghostMode?gPts:m.ptsB);
  if(c.gameMode==="bust"){if(nA>c.winScore)nA=15; if(nB>c.winScore)nB=15;}
  var hist=g.history.concat([{round:g.round,entry:JSON.parse(JSON.stringify(g.entry)),pts:{a:m.ptsA,b:c.ghostMode?gPts:m.ptsB},raw:{a:m.rawA,b:m.rawB},before:{a:g.scores.a,b:g.scores.b}}]);
  var nR=g.round+1, winner=null;
  if(c.useWinScore){
    if(nA>=c.winScore&&nA>nB)winner="a";
    else if(nB>=c.winScore&&nB>nA)winner="b";
    else if(nA>=c.winScore&&nB>=c.winScore)winner=nA>=nB?"a":"b";
  }
  if(!winner&&c.useMaxRounds&&nR>c.maxRounds){
    if(nA>nB)winner="a"; else if(nB>nA)winner="b"; else winner="tie";
  }
  sk.game={scores:{a:nA,b:nB},round:nR,history:hist,winner:winner,entry:{a:{hole:0,board:0},b:{hole:0,board:0}}};
  sk.showScore=false; renderSKGame();
  setTimeout(function(){flipTo("sk-a",nA); flipTo("sk-b",nB);},30);
};

window.creerTournoi = function() {
  var nom=($("tNom")&&$("tNom").value.trim())||"Tournoi Cornhole";
  var ppt=parseInt(($("tPPT")&&$("tPPT").value)||1);
  var nT=parseInt(($("tTerrains")&&$("tTerrains").value)||2);
  var win=parseInt(($("tWin")&&$("tWin").value)||21);
  var maxR=parseInt(($("tMaxR")&&$("tMaxR").value)||"")||null;
  var id=uid();
  db.ref("tournois/"+id).set({nom:nom,ppt:ppt,nTerrains:nT,winScore:win,maxRounds:maxR,cree:Date.now(),statut:"en_cours",equipes:{},matchs:{}});
  tournoiId=id; localStorage.setItem("cornhole_admin_id",id); loadTournoi();
};

function loadTournoi() {
  db.ref("tournois/"+tournoiId).on("value",function(snap){

}

function matchCard(id, m, eqMap) {
  var home=eqMap[m.homeId]?eqMap[m.homeId].nom:"?";
  var away=eqMap[m.awayId]?eqMap[m.awayId].nom:"?";
  var sc=m.statut==="en_cours"?"#f4a100":m.statut==="termine"?"#2e7d32":"#555";
  var sl=m.statut==="en_cours"?"⚡ EN COURS":m.statut==="termine"?"✅ TERMINÉ":"⏳ PRÉVU";
  return '<div style="background:#0d0d0d;border-radius:11px;padding:11px 13px;margin-bottom:8px;border:1px solid '+(m.statut==="en_cours"?"#f4a10033":"#151515")+';position:relative;">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'+
      '<div style="font-size:12px;color:#444;letter-spacing:1px;">Terrain '+m.terrain+'</div>'+
      '<div style="font-size:11px;color:'+sc+';font-weight:700;">'+sl+'</div>'+
    '</div>'+
    '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">'+
      '<div style="flex:1;"><div style="font-size:14px;font-weight:700;color:#e63946;">'+home+'</div><div style="font-size:10px;color:#444;">HOME</div></div>'+
      (m.statut!=="prevu"?
        '<div style="text-align:center;flex-shrink:0;">'+
          '<div style="font-size:28px;font-weight:900;"><span style="color:#e63946;">'+(m.scoreHome||0)+'</span><span style="color:#333;margin:0 4px;">–</span><span style="color:#1d6fa4;">'+(m.scoreAway||0)+'</span></div>'+
          '<div style="font-size:9px;color:#333;">R'+(m.round||1)+'</div>'+
        '</div>'
        :'<div style="font-size:18px;color:#2a2a2a;font-weight:900;">vs</div>')+
      '<div style="flex:1;text-align:right;"><div style="font-size:14px;font-weight:700;color:#1d6fa4;">'+away+'</div><div style="font-size:10px;color:#444;text-align:right;">AWAY</div></div>'+
    '</div>'+
    '<div style="display:flex;gap:6px;margin-top:8px;">'+
      (m.statut==="prevu"?'<button onclick="lancerMatch(\''+id+'\')" style="flex:1;padding:7px;border-radius:8px;background:#f4a100;border:none;color:#000;font-size:12px;font-weight:700;cursor:pointer;">▶ Lancer</button>':"")+
      (m.statut==="en_cours"?'<button onclick="terminerMatch(\''+id+'\')" style="flex:1;padding:7px;border-radius:8px;background:#1a1a1a;border:1px solid #2a2a2a;color:#2e7d32;font-size:12px;font-weight:700;cursor:pointer;">✓ Terminer</button>':"")+
      '<button onclick="supprimerMatch(\''+id+'\')" style="padding:7px 11px;border-radius:8px;background:#1a1a1a;border:1px solid #2a2a2a;color:#555;font-size:12px;cursor:pointer;">🗑</button>'+
    '</div>'+
  '</div>';
}

  r.readAsDataURL(f);
};
window.showAddEq=function(){var el=$("form-eq");if(el)el.style.display="block";joueurPhotos={j1:null,j2:null};};
window.hideAddEq=function(){var el=$("form-eq");if(el)el.style.display="none";joueurPhotos={j1:null,j2:null};};
window.ajouterEq=function(){
  var nom=($("eq-nom")&&$("eq-nom").value.trim())||"";
  if(!nom){alert("Entre le nom de l'équipe !");return;}
  var j1nom=($("eq-j1-nom")&&$("eq-j1-nom").value.trim())||"";
  var j2nom=($("eq-j2-nom")&&$("eq-j2-nom").value.trim())||"";
  var joueurs=[];
  if(j1nom)joueurs.push({nom:j1nom,photo:joueurPhotos.j1||null});
  if(j2nom)joueurs.push({nom:j2nom,photo:joueurPhotos.j2||null});
  db.ref("tournois/"+tournoiId+"/equipes").push().set({nom:nom,joueurs:joueurs,inscrit:Date.now()});
  joueurPhotos={j1:null,j2:null};
};
window.supprimerEq  = function(eid){if(!confirm("Supprimer cette équipe ?"))return;db.ref("tournois/"+tournoiId+"/equipes/"+eid).remove();};
window.showAddMatch  = function(){var el=$("form-match");if(el)el.style.display="block";};
window.hideAddMatch  = function(){var el=$("form-match");if(el)el.style.display="none";};
window.ajouterMatch  = function(){
  var homeId=($("m-home")&&$("m-home").value)||"";
  var awayId=($("m-away")&&$("m-away").value)||"";
  var terrain=($("m-terrain")&&$("m-terrain").value)||"";
  if(!homeId||!awayId||!terrain){alert("Sélectionne Home, Away et Terrain !");return;}
  if(homeId===awayId){alert("Les deux équipes doivent être différentes !");return;}
  var ref=db.ref("tournois/"+tournoiId+"/matchs").push();
  ref.set({homeId:homeId,awayId:awayId,terrain:parseInt(terrain),winScore:tournoi.winScore,maxRounds:tournoi.maxRounds||null,scoreHome:0,scoreAway:0,round:1,statut:"prevu",cree:Date.now()});
  var el=$("form-match");if(el)el.style.display="none";
};
window.lancerMatch   = function(id){db.ref("tournois/"+tournoiId+"/matchs/"+id).update({statut:"en_cours"});};
window.terminerMatch = function(id){if(!confirm("Terminer ce match ?"))return;db.ref("tournois/"+tournoiId+"/matchs/"+id).update({statut:"termine"});};
window.supprimerMatch= function(id){if(!confirm("Supprimer ?"))return;db.ref("tournois/"+tournoiId+"/matchs/"+id).remove();};
window.supprimerTournoi=function(){if(!confirm("Supprimer définitivement ce tournoi ?\nIrréversible."))return;db.ref("tournois/"+tournoiId).remove();tournoiId=null;localStorage.removeItem("cornhole_admin_id");tournoi=null;renderHome();};

// Init
renderHome();
</script>
