<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cornhole — Classement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Oswald:wght@500;600;700&family=Stardos+Stencil:wght@400;700&family=Yellowtail&family=Libre+Franklin:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="firebase-config.js?v=2"></script>
  <style>
    :root{
      --paper:#f1e4cf;--cream:#f7eedb;
      --ink:#1d2944;--ink-soft:#2c3a58;
      --accent:#e8654b;--gold:#caa047;--gold-deep:#a47f2d;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--ink);color:var(--cream);
      font-family:'Libre Franklin',sans-serif;
      min-height:100vh;overflow:hidden;
    }
    body::after{
      content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
      mix-blend-mode:multiply;opacity:.08;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='7' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16  0 0 0 0 0.10  0 0 0 0 0.04  0 0 0 0.9 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      background-size:220px 220px;
    }
    @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    @keyframes fade-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes champion-glow{0%,100%{box-shadow:0 0 40px rgba(202,160,71,.4)}50%{box-shadow:0 0 80px rgba(202,160,71,.7),0 0 120px rgba(202,160,71,.2)}}
    @keyframes pulse-gold{0%,100%{opacity:.6}50%{opacity:1}}
    .fade-in{animation:fade-in .4s ease forwards;}
    .rank-1-glow{animation:champion-glow 2.5s ease-in-out infinite;}

    .tv-header{
      background:var(--ink);border-bottom:3px double var(--gold);
      padding:14px 36px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
    }
    .tv-wordmark{display:flex;align-items:flex-end;gap:10px;}
    .tv-wordmark-script{font-family:'Yellowtail',cursive;font-size:22px;color:var(--gold);line-height:1;}
    .tv-wordmark-title{font-family:'Alfa Slab One',serif;font-size:26px;text-transform:uppercase;letter-spacing:.02em;line-height:1;}
    .tv-event{font-family:'Alfa Slab One',serif;font-size:22px;color:var(--gold);text-transform:uppercase;letter-spacing:.02em;}

    /* Standings rows */
    .st-row{
      border:1.5px solid rgba(247,238,219,.12);
      padding:12px 18px;display:flex;align-items:center;gap:14px;
    }
    .st-row.st-gold{border-color:var(--gold);background:rgba(202,160,71,.06);}
    .st-row.st-silver{border-color:rgba(180,180,180,.3);background:rgba(180,180,180,.04);}
    .st-row.st-bronze{border-color:rgba(180,120,50,.3);background:rgba(180,120,50,.04);}

    /* Live match panels */
    .live-card{
      border:1.5px solid rgba(232,101,75,.4);
      padding:12px 16px;
      background:rgba(232,101,75,.05);
    }

    /* Done match panels */
    .done-card{
      border:1px solid rgba(247,238,219,.08);
      padding:10px 14px;
      opacity:.75;
    }

    /* TV ticker */
    .tv-ticker{
      height:44px;background:#12193a;border-top:2px solid var(--gold);
      display:flex;align-items:center;overflow:hidden;flex-shrink:0;
    }
    .tv-ticker-label{
      background:var(--gold);color:var(--ink);font-family:'Oswald',sans-serif;
      font-size:11px;letter-spacing:.2em;padding:0 14px;height:100%;
      display:flex;align-items:center;flex-shrink:0;border-right:2px solid var(--ink);
    }
    .tv-ticker-inner{display:flex;width:max-content;}
    .tv-ticker-item{
      font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.1em;
      color:var(--cream);padding:0 32px;border-right:1px solid rgba(202,160,71,.3);
      flex-shrink:0;display:flex;align-items:center;gap:10px;
    }
  </style>
</head>
<body>
<div id="root" style="min-height:100vh;display:flex;flex-direction:column;"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const app = initializeApp(FIREBASE_CONFIG);
  const db  = getDatabase(app);

  const params    = new URLSearchParams(location.search);
  const tournoiId = params.get("t");
  let   tournoi   = null;

  if (!tournoiId) {
    document.getElementById("root").innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;">
        <div style="font-family:'Yellowtail',cursive;font-size:28px;color:var(--gold);">Cornhole</div>
        <div style="font-family:'Alfa Slab One',serif;font-size:20px;letter-spacing:.08em;opacity:.4;">Ajoute ?t=ID_TOURNOI dans l'URL</div>
      </div>`;
  } else {
    onValue(ref(db, `tournois/${tournoiId}`), snap => {
      if (!snap.exists()) return;
      tournoi = snap.val();
      render();
    });
  }

  function render() {
    if (!tournoi) return;
    const matchs  = Object.entries(tournoi.matchs || {});
    const enCours = matchs.filter(([,m]) => m.statut !== "termine");
    const termines = matchs.filter(([,m]) => m.statut === "termine");

    const standings = calculerClassement(matchs);
    const champion  = termines.length > 0 && enCours.length === 0 ? standings[0] : null;

    document.getElementById("root").innerHTML = `
      <div style="flex:1;display:flex;flex-direction:column;min-height:calc(100vh - 44px);">

        <!-- Header -->
        <div class="tv-header">
          <div class="tv-wordmark">
            <div class="tv-wordmark-script">Cornhole</div>
            <div class="tv-wordmark-title">Field House</div>
          </div>
          <div class="tv-event">${tournoi.nom}</div>
          <div style="font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.2em;color:var(--gold);">
            ${termines.length}/${matchs.length} TERMINÉS
          </div>
        </div>

        <!-- Champion banner si tournoi terminé -->
        ${champion ? `
        <div style="margin:20px 36px 0;background:var(--gold);border:2px solid var(--cream);padding:16px 28px;display:flex;align-items:center;gap:20px;" class="rank-1-glow">
          <div style="font-size:48px;">🏆</div>
          <div>
            <div style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.24em;color:var(--ink-soft);">CHAMPION DU TOURNOI</div>
            <div style="font-family:'Alfa Slab One',serif;font-size:36px;color:var(--ink);text-transform:uppercase;line-height:1;">${champion.nom}</div>
          </div>
          <div style="margin-left:auto;text-align:right;">
            <div style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.14em;color:var(--ink-soft);">${champion.v}V · ${champion.d}D</div>
            <div style="font-family:'Stardos Stencil',sans-serif;font-size:40px;color:var(--ink);line-height:1;">${champion.pts} pts</div>
          </div>
        </div>` : ""}

        <!-- Corps : classement + matchs -->
        <div style="flex:1;display:flex;gap:0;padding:20px 36px 0;overflow:hidden;">

          <!-- Classement -->
          <div style="flex:1;display:flex;flex-direction:column;gap:0;overflow-y:auto;padding-right:20px;">
            <div style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.24em;color:var(--gold);margin-bottom:12px;">CLASSEMENT GÉNÉRAL</div>
            <div style="display:flex;flex-direction:column;gap:8px;">
              ${standings.map((s, i) => renderRangée(s, i)).join("")}
            </div>
          </div>

          <!-- Séparateur -->
          <div style="width:2px;background:rgba(202,160,71,.2);flex-shrink:0;"></div>

          <!-- Matchs -->
          <div style="width:380px;flex-shrink:0;display:flex;flex-direction:column;padding-left:20px;overflow-y:auto;">
            <div style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.24em;color:var(--gold);margin-bottom:12px;">
              ${enCours.length > 0 ? "MATCHS EN COURS" : "DERNIERS MATCHS"}
            </div>
            <div style="display:flex;flex-direction:column;gap:8px;">
              ${enCours.length > 0
                ? enCours.map(([id,m]) => renderMatchLive(id, m)).join("")
                : termines.slice(-6).reverse().map(([id,m]) => renderMatchTermine(id, m)).join("")
              }
            </div>
          </div>
        </div>
      </div>`;

    renderSponsors();
  }

  function renderRangée(s, i) {
    const medals = ["🥇","🥈","🥉"];
    const rowClass = i === 0 ? "st-row st-gold rank-1-glow" : i === 1 ? "st-row st-silver" : i === 2 ? "st-row st-bronze" : "st-row";
    const pct = s.j > 0 ? Math.round((s.v / s.j) * 100) : 0;
    const nameColor = i === 0 ? "var(--gold)" : "var(--cream)";
    const statColor = i === 0 ? "var(--gold)" : "rgba(247,238,219,.7)";

    return `
      <div class="${rowClass} fade-in">
        <div style="width:40px;text-align:center;flex-shrink:0;">
          ${i < 3
            ? `<div style="font-size:28px;">${medals[i]}</div>`
            : `<div style="font-family:'Alfa Slab One',serif;font-size:26px;opacity:.3;">${i+1}</div>`
          }
        </div>

        <div style="flex:1;min-width:0;">
          <div style="font-family:'Alfa Slab One',serif;font-size:20px;text-transform:uppercase;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:${nameColor};">${s.nom}</div>
          <div style="height:3px;background:rgba(247,238,219,.1);margin-top:6px;overflow:hidden;">
            <div style="width:${pct}%;height:3px;background:${i===0?"var(--gold)":"rgba(247,238,219,.4)"};transition:width .8s;"></div>
          </div>
        </div>

        <div style="display:flex;gap:14px;flex-shrink:0;text-align:center;">
          <div>
            <div style="font-family:'Stardos Stencil',sans-serif;font-size:28px;color:#6fcf97;">${s.v}</div>
            <div style="font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.16em;color:${statColor};">VIC</div>
          </div>
          <div>
            <div style="font-family:'Stardos Stencil',sans-serif;font-size:28px;color:var(--accent);">${s.d}</div>
            <div style="font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.16em;color:${statColor};">DÉF</div>
          </div>
          <div>
            <div style="font-family:'Stardos Stencil',sans-serif;font-size:28px;color:var(--gold);">${s.pts}</div>
            <div style="font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.16em;color:${statColor};">PTS</div>
          </div>
          <div>
            <div style="font-family:'Stardos Stencil',sans-serif;font-size:28px;color:${s.diff>=0?"#6fcf97":"var(--accent)"};">${s.diff>=0?"+":""}${s.diff}</div>
            <div style="font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.16em;color:${statColor};">DIFF</div>
          </div>
        </div>
      </div>`;
  }

  function renderMatchLive(id, m) {
    const mc = m.manche_courante;
    const saisie = mc && (!mc.sacs_A?.soumis || !mc.sacs_B?.soumis);
    const validation = mc && mc.sacs_A?.soumis && mc.sacs_B?.soumis;
    const scoreA = m.scoreA||0, scoreB = m.scoreB||0, win = m.winScore||21;
    return `
      <div class="live-card fade-in">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          ${m.terrain ? `<div style="font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.18em;color:var(--gold);">${m.terrain}</div>` : `<div></div>`}
          <div style="font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.14em;color:${saisie?"var(--accent)":validation?"#6fcf97":"rgba(247,238,219,.4)"};animation:pulse-gold 1.4s ease-in-out infinite;">
            ${saisie?"⚡ EN SAISIE":validation?"🔄 VALIDATION":"R${m.round||1}"}
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
          <div style="flex:1;">
            <div style="font-family:'Alfa Slab One',serif;font-size:15px;text-transform:uppercase;">${m.equipeA}</div>
            <div style="font-family:'Stardos Stencil',sans-serif;font-size:44px;line-height:1;color:${scoreA>scoreB?"var(--gold)":"var(--cream)"};">${String(scoreA).padStart(2,"0")}</div>
          </div>
          <div style="font-family:'Alfa Slab One',serif;font-size:18px;opacity:.2;">VS</div>
          <div style="flex:1;text-align:right;">
            <div style="font-family:'Alfa Slab One',serif;font-size:15px;text-transform:uppercase;">${m.equipeB}</div>
            <div style="font-family:'Stardos Stencil',sans-serif;font-size:44px;line-height:1;color:${scoreB>scoreA?"var(--gold)":"var(--cream)"};">${String(scoreB).padStart(2,"0")}</div>
          </div>
        </div>
        <div style="display:flex;height:3px;margin-top:8px;gap:2px;">
          <div style="width:${Math.min((scoreA/win)*100,100)}%;background:var(--gold);transition:width .8s;"></div>
          <div style="flex:1;background:rgba(247,238,219,.08);"></div>
          <div style="width:${Math.min((scoreB/win)*100,100)}%;background:var(--accent);transition:width .8s;"></div>
        </div>
      </div>`;
  }

  function renderMatchTermine(id, m) {
    const winA = (m.scoreA||0) > (m.scoreB||0);
    return `
      <div class="done-card fade-in">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
          <div style="flex:1;">
            <div style="font-family:'Alfa Slab One',serif;font-size:14px;text-transform:uppercase;color:${winA?"var(--gold)":"rgba(247,238,219,.4)"};">
              ${winA?"★ ":""}${m.equipeA}
            </div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
            <span style="font-family:'Stardos Stencil',sans-serif;font-size:32px;color:${winA?"var(--gold)":"rgba(247,238,219,.5)"};">${m.scoreA||0}</span>
            <span style="font-family:'Alfa Slab One',serif;font-size:16px;opacity:.2;">–</span>
            <span style="font-family:'Stardos Stencil',sans-serif;font-size:32px;color:${!winA?"var(--gold)":"rgba(247,238,219,.5)"};">${m.scoreB||0}</span>
          </div>
          <div style="flex:1;text-align:right;">
            <div style="font-family:'Alfa Slab One',serif;font-size:14px;text-transform:uppercase;color:${!winA?"var(--gold)":"rgba(247,238,219,.4)"};">
              ${m.equipeB}${!winA?" ★":""}
            </div>
          </div>
        </div>
      </div>`;
  }

  function calculerClassement(matchs) {
    const equipes = {};
    matchs.forEach(([, m]) => {
      [m.equipeA, m.equipeB].forEach(nom => {
        if (!equipes[nom]) equipes[nom] = { nom, v:0, d:0, j:0, pts:0, diff:0 };
      });
      if (m.statut === "termine") {
        const sA = m.scoreA||0, sB = m.scoreB||0;
        if (sA > sB) {
          equipes[m.equipeA].v++; equipes[m.equipeA].pts += 2;
          equipes[m.equipeB].d++;
        } else if (sB > sA) {
          equipes[m.equipeB].v++; equipes[m.equipeB].pts += 2;
          equipes[m.equipeA].d++;
        } else {
          equipes[m.equipeA].pts++; equipes[m.equipeB].pts++;
        }
        equipes[m.equipeA].j++; equipes[m.equipeB].j++;
        equipes[m.equipeA].diff += sA - sB;
        equipes[m.equipeB].diff += sB - sA;
      }
    });
    return Object.values(equipes).sort((a,b) => b.pts - a.pts || b.diff - a.diff || b.v - a.v);
  }

  function renderSponsors() {
    const sponsors = (tournoi.sponsors || []).filter(s => s.name);
    if (!sponsors.length) return;
    const ticker = document.createElement("div");
    ticker.className = "tv-ticker";
    const label = document.createElement("div");
    label.className = "tv-ticker-label";
    label.textContent = "SPONSORS";
    ticker.appendChild(label);
    const wrap = document.createElement("div");
    wrap.style.cssText = "flex:1;overflow:hidden;";
    const inner = document.createElement("div");
    inner.className = "tv-ticker-inner";
    inner.style.animation = `ticker ${sponsors.length * 5}s linear infinite`;
    [...sponsors, ...sponsors].forEach(s => {
      const item = document.createElement("div");
      item.className = "tv-ticker-item";
      if (s.logo) {
        const img = document.createElement("img");
        img.src = s.logo;
        img.style.cssText = "height:24px;width:auto;object-fit:contain;opacity:.6;";
        item.appendChild(img);
      }
      if (s.name) {
        const span = document.createElement("span");
        span.textContent = s.name;
        item.appendChild(span);
      }
      inner.appendChild(item);
    });
    wrap.appendChild(inner);
    ticker.appendChild(wrap);
    document.getElementById("root").appendChild(ticker);
  }
</script>
</body>
</html>
