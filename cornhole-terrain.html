<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Cornhole — Rejoindre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Oswald:wght@500;600;700&family=Stardos+Stencil:wght@400;700&family=Yellowtail&family=Libre+Franklin:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="firebase-config.js?v=4"></script>
  <style>
    :root{
      --paper:#f1e4cf;--paper-deep:#e8d6bb;--cream:#f7eedb;
      --ink:#1d2944;--ink-soft:#2c3a58;
      --accent:#e8654b;--accent-deep:#c34a32;
      --gold:#caa047;--gold-deep:#a47f2d;
      --line:#8b6f4a;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:var(--paper);color:var(--ink);font-family:'Libre Franklin',sans-serif;min-height:100vh;overscroll-behavior:none;}
    button,input,select{outline:none;font-family:'Libre Franklin',sans-serif;}
    body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;mix-blend-mode:multiply;opacity:.12;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='7' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16  0 0 0 0 0.10  0 0 0 0 0.04  0 0 0 0.9 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");background-size:220px 220px;}
    @keyframes winner-in{from{transform:translateY(60px) scale(.9);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
    @keyframes trophy-bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-14px)}70%{transform:translateY(-8px)}}
    @keyframes last-round-pulse{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes flip-top{0%{transform:rotateX(0deg)}100%{transform:rotateX(-90deg)}}
    @keyframes flip-bot{0%{transform:rotateX(90deg)}100%{transform:rotateX(0deg)}}
    @keyframes champion-glow{0%,100%{box-shadow:0 0 40px rgba(202,160,71,.4)}50%{box-shadow:0 0 80px rgba(202,160,71,.7)}}
    .last-round{animation:last-round-pulse 1.2s ease-in-out infinite;}
    /* Field House UI */
    .fh-card{background:var(--cream);border:2px solid var(--ink);outline:1px solid var(--ink);outline-offset:3px;padding:14px;position:relative;}
    .fh-eyebrow{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);}
    .fh-btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 20px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;border:2px solid var(--ink);background:var(--ink);color:var(--cream);cursor:pointer;border-radius:2px;width:100%;}
    .fh-btn--accent{background:var(--accent);border-color:var(--ink);}
    .fh-btn--ghost{background:transparent;color:var(--ink);}
    .fh-btn--gold{background:var(--gold);border-color:var(--ink);color:var(--ink);}
    .fh-btn--green{background:#2c6e49;border-color:var(--ink);color:var(--cream);}
    .fh-btn--danger{background:transparent;border-color:var(--accent);color:var(--accent);}
    .fh-chip{display:inline-flex;align-items:center;padding:3px 9px;border:1.5px solid var(--ink);font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;background:var(--cream);color:var(--ink);}
    .fh-chip--accent{background:var(--accent);color:var(--cream);border-color:var(--ink);}
    .fh-chip--ink{background:var(--ink);color:var(--cream);}
    .fh-chip--green{background:#2c6e49;color:var(--cream);border-color:var(--ink);}
    /* Plank scoreboard */
    .fh-plank{background:var(--ink);color:var(--cream);border:2px solid var(--ink);position:relative;padding:14px 12px;display:flex;flex-direction:column;align-items:center;text-align:center;overflow:hidden;}
    .fh-plank::before{content:"";position:absolute;inset:4px;border:1px dashed rgba(202,160,71,.3);pointer-events:none;}
    .fh-plank--accent{background:var(--accent);}
    .fh-plank-team{font-family:'Alfa Slab One',serif;font-size:13px;letter-spacing:.03em;text-transform:uppercase;line-height:1;margin-bottom:3px;}
    .fh-plank-digits{font-family:'Stardos Stencil',sans-serif;font-size:64px;line-height:.85;color:var(--cream);text-shadow:2px 2px 0 rgba(0,0,0,.2);}
    .fh-plank-goal{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.14em;opacity:.55;margin-top:3px;}
    .fh-plank-bar{width:100%;height:4px;background:rgba(255,255,255,.15);margin-top:10px;}
    .fh-plank-bar-fill{height:100%;background:var(--gold);transition:width .5s;}
    .fh-pennant{position:absolute;top:6px;right:-1px;background:var(--gold);color:var(--ink);font-family:'Oswald',sans-serif;font-size:8px;letter-spacing:.1em;padding:2px 6px;border:1.5px solid var(--ink);}
    /* Bag circles */
    .fh-bag{width:52px;height:52px;border-radius:50%;border:2px solid var(--ink);background:var(--cream);color:var(--ink);font-family:'Alfa Slab One',serif;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .fh-bag--on{background:var(--accent);color:var(--cream);}
    /* Match row */
    .fh-match-card{background:var(--cream);border:2px solid var(--ink);padding:12px 14px;margin-bottom:10px;}
    .fh-match-card.live{background:var(--accent);color:var(--cream);}
  </style>
</head>
<body>
<div id="root" style="max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:40px;"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const app = firebase.initializeApp(FIREBASE_CONFIG);
const db  = firebase.database();
const F   = "'Stardos Stencil', sans-serif";
const FA  = "'Oswald', sans-serif";
const FW  = "'Alfa Slab One', serif";
const FB  = "'Libre Franklin', sans-serif";
const $   = id => document.getElementById(id);

const params    = new URLSearchParams(location.search);
const tournoiId = params.get("t");

if(!tournoiId){ renderErreur("Lien invalide. Scanne le QR code du tournoi."); }

let tournoi = null;
let myMatchId  = null;
let mySide     = null;

const COL_HOME = "#e8654b", COL_AWAY = "#1d2944";

function flipHTML(value, color, size, id){
  size=size||56; id=id||"";
  var digits=String(Math.abs(Math.round(value))).padStart(2,"0").split("");
  var fs=Math.round(size*.66), w=Math.round(size*.76);
  return '<div style="display:inline-flex;gap:3px;">'+
    digits.map(function(d,i){
      var eid=id?'id="fd-'+id+'-'+i+'"':'';
      return '<div '+eid+' data-val="'+d+'" style="position:relative;width:'+w+'px;height:'+size+'px;font-size:'+fs+'px;font-family:'+F+';font-weight:900;">'+
        '<div class="fd-top" style="position:absolute;top:0;left:0;right:0;height:50%;overflow:hidden;background:#252525;border-radius:7px 7px 0 0;display:flex;align-items:flex-end;justify-content:center;border-bottom:1.5px solid #111;"><span style="color:'+color+';transform:translateY(50%);display:block;line-height:1;">'+d+'</span></div>'+
        '<div class="fd-bot" style="position:absolute;bottom:0;left:0;right:0;height:50%;overflow:hidden;background:#1e1e1e;border-radius:0 0 7px 7px;display:flex;align-items:flex-start;justify-content:center;"><span style="color:'+color+';transform:translateY(-50%);display:block;line-height:1;">'+d+'</span></div>'+
        '<div class="fd-fold" style="position:absolute;top:0;left:0;right:0;height:50%;overflow:hidden;background:#252525;border-radius:7px 7px 0 0;display:flex;align-items:flex-end;justify-content:center;transform-origin:bottom center;z-index:2;backface-visibility:hidden;"><span style="color:'+color+';transform:translateY(50%);display:block;line-height:1;">'+d+'</span></div>'+
        '<div class="fd-unfold" style="position:absolute;bottom:0;left:0;right:0;height:50%;overflow:hidden;background:#1e1e1e;border-radius:0 0 7px 7px;display:flex;align-items:flex-start;justify-content:center;transform-origin:top center;z-index:2;transform:rotateX(90deg);backface-visibility:hidden;"><span style="color:'+color+';transform:translateY(-50%);display:block;line-height:1;">'+d+'</span></div>'+
      '</div>';
    }).join('')+'</div>';
}

function flipDigitTo(el,newVal){
  if(!el)return; var cur=el.dataset.val; if(cur===String(newVal))return;
  var fold=el.querySelector(".fd-fold"),unfold=el.querySelector(".fd-unfold");
  fold.querySelector("span").textContent=cur;
  unfold.querySelector("span").textContent=newVal;
  el.dataset.val=String(newVal);
  fold.style.animation=unfold.style.animation="none";
  void fold.offsetWidth;
  fold.style.animation="flip-top .2s ease-in forwards";
  unfold.style.animation="flip-bot .2s ease-out .18s forwards";
  setTimeout(function(){
    el.querySelector(".fd-top span").textContent=newVal;
    el.querySelector(".fd-bot span").textContent=newVal;
    fold.style.animation=unfold.style.animation="none";
    fold.querySelector("span").textContent=newVal;
  },450);
}
function flipTo(id,val){
  String(Math.abs(Math.round(val))).padStart(2,"0").split("").forEach(function(d,i){
    flipDigitTo(document.getElementById("fd-"+id+"-"+i),d);
  });
}

function calcManche(eHome, eAway){
  var rawH=eHome.hole*3+eHome.board, rawA=eAway.hole*3+eAway.board, d=rawH-rawA;
  return {ptsHome:Math.max(0,d), ptsAway:Math.max(0,-d), rawH:rawH, rawA:rawA};
}

function renderErreur(msg){
  $("root").innerHTML=
    '<div style="padding:40px 18px;text-align:center;">'+
      '<div style="font-size:36px;margin-bottom:12px;">⚠️</div>'+
      '<div style="font-family:'+FW+';font-size:20px;color:var(--accent);text-transform:uppercase;">'+msg+'</div>'+
    '</div>';
}

if(tournoiId){
  db.ref("tournois/"+tournoiId).on("value", function(snap){
    if(!snap.exists()){renderErreur("Tournoi introuvable.");return;}
    tournoi=snap.val();
    if(myMatchId) renderScore(); else renderListe();
  });
}

// ── LISTE DES MATCHS ──────────────────────────────────
function renderListe(){
  var t=tournoi;
  var matchs=Object.entries(t.matchs||{});
  var eqMap=Object.fromEntries(Object.entries(t.equipes||{}));

  var ordre={"en_cours":0,"prevu":1,"termine":2};
  matchs.sort(function(a,b){
    var sa=ordre[a[1].statut]||0, sb=ordre[b[1].statut]||0;
    if(sa!==sb)return sa-sb;
    return (a[1].terrain||0)-(b[1].terrain||0);
  });

  var html=
    '<div style="padding:18px 16px 0;">'+
      '<div style="border-bottom:1.5px solid var(--ink);padding-bottom:10px;margin-bottom:16px;display:flex;align-items:flex-end;justify-content:space-between;">'+
        '<div>'+
          '<div style="font-family:'+FA+';font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);">Bienvenue au</div>'+
          '<div style="font-family:'+FW+';font-size:26px;color:var(--accent);line-height:.9;">Cornhole</div>'+
        '</div>'+
        '<div style="text-align:right;">'+
          '<div style="font-family:'+FW+';font-size:18px;text-transform:uppercase;letter-spacing:.02em;line-height:1;">Field House</div>'+
          '<div style="font-family:'+FA+';font-size:11px;color:var(--ink-soft);letter-spacing:.06em;">'+t.ppt+'v'+t.ppt+' · '+t.winScore+'pts'+(t.maxRounds?' · '+t.maxRounds+' manches':'')+'</div>'+
        '</div>'+
      '</div>'+
      '<div style="font-family:'+FW+';font-size:20px;text-transform:uppercase;letter-spacing:.02em;margin-bottom:4px;">'+t.nom+'</div>'+
      '<div class="fh-eyebrow" style="margin-bottom:16px;">Choisis ton match</div>'+
    '</div>'+
    '<div style="padding:0 16px;">';

  if(matchs.length===0){
    html+='<div class="fh-card" style="text-align:center;padding:32px 16px;">'+
      '<div class="fh-eyebrow" style="margin-bottom:8px;">Aucun match</div>'+
      '<div style="font-family:'+FB+';font-size:13px;color:var(--ink-soft);">L\'admin n\'a pas encore créé de match.</div>'+
    '</div>';
  }

  var currentTerrain=null;
  matchs.forEach(function(entry){
    var id=entry[0], m=entry[1];
    var home=eqMap[m.homeId]||{nom:"?",photo:null};
    var away=eqMap[m.awayId]||{nom:"?",photo:null};
    var isEnCours=m.statut==="en_cours";
    var isTermine=m.statut==="termine";

    if(m.terrain!==currentTerrain){
      if(currentTerrain!==null) html+='<div style="height:6px;"></div>';
      html+='<div class="fh-eyebrow" style="margin:'+(currentTerrain!==null?"14px":0)+' 0 8px;color:var(--ink-soft);">Terrain '+m.terrain+'</div>';
      currentTerrain=m.terrain;
    }

    html+=
      '<div class="fh-match-card'+(isEnCours?" live":"")+'">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">'+
          '<div class="fh-eyebrow" style="'+(isEnCours?"color:var(--cream)":"")+'">Terrain '+m.terrain+' · '+(m.winScore||21)+'pts'+(m.maxRounds?' · '+m.maxRounds+' manches':'')+'</div>'+
          '<div class="fh-chip '+(isEnCours?"fh-chip--ink":isTermine?"fh-chip--green":"fh-chip")+'" style="font-size:9px;">'+(isEnCours?"⚡ EN COURS":isTermine?"✅ TERMINÉ":"⏳ PRÉVU")+'</div>'+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:'+(isTermine?"0":"10px")+';">'+
          '<div style="flex:1;">'+
            (home.photo?'<img src="'+home.photo+'" style="width:32px;height:32px;border:2px solid var(--ink);object-fit:cover;margin-bottom:4px;"/>':'<div style="font-size:18px;margin-bottom:4px;">🏠</div>')+
            '<div style="font-family:'+FW+';font-size:14px;text-transform:uppercase;'+(isEnCours?"color:var(--cream)":"color:var(--accent)")+';">'+home.nom+'</div>'+
            (home.joueurs&&home.joueurs.filter(function(j){return j;}).length?'<div style="font-family:'+FA+';font-size:9px;letter-spacing:.1em;opacity:.6;'+(isEnCours?"color:var(--cream)":"")+'">'+home.joueurs.filter(function(j){return j;}).join(" · ")+'</div>':"")+
          '</div>'+
          '<div style="text-align:center;flex-shrink:0;padding:0 8px;">'+
            (isEnCours||isTermine?
              '<div style="font-family:'+FW+';font-size:28px;line-height:1;'+(isEnCours?"color:var(--cream);":"")+'">'+
                (m.scoreHome||0)+'<span style="opacity:.3;margin:0 4px;font-size:20px;">—</span>'+(m.scoreAway||0)+
              '</div>'+
              '<div style="font-family:'+FA+';font-size:9px;letter-spacing:.12em;opacity:.5;margin-top:2px;'+(isEnCours?"color:var(--cream);":"")+'">R'+(m.round||1)+'</div>'
              :'<div style="font-family:'+FW+';font-size:18px;opacity:.3;">vs</div>')+
          '</div>'+
          '<div style="flex:1;text-align:right;">'+
            (away.photo?'<img src="'+away.photo+'" style="width:32px;height:32px;border:2px solid var(--ink);object-fit:cover;margin-bottom:4px;"/>':'<div style="font-size:18px;margin-bottom:4px;">🏃</div>')+
            '<div style="font-family:'+FW+';font-size:14px;text-transform:uppercase;'+(isEnCours?"color:var(--cream)":"color:var(--ink)")+';">'+away.nom+'</div>'+
            (away.joueurs&&away.joueurs.filter(function(j){return j;}).length?'<div style="font-family:'+FA+';font-size:9px;letter-spacing:.1em;opacity:.6;'+(isEnCours?"color:var(--cream)":"")+'">'+away.joueurs.filter(function(j){return j;}).join(" · ")+'</div>':"")+
          '</div>'+
        '</div>'+
        (!isTermine?
          '<div style="display:flex;gap:8px;">'+
            '<button onclick="joinMatch(\''+id+'\',\'home\')" style="flex:1;padding:10px 6px;background:var(--accent);border:2px solid var(--ink);color:var(--cream);font-family:'+FW+';font-size:13px;text-transform:uppercase;cursor:pointer;">▶ '+home.nom+'</button>'+
            '<button onclick="joinMatch(\''+id+'\',\'away\')" style="flex:1;padding:10px 6px;background:var(--ink);border:2px solid var(--ink);color:var(--cream);font-family:'+FW+';font-size:13px;text-transform:uppercase;cursor:pointer;">▶ '+away.nom+'</button>'+
          '</div>'
          :"")+
      '</div>';
  });

  html+='</div>';
  $("root").innerHTML=html;
}

// ── REJOINDRE UN MATCH ──────────────────────────────────
window.joinMatch = function(matchId, side){
  myMatchId=matchId; mySide=side;
  var m=tournoi.matchs[matchId];
  var update={};
  update["ready_"+side]=true;
  if(m.statut==="prevu") update["statut"]="en_cours";
  db.ref("tournois/"+tournoiId+"/matchs/"+matchId).update(update);
};

// ── ÉCRAN DE SCORE ──────────────────────────────────────
function renderScore(){
  if(!myMatchId||!tournoi)return;
  var m=tournoi.matchs[myMatchId];
  if(!m){myMatchId=null;mySide=null;renderListe();return;}

  var eqMap=Object.fromEntries(Object.entries(tournoi.equipes||{}));
  var home=eqMap[m.homeId]||{nom:"HOME",photo:null};
  var away=eqMap[m.awayId]||{nom:"AWAY",photo:null};
  var myTeam=mySide==="home"?home:away;
  var myColor=mySide==="home"?COL_HOME:COL_AWAY;
  var myScore=mySide==="home"?(m.scoreHome||0):(m.scoreAway||0);
  var theirScore=mySide==="home"?(m.scoreAway||0):(m.scoreHome||0);
  var theirTeam=mySide==="home"?away:home;
  var theirColor=mySide==="home"?COL_AWAY:COL_HOME;

  var mc=m.manche_courante;
  var isLast=m.maxRounds&&m.round===m.maxRounds;

  var mesSacs=mc&&mc["sacs_"+mySide];
  var leursSacs=mc&&mc["sacs_"+(mySide==="home"?"away":"home")];
  var maConf=mc&&mc["conf_"+mySide];

  var phase;
  if(m.statut==="termine") phase="gagne";
  else if(!mc||!mesSacs||!mesSacs.soumis) phase="saisie";
  else if(!leursSacs||!leursSacs.soumis) phase="attente";
  else if(maConf===null||maConf===undefined) phase="confirmation";
  else if(maConf===false) phase="conteste";
  else phase="valide";

  var html='<div style="min-height:100vh;display:flex;flex-direction:column;">';

  // ── Score header (plank style)
  html+=
    '<div style="display:flex;gap:0;min-height:160px;">'+
      // Mon plank
      '<div class="fh-plank'+(mySide==="home"?" fh-plank--accent":"")+'" style="'+(mySide!=="home"?"background:var(--ink-soft);":"")+'flex:1;padding:12px;">'+
        (isLast?'<div class="fh-pennant" style="font-size:7px;padding:2px 5px;">DERNIÈRE</div>':"")+
        '<div class="fh-plank-team" style="font-size:12px;">'+myTeam.nom+'</div>'+
        '<div class="fh-plank-digits" style="font-size:58px;" id="score-me">'+String(myScore).padStart(2,"0")+'</div>'+
        '<div class="fh-plank-goal">/ '+(m.winScore||21)+'</div>'+
        '<div class="fh-plank-bar"><div class="fh-plank-bar-fill" style="width:'+Math.min((myScore/(m.winScore||21))*100,100)+'%;"></div></div>'+
      '</div>'+
      // Séparateur info
      '<div style="background:var(--ink);padding:10px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;flex-shrink:0;min-width:56px;">'+
        '<div style="font-family:'+FA+';font-size:9px;letter-spacing:.18em;color:var(--gold);">MANCHE</div>'+
        '<div style="font-family:'+FW+';font-size:22px;color:var(--cream);">'+(m.round||1)+'</div>'+
        (m.maxRounds?'<div style="font-family:'+FA+';font-size:8px;color:rgba(247,238,219,.4);letter-spacing:.1em;">/ '+m.maxRounds+'</div>':"")+
      '</div>'+
      // Leur plank
      '<div class="fh-plank'+(mySide!=="home"?" fh-plank--accent":"")+'" style="'+(mySide==="home"?"background:var(--ink-soft);":"")+'flex:1;padding:12px;">'+
        '<div class="fh-plank-team" style="font-size:12px;">'+theirTeam.nom+'</div>'+
        '<div class="fh-plank-digits" style="font-size:58px;" id="score-them">'+String(theirScore).padStart(2,"0")+'</div>'+
        '<div class="fh-plank-goal">/ '+(m.winScore||21)+'</div>'+
        '<div class="fh-plank-bar"><div class="fh-plank-bar-fill" style="width:'+Math.min((theirScore/(m.winScore||21))*100,100)+'%;"></div></div>'+
      '</div>'+
    '</div>';

  // Corps selon phase
  html+='<div style="flex:1;padding:16px;">';

  if(phase==="saisie"){
    var entry=mc&&mc["sacs_"+mySide]||{hole:0,board:0};
    var raw=(entry.hole||0)*3+(entry.board||0);

    function bagRow(type){
      return [1,2,3,4].map(function(n){
        var sel=(entry[type]||0)===n;
        return '<button onclick="setSac(\''+type+'\','+n+')" class="fh-bag'+(sel?" fh-bag--on":"")+'">'+n+'</button>';
      }).join("");
    }

    html+=
      '<div class="fh-eyebrow" style="margin-bottom:12px;">Mes sacs — Manche '+(m.round||1)+'</div>'+
      '<div style="font-family:'+FA+';font-size:11px;letter-spacing:.12em;color:var(--ink-soft);margin-bottom:6px;">TROUS (3 pts)</div>'+
      '<div style="display:flex;gap:8px;margin-bottom:14px;">'+bagRow("hole")+'</div>'+
      '<div style="font-family:'+FA+';font-size:11px;letter-spacing:.12em;color:var(--ink-soft);margin-bottom:6px;">PLATEAU (1 pt)</div>'+
      '<div style="display:flex;gap:8px;margin-bottom:16px;">'+bagRow("board")+'</div>'+
      '<div style="background:var(--ink);padding:10px 14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">'+
        '<div class="fh-eyebrow" style="color:var(--gold);">Total brut</div>'+
        '<div>'+flipHTML(raw,"#f7eedb",44,"raw-me")+'</div>'+
      '</div>'+
      '<button onclick="soumettreSacs()" class="fh-btn fh-btn--gold" style="padding:16px;font-size:14px;margin-bottom:8px;">✓ Soumettre mes sacs</button>'+
      '<button onclick="retourListe()" class="fh-btn fh-btn--ghost" style="padding:11px;font-size:12px;">◀ Retour aux matchs</button>';

  } else if(phase==="attente"){
    var soumis=mc["sacs_"+mySide];
    var pts=soumis?(soumis.hole||0)*3+(soumis.board||0):0;
    html+=
      '<div style="text-align:center;padding:16px 0;">'+
        '<div style="font-size:48px;margin-bottom:12px;">⏳</div>'+
        '<div style="font-family:'+FW+';font-size:22px;text-transform:uppercase;margin-bottom:6px;">En attente</div>'+
        '<div style="font-family:'+FB+';font-size:14px;color:var(--ink-soft);margin-bottom:20px;">'+theirTeam.nom+' saisit ses sacs…</div>'+
        '<div style="background:var(--ink);padding:14px;margin-bottom:16px;text-align:center;">'+
          '<div class="fh-eyebrow" style="color:var(--gold);margin-bottom:8px;">Tes sacs soumis</div>'+
          '<div>'+flipHTML(pts,"#f7eedb",52,"raw-soumis")+'</div>'+
          '<div style="font-family:'+FA+';font-size:10px;color:rgba(247,238,219,.45);letter-spacing:.1em;margin-top:4px;">'+(soumis?(soumis.hole||0)+" trou · "+(soumis.board||0)+" plateau":"")+'</div>'+
        '</div>'+
      '</div>';

  } else if(phase==="confirmation"){
    var lSacs=mc["sacs_"+(mySide==="home"?"away":"home")];
    var lRaw=lSacs?((lSacs.hole||0)*3+(lSacs.board||0)):0;
    var mSacs=mc["sacs_"+mySide];
    var mRaw=mSacs?((mSacs.hole||0)*3+(mSacs.board||0)):0;
    var res=calcManche(
      mySide==="home"?{hole:mSacs?mSacs.hole:0,board:mSacs?mSacs.board:0}:{hole:lSacs?lSacs.hole:0,board:lSacs?lSacs.board:0},
      mySide==="home"?{hole:lSacs?lSacs.hole:0,board:lSacs?lSacs.board:0}:{hole:mSacs?mSacs.hole:0,board:mSacs?mSacs.board:0}
    );
    var moiPts=mySide==="home"?res.ptsHome:res.ptsAway;
    var euxPts=mySide==="home"?res.ptsAway:res.ptsHome;
    html+=
      '<div class="fh-eyebrow" style="margin-bottom:12px;">Confirme les sacs de '+theirTeam.nom+'</div>'+
      '<div class="fh-card" style="margin-bottom:12px;">'+
        '<div style="display:flex;gap:12px;margin-bottom:12px;">'+
          '<div style="flex:1;text-align:center;">'+
            '<div style="font-family:'+FA+';font-size:10px;letter-spacing:.14em;color:var(--ink-soft);margin-bottom:4px;">TROUS (×3pts)</div>'+
            '<div style="font-family:'+FW+';font-size:44px;">'+(lSacs?lSacs.hole:0)+'</div>'+
          '</div>'+
          '<div style="width:1.5px;background:var(--ink);opacity:.2;"></div>'+
          '<div style="flex:1;text-align:center;">'+
            '<div style="font-family:'+FA+';font-size:10px;letter-spacing:.14em;color:var(--ink-soft);margin-bottom:4px;">PLATEAU (×1pt)</div>'+
            '<div style="font-family:'+FW+';font-size:44px;">'+(lSacs?lSacs.board:0)+'</div>'+
          '</div>'+
        '</div>'+
        '<div style="background:var(--ink);padding:10px;text-align:center;">'+
          '<div class="fh-eyebrow" style="color:var(--gold);margin-bottom:6px;">Total brut '+theirTeam.nom+'</div>'+
          '<div>'+flipHTML(lRaw,"#f7eedb",44,"raw-eux")+'</div>'+
        '</div>'+
      '</div>'+
      '<div style="background:var(--ink);padding:12px 14px;margin-bottom:14px;">'+
        '<div class="fh-eyebrow" style="color:var(--gold);margin-bottom:10px;">ACL Cancellation</div>'+
        '<div style="display:flex;justify-content:center;gap:20px;">'+
          '<div style="text-align:center;"><div class="fh-eyebrow" style="color:var(--gold);margin-bottom:4px;">Toi</div>'+flipHTML(moiPts,"#f7eedb",48,"conf-moi")+'</div>'+
          '<div style="font-size:18px;color:rgba(247,238,219,.2);font-weight:900;align-self:center;">|</div>'+
          '<div style="text-align:center;"><div class="fh-eyebrow" style="color:var(--gold);margin-bottom:4px;">'+theirTeam.nom.slice(0,8)+'</div>'+flipHTML(euxPts,"#f7eedb",48,"conf-eux")+'</div>'+
        '</div>'+
        '<div style="text-align:center;font-family:'+FA+';font-size:10px;color:rgba(247,238,219,.35);letter-spacing:.1em;margin-top:8px;">brut: '+mRaw+' – '+lRaw+'</div>'+
      '</div>'+
      '<div style="display:flex;gap:10px;">'+
        '<button onclick="confirmer(false)" class="fh-btn fh-btn--danger" style="flex:1;padding:14px;font-size:13px;">❌ Contester</button>'+
        '<button onclick="confirmer(true)" class="fh-btn fh-btn--green" style="flex:2;padding:14px;font-size:13px;">✅ Confirmer</button>'+
      '</div>';

  } else if(phase==="conteste"){
    html+=
      '<div style="text-align:center;padding:20px 0;">'+
        '<div style="font-size:48px;margin-bottom:12px;">⚠️</div>'+
        '<div class="fh-eyebrow" style="margin-bottom:6px;color:var(--accent);">Score contesté</div>'+
        '<div style="font-family:'+FW+';font-size:20px;text-transform:uppercase;margin-bottom:8px;">Appelez un arbitre</div>'+
        '<div style="font-family:'+FB+';font-size:13px;color:var(--ink-soft);margin-bottom:24px;">Ou ressaisissez les sacs.</div>'+
        '<button onclick="ressaisir()" class="fh-btn fh-btn--ghost" style="padding:14px;font-size:13px;">↩ Ressaisir mes sacs</button>'+
      '</div>';

  } else if(phase==="valide"){
    var vSacs=mc&&mc["sacs_"+mySide];
    var vPts=vSacs?(vSacs.hole||0)*3+(vSacs.board||0):0;
    html+=
      '<div style="text-align:center;padding:20px 0;">'+
        '<div style="font-size:48px;margin-bottom:12px;">✅</div>'+
        '<div class="fh-eyebrow" style="margin-bottom:6px;color:#2c6e49;">Manche validée</div>'+
        '<div style="font-family:'+FW+';font-size:22px;text-transform:uppercase;margin-bottom:6px;">Prochaine manche...</div>'+
        '<div class="fh-card" style="margin-top:16px;text-align:left;">'+
          '<div class="fh-eyebrow" style="margin-bottom:6px;">Résumé manche</div>'+
          '<div style="display:flex;justify-content:space-between;font-family:'+FW+';font-size:16px;">'+
            '<span style="color:var(--accent);">+'+vPts+' pts nets</span>'+
            '<span style="opacity:.4;font-size:13px;">sacs soumis</span>'+
          '</div>'+
        '</div>'+
      '</div>';

  } else if(phase==="gagne"){
    var jaGagne=mySide==="home"?(m.scoreHome||0)>=(m.winScore||21):(m.scoreAway||0)>=(m.winScore||21);
    html+=
      '<div style="text-align:center;padding:20px 0;animation:winner-in .4s ease;">'+
        '<div style="font-size:60px;margin-bottom:10px;'+(jaGagne?"animation:trophy-bounce 1.5s ease-in-out infinite;":"")+'display:inline-block;">'+(jaGagne?"🏆":"😤")+'</div>'+
        '<div class="fh-eyebrow" style="margin-bottom:6px;color:'+(jaGagne?"var(--gold)":"var(--ink-soft)")+'">'+(jaGagne?"Vainqueur !":"Résultat final")+'</div>'+
        '<div style="font-family:'+FW+';font-size:38px;color:'+(jaGagne?"var(--accent)":"var(--ink-soft)")+';text-transform:uppercase;margin-bottom:12px;">'+(jaGagne?"VICTOIRE !":"Défaite")+'</div>'+
        '<div style="background:var(--ink);padding:14px;margin-bottom:20px;">'+
          '<div style="font-family:'+FW+';font-size:44px;color:var(--cream);">'+
            (m.scoreHome||0)+'<span style="opacity:.25;margin:0 8px;font-size:28px;">—</span>'+(m.scoreAway||0)+
          '</div>'+
          '<div style="font-family:'+FA+';font-size:10px;color:rgba(247,238,219,.45);letter-spacing:.1em;margin-top:4px;">'+home.nom+' vs '+away.nom+'</div>'+
        '</div>'+
        '<button onclick="retourListe()" class="fh-btn fh-btn--ghost" style="padding:14px;font-size:13px;margin-bottom:10px;">◀ Retour aux matchs</button>'+
        '<a href="cornhole-classement.html?t='+tournoiId+'" class="fh-btn fh-btn--gold" style="padding:14px;font-size:13px;text-decoration:none;display:flex;">🏆 Voir le Classement</a>'+
      '</div>';
  }

  html+='</div></div>';
  $("root").innerHTML=html;
}

// ── Entrée sacs locale ───────────────────────────────────
var localEntry={hole:0,board:0};

window.setSac=function(type,val){
  localEntry[type]=localEntry[type]===val?0:val;
  renderScore();
  var raw=(localEntry.hole||0)*3+(localEntry.board||0);
  setTimeout(function(){flipTo("raw-me",raw);},20);
};

window.soumettreSacs=function(){
  if(!myMatchId)return;
  var sacKey="sacs_"+mySide;
  var updates={};
  updates["manche_courante/"+sacKey]={hole:localEntry.hole,board:localEntry.board,soumis:true};
  var m=tournoi.matchs[myMatchId];
  if(!m.manche_courante){
    updates["manche_courante/conf_home"]=null;
    updates["manche_courante/conf_away"]=null;
  }
  db.ref("tournois/"+tournoiId+"/matchs/"+myMatchId).update(updates);
  localEntry={hole:0,board:0};
};

window.confirmer=function(ok){
  if(!myMatchId)return;
  var confKey="manche_courante/conf_"+mySide;
  var update={}; update[confKey]=ok;
  db.ref("tournois/"+tournoiId+"/matchs/"+myMatchId).update(update);
  if(ok) checkValiderManche();
};

function checkValiderManche(){
  var m=tournoi.matchs[myMatchId];
  if(!m||!m.manche_courante)return;
  var mc=m.manche_courante;
  var confH=mc.conf_home, confA=mc.conf_away;
  if(confH!==true||confA!==true)return;
  validerManche(m,mc);
}

function validerManche(m,mc){
  var sH=mc.sacs_home||{hole:0,board:0}, sA=mc.sacs_away||{hole:0,board:0};
  var res=calcManche(sH,sA);
  var nH=(m.scoreHome||0)+res.ptsHome, nA=(m.scoreAway||0)+res.ptsAway;
  var nR=(m.round||1)+1;
  var win=m.winScore||21;
  var statut="en_cours";
  if(nH>=win||nA>=win) statut="termine";
  if(m.maxRounds&&nR>m.maxRounds) statut="termine";
  db.ref("tournois/"+tournoiId+"/matchs/"+myMatchId).update({
    scoreHome:nH, scoreAway:nA, round:nR, statut:statut, manche_courante:null
  });
}

window.ressaisir=function(){
  if(!myMatchId)return;
  var sacKey="manche_courante/sacs_"+mySide;
  var confKey="manche_courante/conf_"+mySide;
  var u={}; u[sacKey]=null; u[confKey]=null;
  db.ref("tournois/"+tournoiId+"/matchs/"+myMatchId).update(u);
  localEntry={hole:0,board:0};
};

window.retourListe=function(){
  myMatchId=null; mySide=null; localEntry={hole:0,board:0};
  renderListe();
};

db.ref&&db.ref("tournois/"+tournoiId+"/matchs").on&&db.ref("tournois/"+tournoiId+"/matchs").on("child_changed",function(snap){
  if(!myMatchId||snap.key!==myMatchId)return;
  var m=snap.val();
  if(!m||!m.manche_courante)return;
  var mc=m.manche_courante;
  if(mc.conf_home===true&&mc.conf_away===true&&m.statut!=="termine"){
    validerManche(m,mc);
  }
});
</script>
