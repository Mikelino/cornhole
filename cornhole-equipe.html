<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Cornhole — Équipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Oswald:wght@500;600;700&family=Stardos+Stencil:wght@400;700&family=Yellowtail&family=Libre+Franklin:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="firebase-config.js?v=2"></script>
  <style>
    :root{
      --paper:#f1e4cf;--paper-deep:#e8d6bb;--cream:#f7eedb;
      --ink:#1d2944;--ink-soft:#2c3a58;
      --accent:#e8654b;--gold:#caa047;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:var(--paper);color:var(--ink);font-family:'Libre Franklin',sans-serif;min-height:100vh;overscroll-behavior:none;}
    button,input{font-family:'Libre Franklin',sans-serif;outline:none;}
    body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;mix-blend-mode:multiply;opacity:.12;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='7' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16  0 0 0 0 0.10  0 0 0 0 0.04  0 0 0 0.9 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");background-size:220px 220px;}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
    @keyframes slide-up{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes winner-in{from{transform:translateY(60px) scale(.9);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
    @keyframes trophy-bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-14px)}70%{transform:translateY(-8px)}}
    .slide-up{animation:slide-up .3s ease forwards;}
    /* Field House UI */
    .fh-eyebrow{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);}
    .fh-card{background:var(--cream);border:2px solid var(--ink);outline:1px solid var(--ink);outline-offset:3px;padding:14px;position:relative;}
    .fh-btn{display:flex;align-items:center;justify-content:center;padding:13px 20px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;border:2px solid var(--ink);background:var(--ink);color:var(--cream);cursor:pointer;border-radius:2px;width:100%;}
    .fh-btn--ghost{background:transparent;color:var(--ink);}
    .fh-btn--gold{background:var(--gold);border-color:var(--ink);color:var(--ink);}
    .fh-btn--green{background:#2c6e49;border-color:var(--ink);color:var(--cream);}
    .fh-btn--danger{background:transparent;border-color:var(--accent);color:var(--accent);}
    /* Plank */
    .fh-plank{background:var(--ink);color:var(--cream);border:2px solid var(--ink);position:relative;padding:12px;display:flex;flex-direction:column;align-items:center;text-align:center;overflow:hidden;}
    .fh-plank::before{content:"";position:absolute;inset:4px;border:1px dashed rgba(202,160,71,.3);pointer-events:none;}
    .fh-plank-team{font-family:'Alfa Slab One',serif;font-size:13px;letter-spacing:.03em;text-transform:uppercase;line-height:1;margin-bottom:3px;}
    .fh-plank-digits{font-family:'Stardos Stencil',sans-serif;font-size:58px;line-height:.85;color:var(--cream);}
    .fh-plank-goal{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.14em;opacity:.55;margin-top:3px;}
    .fh-plank-bar{width:100%;height:4px;background:rgba(255,255,255,.15);margin-top:10px;}
    .fh-plank-bar-fill{height:100%;background:var(--gold);transition:width .5s;}
    /* Bag circles */
    .fh-bag{width:54px;height:54px;border-radius:50%;border:2px solid var(--ink);background:var(--cream);color:var(--ink);font-family:'Alfa Slab One',serif;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .fh-bag.selected{background:var(--accent);color:var(--cream);}
  </style>
</head>
<body>
<div id="root" style="max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:40px;"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const app = initializeApp(FIREBASE_CONFIG);
  const db  = getDatabase(app);

  const FW = "'Alfa Slab One', serif";
  const FA = "'Oswald', sans-serif";
  const FB = "'Libre Franklin', sans-serif";

  const params    = new URLSearchParams(location.search);
  const tournoiId = params.get("t");
  const matchId   = params.get("m");
  const equipe    = params.get("e"); // "a" ou "b"

  if (!tournoiId || !matchId || !equipe) {
    document.getElementById("root").innerHTML = `
      <div style="padding:40px 18px;text-align:center;">
        <div style="font-size:36px;margin-bottom:12px;">⚠️</div>
        <div style="font-family:${FW};font-size:20px;color:var(--accent);text-transform:uppercase;">Lien invalide</div>
        <div style="font-size:13px;color:var(--ink-soft);margin-top:8px;">Scanne le QR code depuis l'admin.</div>
      </div>`;
    throw new Error("Params manquants");
  }

  const matchRef = ref(db, `tournois/${tournoiId}/matchs/${matchId}`);
  let match = null;
  let phase = "saisie";

  let entrée = { trou: 0, plateau: 0 };

  // Use coral for team A (home), navy for team B (away)
  const teamColor  = equipe === "a" ? "var(--accent)" : "var(--ink)";
  const teamColorHex = equipe === "a" ? "#e8654b" : "#1d2944";
  const otherColorHex = equipe === "a" ? "#1d2944" : "#e8654b";

  onValue(matchRef, snap => {
    if (!snap.exists()) { render404(); return; }
    match = snap.val();
    detectPhase();
    render();
  });

  function detectPhase() {
    if (match.statut === "termine") { phase = "termine"; return; }
    const mc = match.manche_courante;
    if (!mc) { phase = "saisie"; return; }
    const mesSacs   = equipe === "a" ? mc.sacs_A : mc.sacs_B;
    const leursSacs = equipe === "a" ? mc.sacs_B : mc.sacs_A;
    const maConf    = equipe === "a" ? mc.confirmation_A : mc.confirmation_B;
    if (!mesSacs || !mesSacs.soumis) { phase = "saisie"; return; }
    if (!leursSacs || !leursSacs.soumis) { phase = "attente_adversaire"; return; }
    if (maConf === null || maConf === undefined) { phase = "confirmation"; return; }
    if (maConf === false) { phase = "conteste"; return; }
    phase = "valide";
  }

  function render() {
    const root = document.getElementById("root");
    switch (phase) {
      case "saisie":             root.innerHTML = renderSaisie(); break;
      case "attente_adversaire": root.innerHTML = renderAttente(); break;
      case "confirmation":       root.innerHTML = renderConfirmation(); break;
      case "conteste":           root.innerHTML = renderConteste(); break;
      case "valide":             root.innerHTML = renderValide(); break;
      case "termine":            root.innerHTML = renderTermine(); break;
      default:                   root.innerHTML = renderSaisie();
    }
    attachEvents();
  }

  function monNom()    { return equipe === "a" ? match.equipeA : match.equipeB; }
  function leurNom()   { return equipe === "a" ? match.equipeB : match.equipeA; }
  function monScore()  { return equipe === "a" ? (match.scoreA||0) : (match.scoreB||0); }
  function leurScore() { return equipe === "a" ? (match.scoreB||0) : (match.scoreA||0); }

  function header() {
    const myScoreN = monScore(), theirScoreN = leurScore(), win = match.winScore||21;
    const lead = myScoreN > theirScoreN;
    return `
      <div style="display:flex;gap:0;min-height:150px;">
        <div class="fh-plank${lead?" fh-plank--accent":""}" style="${!lead?"background:"+teamColorHex+"cc;":""}flex:1;padding:12px;">
          <div class="fh-plank-team" style="font-size:11px;">${monNom()}</div>
          <div class="fh-plank-digits" style="font-size:56px;">${String(myScoreN).padStart(2,"0")}</div>
          <div class="fh-plank-goal">/ ${win}</div>
          <div class="fh-plank-bar"><div class="fh-plank-bar-fill" style="width:${Math.min((myScoreN/win)*100,100)}%;"></div></div>
        </div>
        <div style="background:var(--ink);padding:10px 7px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;flex-shrink:0;min-width:50px;">
          <div style="font-family:${FA};font-size:9px;letter-spacing:.16em;color:var(--gold);">M</div>
          <div style="font-family:${FW};font-size:20px;color:var(--cream);">${match.round||1}</div>
        </div>
        <div class="fh-plank" style="flex:1;padding:12px;background:${otherColorHex}cc;">
          <div class="fh-plank-team" style="font-size:11px;">${leurNom()}</div>
          <div class="fh-plank-digits" style="font-size:56px;">${String(theirScoreN).padStart(2,"0")}</div>
          <div class="fh-plank-goal">/ ${win}</div>
          <div class="fh-plank-bar"><div class="fh-plank-bar-fill" style="width:${Math.min((theirScoreN/win)*100,100)}%;"></div></div>
        </div>
      </div>`;
  }

  function bagSelector(label, key, ptsEach) {
    const val = entrée[key];
    const btns = [0,1,2,3,4].map(n => `
      <button class="fh-bag ${val===n?"selected":""}" data-key="${key}" data-val="${n}">${n}</button>
    `).join("");
    return `
      <div style="margin-bottom:14px;">
        <div style="font-family:${FA};font-size:11px;letter-spacing:.12em;color:var(--ink-soft);margin-bottom:7px;">
          ${label} <span style="color:${teamColorHex};">(+${ptsEach} pt${ptsEach>1?"s":""})</span>
        </div>
        <div style="display:flex;gap:8px;">${btns}</div>
      </div>`;
  }

  function renderSaisie() {
    const pts = entrée.trou*3 + entrée.plateau;
    return `
      ${header()}
      <div style="padding:14px 16px 24px;" class="slide-up">
        <div class="fh-eyebrow" style="margin-bottom:12px;">Mes sacs — Manche ${match.round||1}</div>
        ${bagSelector("Trous (Bags In Hole)", "trou", 3)}
        ${bagSelector("Plateau (Bags On Board)", "plateau", 1)}
        <div style="background:var(--ink);padding:10px 14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
          <div class="fh-eyebrow" style="color:var(--gold);">Total brut cette manche</div>
          <div style="font-family:'Stardos Stencil',sans-serif;font-size:32px;color:var(--cream);">${pts > 0 ? `+${pts}` : "0"}</div>
        </div>
        <button id="btn-soumettre" class="fh-btn fh-btn--gold" style="padding:16px;font-size:15px;letter-spacing:.12em;">
          ✓ Soumettre mes sacs
        </button>
      </div>`;
  }

  function renderAttente() {
    const mc = match.manche_courante;
    const mesSacs = equipe === "a" ? mc.sacs_A : mc.sacs_B;
    const mesPts = mesSacs ? mesSacs.trou*3 + mesSacs.plateau : 0;
    return `
      ${header()}
      <div style="padding:14px 16px 24px;text-align:center;" class="slide-up">
        <div style="font-size:48px;margin:24px 0 10px;animation:pulse 1.5s ease-in-out infinite;">⏳</div>
        <div class="fh-eyebrow" style="margin-bottom:6px;">En attente</div>
        <div style="font-family:${FW};font-size:20px;text-transform:uppercase;margin-bottom:6px;">${leurNom()}</div>
        <div style="font-family:${FB};font-size:13px;color:var(--ink-soft);margin-bottom:24px;">saisit ses sacs…</div>
        <div style="background:var(--ink);padding:14px;text-align:center;">
          <div class="fh-eyebrow" style="color:var(--gold);margin-bottom:8px;">Tes sacs soumis</div>
          <div style="font-family:'Stardos Stencil',sans-serif;font-size:40px;color:var(--cream);">+${mesPts}</div>
          <div style="font-family:${FA};font-size:10px;color:rgba(247,238,219,.45);letter-spacing:.1em;margin-top:4px;">${mesSacs?.trou||0} trou · ${mesSacs?.plateau||0} plateau</div>
        </div>
      </div>`;
  }

  function renderConfirmation() {
    const mc = match.manche_courante;
    const leursSacs = equipe === "a" ? mc.sacs_B : mc.sacs_A;
    const leursPts  = leursSacs ? leursSacs.trou*3 + leursSacs.plateau : 0;
    const mesSacs   = equipe === "a" ? mc.sacs_A : mc.sacs_B;
    const mesPts    = mesSacs ? mesSacs.trou*3 + mesSacs.plateau : 0;
    return `
      ${header()}
      <div style="padding:14px 16px 24px;" class="slide-up">
        <div class="fh-eyebrow" style="margin-bottom:12px;">Confirme les sacs de ${leurNom()}</div>
        <div class="fh-card" style="margin-bottom:12px;">
          <div style="display:flex;gap:12px;margin-bottom:12px;">
            <div style="flex:1;text-align:center;">
              <div style="font-family:${FA};font-size:10px;letter-spacing:.14em;color:var(--ink-soft);margin-bottom:4px;">TROUS (×3pts)</div>
              <div style="font-family:${FW};font-size:44px;">${leursSacs?.trou||0}</div>
            </div>
            <div style="width:1.5px;background:var(--ink);opacity:.15;"></div>
            <div style="flex:1;text-align:center;">
              <div style="font-family:${FA};font-size:10px;letter-spacing:.14em;color:var(--ink-soft);margin-bottom:4px;">PLATEAU (×1pt)</div>
              <div style="font-family:${FW};font-size:44px;">${leursSacs?.plateau||0}</div>
            </div>
          </div>
          <div style="background:var(--ink);padding:10px;text-align:center;">
            <div class="fh-eyebrow" style="color:var(--gold);margin-bottom:6px;">Total ${leurNom()}</div>
            <div style="font-family:'Stardos Stencil',sans-serif;font-size:36px;color:var(--cream);">+${leursPts}</div>
          </div>
        </div>
        <div style="background:var(--paper-deep);border:1.5px solid var(--ink);padding:10px 14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
          <div style="font-family:${FA};font-size:11px;letter-spacing:.1em;color:var(--ink-soft);">Tes sacs soumis</div>
          <div style="font-family:'Stardos Stencil',sans-serif;font-size:24px;color:var(--accent);">+${mesPts}</div>
        </div>
        <div style="display:flex;gap:10px;">
          <button id="btn-contester" class="fh-btn fh-btn--danger" style="flex:1;padding:14px;font-size:13px;">❌ Contester</button>
          <button id="btn-confirmer" class="fh-btn fh-btn--green" style="flex:2;padding:14px;font-size:13px;">✅ Confirmer</button>
        </div>
      </div>`;
  }

  function renderConteste() {
    return `
      ${header()}
      <div style="padding:14px 16px 24px;text-align:center;" class="slide-up">
        <div style="font-size:48px;margin:24px 0 10px;">⚠️</div>
        <div class="fh-eyebrow" style="margin-bottom:6px;color:var(--accent);">Score contesté</div>
        <div style="font-family:${FW};font-size:20px;text-transform:uppercase;margin-bottom:8px;">Appelez un arbitre</div>
        <div style="font-family:${FB};font-size:13px;color:var(--ink-soft);margin-bottom:24px;">Les équipes doivent se mettre d'accord.</div>
        <button id="btn-ressaisir" class="fh-btn fh-btn--ghost" style="padding:14px;font-size:13px;">↩ Ressaisir mes sacs</button>
      </div>`;
  }

  function renderValide() {
    const mc = match.manche_courante;
    const mesPts   = equipe==="a" ? (mc?.sacs_A?.trou||0)*3+(mc?.sacs_A?.plateau||0) : (mc?.sacs_B?.trou||0)*3+(mc?.sacs_B?.plateau||0);
    const leursPts = equipe==="a" ? (mc?.sacs_B?.trou||0)*3+(mc?.sacs_B?.plateau||0) : (mc?.sacs_A?.trou||0)*3+(mc?.sacs_A?.plateau||0);
    return `
      ${header()}
      <div style="padding:14px 16px 24px;text-align:center;" class="slide-up">
        <div style="font-size:48px;margin:20px 0 8px;">✅</div>
        <div class="fh-eyebrow" style="margin-bottom:6px;color:#2c6e49;">Manche validée</div>
        <div style="font-family:${FW};font-size:20px;text-transform:uppercase;margin-bottom:20px;">Prochaine manche…</div>
        <div style="display:flex;gap:8px;">
          <div style="flex:1;background:var(--ink);padding:12px;text-align:center;">
            <div class="fh-eyebrow" style="color:var(--gold);margin-bottom:6px;">Toi</div>
            <div style="font-family:'Stardos Stencil',sans-serif;font-size:36px;color:var(--cream);">+${mesPts}</div>
          </div>
          <div style="flex:1;background:var(--paper-deep);border:2px solid var(--ink);padding:12px;text-align:center;">
            <div class="fh-eyebrow" style="margin-bottom:6px;">${leurNom()}</div>
            <div style="font-family:'Stardos Stencil',sans-serif;font-size:36px;color:var(--ink);">+${leursPts}</div>
          </div>
        </div>
      </div>`;
  }

  function renderTermine() {
    const jaGagne = equipe==="a" ? (match.scoreA||0)>=(match.winScore||21) : (match.scoreB||0)>=(match.winScore||21);
    return `
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;animation:winner-in .4s ease;">
        <div style="font-size:68px;margin-bottom:10px;${jaGagne?"animation:trophy-bounce 1.5s ease-in-out infinite;":""}display:inline-block;">${jaGagne?"🏆":"😤"}</div>
        <div class="fh-eyebrow" style="margin-bottom:6px;color:${jaGagne?"var(--gold)":"var(--ink-soft)"};">${jaGagne?"Vainqueur !":"Résultat final"}</div>
        <div style="font-family:${FW};font-size:36px;color:${jaGagne?"var(--accent)":"var(--ink-soft)"};text-transform:uppercase;margin-bottom:16px;">${jaGagne?"VICTOIRE !":"Défaite"}</div>
        <div style="background:var(--ink);padding:16px 24px;margin-bottom:20px;">
          <div style="font-family:${FW};font-size:48px;color:var(--cream);">
            ${match.scoreA||0}<span style="opacity:.2;margin:0 8px;font-size:28px;">—</span>${match.scoreB||0}
          </div>
          <div style="font-family:${FA};font-size:10px;color:rgba(247,238,219,.45);letter-spacing:.1em;margin-top:4px;">${match.equipeA} vs ${match.equipeB}</div>
        </div>
      </div>`;
  }

  function render404() {
    document.getElementById("root").innerHTML = `
      <div style="padding:40px 18px;text-align:center;">
        <div style="font-size:36px;margin-bottom:12px;">❌</div>
        <div style="font-family:${FW};font-size:20px;color:var(--accent);text-transform:uppercase;">Match introuvable</div>
      </div>`;
  }

  function attachEvents() {
    document.querySelectorAll(".fh-bag").forEach(btn => {
      btn.addEventListener("click", () => {
        const key = btn.dataset.key;
        const val = parseInt(btn.dataset.val);
        entrée[key] = val;
        render();
      });
    });
    const btnS = document.getElementById("btn-soumettre");
    if (btnS) btnS.addEventListener("click", soumettreSacs);
    const btnC = document.getElementById("btn-confirmer");
    if (btnC) btnC.addEventListener("click", () => confirmer(true));
    const btnX = document.getElementById("btn-contester");
    if (btnX) btnX.addEventListener("click", () => confirmer(false));
    const btnR = document.getElementById("btn-ressaisir");
    if (btnR) btnR.addEventListener("click", ressaisir);
  }

  async function soumettreSacs() {
    const sacKey  = equipe === "a" ? "sacs_A" : "sacs_B";
    const updates = {};
    const snap = await get(matchRef);
    const m = snap.val();
    if (!m.manche_courante) {
      updates[`manche_courante/round`] = m.round || 1;
      updates[`manche_courante/confirmation_A`] = null;
      updates[`manche_courante/confirmation_B`] = null;
    }
    updates[`manche_courante/${sacKey}`] = { trou: entrée.trou, plateau: entrée.plateau, soumis: true };
    await update(matchRef, updates);
    entrée = { trou: 0, plateau: 0 };
  }

  async function confirmer(accord) {
    const confKey = equipe === "a" ? "confirmation_A" : "confirmation_B";
    await update(ref(db, `tournois/${tournoiId}/matchs/${matchId}/manche_courante`), { [confKey]: accord });
    if (accord) {
      const snap = await get(matchRef);
      const mc = snap.val().manche_courante;
      const autreConf = equipe === "a" ? mc.confirmation_B : mc.confirmation_A;
      if (autreConf === true) await validerManche(snap.val(), mc);
    }
  }

  async function validerManche(m, mc) {
    const ptsA = (mc.sacs_A?.trou||0)*3 + (mc.sacs_A?.plateau||0);
    const ptsB = (mc.sacs_B?.trou||0)*3 + (mc.sacs_B?.plateau||0);
    const newScoreA = (m.scoreA||0) + ptsA;
    const newScoreB = (m.scoreB||0) + ptsB;
    const newRound  = (m.round||1) + 1;
    const winScore  = m.winScore || 21;
    let statut = "en_cours";
    if (newScoreA >= winScore || newScoreB >= winScore) statut = "termine";
    await update(matchRef, { scoreA: newScoreA, scoreB: newScoreB, round: newRound, statut, manche_courante: null });
  }

  async function ressaisir() {
    const sacKey = equipe === "a" ? "sacs_A" : "sacs_B";
    await update(ref(db, `tournois/${tournoiId}/matchs/${matchId}/manche_courante`), {
      [sacKey]: null, confirmation_A: null, confirmation_B: null
    });
    entrée = { trou: 0, plateau: 0 };
  }
</script>
</body>
</html>
