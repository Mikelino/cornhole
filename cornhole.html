<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Cornhole Scorekeeper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Oswald:wght@500;600;700&family=Stardos+Stencil:wght@400;700&family=Yellowtail&family=Libre+Franklin:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="firebase-config.js?v=4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root{
      --paper:#f1e4cf;--paper-deep:#e8d6bb;--cream:#f7eedb;
      --ink:#1d2944;--ink-soft:#2c3a58;
      --accent:#e8654b;--accent-deep:#c34a32;
      --gold:#caa047;--gold-deep:#a47f2d;
      --line:#8b6f4a;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:var(--paper);color:var(--ink);font-family:'Libre Franklin',sans-serif;min-height:100vh;overscroll-behavior:none;}
    input,button,select{outline:none;font-family:'Libre Franklin',sans-serif;}
    @keyframes winner-in{from{transform:translateY(60px) scale(.9);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
    @keyframes trophy-bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-14px)}70%{transform:translateY(-8px)}}
    @keyframes last-round-pulse{0%,100%{opacity:1}50%{opacity:.6}}
    @keyframes flip-top{0%{transform:rotateX(0deg)}100%{transform:rotateX(-90deg)}}
    @keyframes flip-bot{0%{transform:rotateX(90deg)}100%{transform:rotateX(0deg)}}
    @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    /* Field House grain overlay */
    body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;mix-blend-mode:multiply;opacity:.12;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='7' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16  0 0 0 0 0.10  0 0 0 0 0.04  0 0 0 0.9 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");background-size:220px 220px;}
    /* Shared vintage UI */
    .fh-card{background:var(--cream);border:2px solid var(--ink);outline:1px solid var(--ink);outline-offset:3px;padding:16px;position:relative;}
    .fh-card--ink{background:var(--ink);color:var(--cream);}
    .fh-card--accent{background:var(--accent);color:var(--cream);}
    .fh-eyebrow{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);}
    .fh-title{font-family:'Alfa Slab One',serif;font-size:22px;letter-spacing:.02em;line-height:1;text-transform:uppercase;}
    .fh-btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 20px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;border:2px solid var(--ink);background:var(--ink);color:var(--cream);cursor:pointer;border-radius:2px;}
    .fh-btn--accent{background:var(--accent);border-color:var(--ink);color:var(--cream);}
    .fh-btn--ghost{background:transparent;color:var(--ink);}
    .fh-btn--gold{background:var(--gold);border-color:var(--ink);color:var(--ink);}
    .fh-chip{display:inline-flex;align-items:center;padding:3px 9px;border:1.5px solid var(--ink);font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;background:var(--cream);color:var(--ink);}
    .fh-chip--accent{background:var(--accent);color:var(--cream);}
    .fh-chip--ink{background:var(--ink);color:var(--cream);}
    .fh-input{background:var(--cream);border:2px solid var(--ink);padding:11px 14px;color:var(--ink);font-size:15px;font-family:'Libre Franklin',sans-serif;width:100%;border-radius:0;}
    .fh-input:focus{border-color:var(--accent);}
    .fh-input::placeholder{color:rgba(29,41,68,.4);font-style:italic;}
    .fh-select{background:var(--cream);border:2px solid var(--ink);padding:10px 14px;color:var(--ink);font-size:13px;font-family:'Oswald',sans-serif;width:100%;border-radius:0;letter-spacing:.06em;}
    /* Plank scoreboards */
    .fh-plank{background:var(--ink);color:var(--cream);border:2px solid var(--ink);position:relative;padding:14px 12px 12px;flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;overflow:hidden;}
    .fh-plank::before{content:"";position:absolute;inset:4px;border:1px dashed rgba(202,160,71,.35);pointer-events:none;}
    .fh-plank--accent{background:var(--accent);}
    .fh-plank-team{font-family:'Alfa Slab One',serif;font-size:15px;letter-spacing:.03em;text-transform:uppercase;line-height:1;margin-bottom:4px;}
    .fh-plank-players{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.16em;opacity:.7;margin-bottom:8px;}
    .fh-plank-digits{font-family:'Stardos Stencil',sans-serif;font-size:74px;line-height:.85;color:var(--cream);text-shadow:2px 2px 0 rgba(0,0,0,.2);margin:4px 0 2px;}
    .fh-plank-goal{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.14em;opacity:.6;}
    .fh-plank-bar{width:100%;height:4px;background:rgba(255,255,255,.18);margin-top:10px;}
    .fh-plank-bar-fill{height:100%;background:var(--gold);}
    .fh-pennant{position:absolute;top:8px;right:-1px;background:var(--gold);color:var(--ink);font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.12em;padding:3px 7px;border:1.5px solid var(--ink);}
    /* History chips */
    .fh-hist-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;}
    .fh-hist-chip{background:var(--cream);border:1.5px solid var(--ink);padding:5px 9px;font-family:'Libre Franklin',sans-serif;min-width:56px;text-align:center;flex-shrink:0;}
    .fh-hist-r{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.12em;color:var(--ink-soft);}
    .fh-hist-pts{font-family:'Stardos Stencil',sans-serif;font-size:13px;margin-top:1px;}
    /* Match row */
    .fh-match-row{background:var(--cream);border:2px solid var(--ink);padding:12px 14px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;}
    .fh-match-row.live{background:var(--accent);color:var(--cream);}
    /* Bag circles */
    .fh-bag{width:50px;height:50px;border-radius:50%;border:2px solid var(--ink);background:var(--cream);color:var(--ink);font-family:'Alfa Slab One',serif;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .fh-bag--on{background:var(--accent);color:var(--cream);}
    .fh-bag--gold{background:var(--gold);color:var(--ink);}
    /* QR box */
    .fh-qr{width:90px;height:90px;background:var(--cream);border:2px solid var(--ink);display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(7,1fr);padding:4px;gap:1px;flex-shrink:0;}
    .fh-qr>i{background:var(--ink);}
    /* Toggle */
    .fh-toggle{width:44px;height:24px;border-radius:12px;background:#ccc;position:relative;cursor:pointer;flex-shrink:0;border:2px solid var(--ink);}
    .fh-toggle.on{background:var(--accent);}
    .fh-toggle-thumb{position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:var(--cream);transition:left .2s;border:1px solid var(--ink);}
    /* Ribbon */
    .fh-ribbon{display:inline-block;background:var(--accent);color:var(--cream);font-family:'Alfa Slab One',serif;text-transform:uppercase;padding:4px 12px;letter-spacing:.04em;font-size:12px;border:1.5px solid var(--ink);position:relative;}
    .fh-ribbon::before,.fh-ribbon::after{content:"";position:absolute;top:50%;width:9px;height:9px;background:var(--accent-deep);border:1.5px solid var(--ink);transform:translateY(-50%) rotate(45deg);}
    .fh-ribbon::before{left:-6px;}.fh-ribbon::after{right:-6px;}
    /* Winner modal */
    @keyframes champion-glow{0%,100%{box-shadow:0 0 40px #caa04766}50%{box-shadow:0 0 80px #caa047aa}}
  </style>
</head>
<body>
<div id="root" style="max-width:520px;margin:0 auto;padding-bottom:40px;"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
// Init Firebase compat
const app = firebase.initializeApp(FIREBASE_CONFIG);
const db  = firebase.database();
const F   = "'Stardos Stencil', sans-serif";
const FW  = "'Alfa Slab One', serif";
const FA  = "'Oswald', sans-serif";
const FB  = "'Libre Franklin', sans-serif";
const $   = id => document.getElementById(id);
const uid = () => Math.random().toString(36).slice(2,9);
const baseUrl = () => window.location.href.replace(/[^/]*$/, "");

const COLORS = [
  {bg:"#e8654b",s:"#e8654b"},
  {bg:"#1d2944",s:"#1d2944"},
  {bg:"#2c6e49",s:"#2c6e49"},
  {bg:"#7b1fa2",s:"#7b1fa2"},
  {bg:"#caa047",s:"#caa047"},
  {bg:"#006064",s:"#006064"},
];
const GHOST = [{label:"Easy",min:0,max:3},{label:"Medium",min:2,max:6},{label:"Hard",min:4,max:9},{label:"Pro",min:6,max:12}];

let tournoi = null;
let tournoiId = localStorage.getItem("cornhole_admin_id") || null;
let sk = {
  cfg:{
    teamA:{name:"Red Team",colorIdx:0,players:["",""],photo:null},
    teamB:{name:"Blue Team",colorIdx:1,players:["",""],photo:null},
    playersPerTeam:1, gameMode:"standard",
    winScore:21, useWinScore:true,
    maxRounds:null, useMaxRounds:false,
    ghostMode:false, ghostDiff:1, tournamentName:"",
  },
  game:{scores:{a:0,b:0},round:1,history:[],winner:null,entry:{a:{hole:0,board:0},b:{hole:0,board:0}}},
  showScore:false, showStats:false,
};
window.sk = sk;

// ACL Cancellation scoring — règle par défaut
function calcManche(eA, eB) {
  const rawA=eA.hole*3+eA.board, rawB=eB.hole*3+eB.board;
  const d=rawA-rawB;
  return {ptsA:Math.max(0,d), ptsB:Math.max(0,-d), rawA, rawB};
}

// === FLIP COUNTER ===
function flipHTML(value, color, size, id) {
  size = size||60; id = id||"";
  var digits = String(Math.abs(Math.round(value))).padStart(2,"0").split("");
  var fs=Math.round(size*.66), w=Math.round(size*.76);
  return '<div style="display:inline-flex;gap:3px;">'+
    digits.map(function(d,i){
      var eid = id ? 'id="fd-'+id+'-'+i+'"' : '';
      return '<div '+eid+' data-val="'+d+'" style="position:relative;width:'+w+'px;height:'+size+'px;font-size:'+fs+'px;font-family:'+F+';font-weight:900;">'+
        '<div class="fd-top" style="position:absolute;top:0;left:0;right:0;height:50%;overflow:hidden;background:#252525;border-radius:8px 8px 0 0;display:flex;align-items:flex-end;justify-content:center;border-bottom:1.5px solid #111;"><span style="color:'+color+';transform:translateY(50%);display:block;line-height:1;">'+d+'</span></div>'+
        '<div class="fd-bot" style="position:absolute;bottom:0;left:0;right:0;height:50%;overflow:hidden;background:#1e1e1e;border-radius:0 0 8px 8px;display:flex;align-items:flex-start;justify-content:center;"><span style="color:'+color+';transform:translateY(-50%);display:block;line-height:1;">'+d+'</span></div>'+
        '<div class="fd-fold" style="position:absolute;top:0;left:0;right:0;height:50%;overflow:hidden;background:#252525;border-radius:8px 8px 0 0;display:flex;align-items:flex-end;justify-content:center;transform-origin:bottom center;z-index:2;backface-visibility:hidden;"><span style="color:'+color+';transform:translateY(50%);display:block;line-height:1;">'+d+'</span></div>'+
        '<div class="fd-unfold" style="position:absolute;bottom:0;left:0;right:0;height:50%;overflow:hidden;background:#1e1e1e;border-radius:0 0 8px 8px;display:flex;align-items:flex-start;justify-content:center;transform-origin:top center;z-index:2;transform:rotateX(90deg);backface-visibility:hidden;"><span style="color:'+color+';transform:translateY(-50%);display:block;line-height:1;">'+d+'</span></div>'+
      '</div>';
    }).join('')+
  '</div>';
}

function flipDigitTo(el, newVal) {
  if(!el) return;
  var cur=el.dataset.val; if(cur===String(newVal)) return;
  var fold=el.querySelector(".fd-fold"), unfold=el.querySelector(".fd-unfold");
  fold.querySelector("span").textContent=cur;
  unfold.querySelector("span").textContent=newVal;
  el.dataset.val=String(newVal);
  fold.style.animation=unfold.style.animation="none";
  void fold.offsetWidth;
  fold.style.animation="flip-top .2s ease-in forwards";
  unfold.style.animation="flip-bot .2s ease-out .18s forwards";
  setTimeout(function(){
    el.querySelector(".fd-top span").textContent=newVal;
    el.querySelector(".fd-bot span").textContent=newVal;
    fold.style.animation=unfold.style.animation="none";
    fold.querySelector("span").textContent=newVal;
  },450);
}

function flipTo(id, val) {
  String(Math.abs(Math.round(val))).padStart(2,"0").split("").forEach(function(d,i){
    flipDigitTo(document.getElementById("fd-"+id+"-"+i), d);
  });
}

// === ACCUEIL ===
function renderHome() {
  $("root").innerHTML =
    '<div style="padding:24px 18px 0;">'+
      '<div style="display:flex;align-items:flex-end;gap:8px;border-bottom:1.5px solid var(--ink);padding-bottom:10px;margin-bottom:18px;">'+
        '<div>'+
          '<div style="font-family:'+FA+';font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);">Bienvenue au</div>'+
          '<div style="font-family:'+FW+';font-size:28px;color:var(--accent);line-height:.9;">Cornhole</div>'+
        '</div>'+
        '<div style="font-family:'+FW+';font-size:26px;text-transform:uppercase;letter-spacing:.02em;line-height:.95;margin-left:auto;">Field<br/>House</div>'+
      '</div>'+
    '</div>'+
    '<div style="padding:0 18px;display:flex;flex-direction:column;gap:14px;">'+
      card("goSK()", "MODE PARTIE", "Match Local", "1v1 ou 2v2 · Stats · Ghost Mode · Hors ligne", false)+
      card("goTournoi()", "MODE TOURNOI", "Tournoi Live", "Firebase · Multi-terrains · QR unique · Scoreboard TV", true)+
      (tournoiId ?
        '<div class="fh-card" style="padding:10px 14px;background:var(--paper-deep);">'+
          '<div style="display:flex;align-items:center;justify-content:space-between;">'+
            '<div>'+
              '<div class="fh-eyebrow">En cours</div>'+
              '<div style="font-family:'+FW+';font-size:15px;margin-top:2px;">Tournoi en cours</div>'+
            '</div>'+
            '<button onclick="reprendreTournoi()" class="fh-btn fh-btn--gold" style="padding:6px 14px;font-size:11px;">Reprendre</button>'+
          '</div>'+
        '</div>' : "")+
    '</div>'+
    '<div style="text-align:center;font-family:'+FA+';font-size:9px;letter-spacing:.24em;color:var(--ink-soft);opacity:.6;margin-top:auto;padding:24px 0 8px;">FIELD HOUSE · CORNHOLE SCOREKEEPER · v3.0</div>';
}

function card(fn, eyebrow, title, desc, dark) {
  var bg = dark ? 'var(--ink)' : 'var(--cream)';
  var color = dark ? 'var(--cream)' : 'var(--ink)';
  var ebColor = dark ? 'var(--gold)' : 'var(--accent)';
  var btnBg = dark ? 'var(--gold)' : 'var(--accent)';
  var btnColor = dark ? 'var(--ink)' : 'var(--cream)';
  return '<div onclick="'+fn+'" style="background:'+bg+';border:2px solid var(--ink);outline:1px solid var(--ink);outline-offset:3px;padding:16px;cursor:pointer;position:relative;">'+
    '<div style="display:flex;gap:14px;align-items:flex-start;">'+
      '<div style="flex:1;">'+
        '<div style="font-family:'+FA+';font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:'+ebColor+';">'+eyebrow+'</div>'+
        '<div style="font-family:'+FW+';font-size:21px;text-transform:uppercase;letter-spacing:.02em;line-height:1;margin-top:2px;color:'+color+';">'+title+'</div>'+
        '<div style="font-family:'+FB+';font-size:12px;line-height:1.4;color:'+color+';opacity:.75;margin-top:6px;">'+desc+'</div>'+
      '</div>'+
    '</div>'+
    '<div style="margin-top:12px;display:flex;justify-content:flex-end;">'+
      '<div style="display:inline-block;background:'+btnBg+';color:'+btnColor+';font-family:'+FW+';text-transform:uppercase;padding:4px 12px;letter-spacing:.04em;font-size:12px;border:1.5px solid var(--ink);">Jouer →</div>'+
    '</div>'+
  '</div>';
}

function backBtn(fn) {
  return '<button onclick="'+fn+'()" class="fh-btn fh-btn--ghost" style="padding:5px 11px;font-size:11px;">◀ Menu</button>';
}

function toggle(on, fn) {
  return '<div onclick="'+fn+'()" class="fh-toggle '+(on?'on':'')+'" style="background:'+(on?'var(--accent)':'var(--cream)')+';">'+
    '<div class="fh-toggle-thumb" style="left:'+(on?'22px':'3px')+';"></div>'+
  '</div>';
}

window.goSK = function() { renderSKSetup(); };
window.goTournoi = function() { renderSetupTournoi(); };
window.reprendreTournoi = function() { loadTournoi(); };
window.renderHome = renderHome;

// === SCOREKEEPER SETUP ===
function renderSKSetup() {
  var c=sk.cfg, n=c.playersPerTeam;
  var mxOpts=[4,6,8,10,12,14].filter(function(r){return r%n===0;});
  var html='<div style="padding:18px 18px 0;display:flex;align-items:center;gap:10px;margin-bottom:6px;">'+backBtn("renderHome")+
    '<div style="margin-left:8px;"><div class="fh-eyebrow">Scorekeeper</div><div style="font-family:'+FW+';font-size:20px;text-transform:uppercase;">Configuration</div></div></div>'+
    '<div style="padding:0 18px 24px;">';

  // Nom événement
  html+='<div class="fh-eyebrow" style="margin:16px 0 7px;">Nom de l\'événement</div>'+
    '<input value="'+c.tournamentName+'" oninput="sk.cfg.tournamentName=this.value" placeholder="Ex: Open Cornhole 2025" class="fh-input" style="font-size:16px;font-weight:600;margin-bottom:2px;"/>';

  // Format
  html+='<div class="fh-eyebrow" style="margin:16px 0 7px;">Format</div>'+
    '<div style="display:flex;gap:10px;margin-bottom:4px;">'+
    [1,2].map(function(v){
      var sel=n===v;
      return '<button onclick="setSKPPT('+v+')" style="flex:1;padding:14px 0;background:'+(sel?"var(--ink)":"var(--cream)")+';border:2px solid var(--ink);color:'+(sel?"var(--cream)":"var(--ink-soft)")+';font-family:'+FW+';font-size:20px;cursor:pointer;line-height:1;">'+v+'v'+v+'<div style="font-family:'+FA+';font-size:10px;margin-top:3px;letter-spacing:.1em;opacity:.7;">'+(v===1?"Solo":"Duo")+'</div></button>';
    }).join('')+'</div>';

  // Équipes
  html+='<div class="fh-eyebrow" style="margin:16px 0 7px;">Équipes</div>';
  ["teamA","teamB"].forEach(function(key,ki){
    var eq=c[key], cl=COLORS[eq.colorIdx];
    html+='<div class="fh-card" style="margin-bottom:10px;">'+
      '<div class="fh-eyebrow" style="margin-bottom:7px;">Équipe '+(ki===0?"A":"B")+'</div>'+
      '<div style="display:flex;gap:9px;align-items:center;margin-bottom:9px;">'+
        '<div style="position:relative;flex-shrink:0;">'+
          '<div style="width:50px;height:50px;background:'+(eq.photo?"transparent":cl.s)+';border:2px solid var(--ink);overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;">'+
            (eq.photo?'<img src="'+eq.photo+'" style="width:100%;height:100%;object-fit:cover;"/>'  :'<div style="width:100%;height:100%;"></div>')+
          '</div>'+
          '<input type="file" accept="image/*" onchange="setSKPhoto(\''+key+'\',this)" style="position:absolute;inset:0;opacity:0;cursor:pointer;"/>'+
          (eq.photo?'<div onclick="clearSKPhoto(\''+key+'\')" style="position:absolute;top:-5px;right:-5px;width:17px;height:17px;border-radius:50%;background:var(--accent);color:var(--cream);font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:900;border:1px solid var(--ink);">✕</div>':"")  +
        '</div>'+
        '<input value="'+eq.name+'" oninput="sk.cfg.'+key+'.name=this.value" placeholder="Équipe '+(ki===0?"A":"B")+'" class="fh-input" style="flex:1;font-size:15px;font-weight:600;"/>'+
      '</div>'+
      (n===2?'<div style="display:flex;gap:7px;margin-bottom:9px;"><input value="'+(eq.players[0]||"")+'" oninput="sk.cfg.'+key+'.players[0]=this.value" placeholder="Joueur 1" class="fh-input" style="flex:1;font-size:13px;"/><input value="'+(eq.players[1]||"")+'" oninput="sk.cfg.'+key+'.players[1]=this.value" placeholder="Joueur 2" class="fh-input" style="flex:1;font-size:13px;"/></div>'
       :n===1?'<div style="margin-bottom:9px;"><input value="'+(eq.players[0]||"")+'" oninput="sk.cfg.'+key+'.players[0]=this.value" placeholder="Nom du joueur" class="fh-input" style="font-size:13px;"/></div>':"")  +
      '<div style="display:flex;gap:6px;flex-wrap:wrap;">'+
        COLORS.map(function(cl2,ci){
          return '<div onclick="setSKColor(\''+key+'\','+ci+')" style="width:26px;height:26px;background:'+cl2.s+';cursor:pointer;border:'+(eq.colorIdx===ci?"2px solid var(--ink)":"2px solid transparent")+';box-shadow:'+(eq.colorIdx===ci?"0 0 0 1px var(--ink)":"none")+'"></div>';
        }).join('')+
      '</div></div>';
  });

  // Règlement

window.setSKPPT    = function(v){sk.cfg.playersPerTeam=v;renderSKSetup();};
window.setSKPhoto  = function(key,inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){sk.cfg[key].photo=e.target.result;renderSKSetup();};r.readAsDataURL(f);};
window.clearSKPhoto= function(key){sk.cfg[key].photo=null;renderSKSetup();};
window.setSKColor  = function(key,ci){sk.cfg[key].colorIdx=ci;renderSKSetup();};
window.setSKWinScore    = function(w){sk.cfg.winScore=w;renderSKSetup();};
window.toggleSKWinScore = function(){sk.cfg.useWinScore=!sk.cfg.useWinScore;renderSKSetup();};
window.setSKMaxRounds    = function(r){sk.cfg.maxRounds=r;renderSKSetup();};
window.toggleSKMaxRounds = function(){sk.cfg.useMaxRounds=!sk.cfg.useMaxRounds;renderSKSetup();};
window.toggleSKBust  = function(){sk.cfg.gameMode=sk.cfg.gameMode==="bust"?"standard":"bust";renderSKSetup();};
window.toggleSKGhost = function(){sk.cfg.ghostMode=!sk.cfg.ghostMode;renderSKSetup();};
window.setSKGhostDiff= function(i){sk.cfg.ghostDiff=i;renderSKSetup();};
window.startSKGame   = function(){
  sk.game={scores:{a:0,b:0},round:1,history:[],winner:null,entry:{a:{hole:0,board:0},b:{hole:0,board:0}}};
  sk.showScore=false;sk.showStats=false;renderSKGame();
};

// === SCOREKEEPER GAME ===
function renderSKGame() {
  var c=sk.cfg, g=sk.game;
  var cA=COLORS[c.teamA.colorIdx], cB=COLORS[c.teamB.colorIdx];
  var ghost=GHOST[c.ghostDiff];
  var isLast=c.useMaxRounds&&c.maxRounds&&g.round===c.maxRounds;

  function scorePanel(name,score,col,lead,photo,players,pid,forceAccent){
    var plankClass = forceAccent ? "fh-plank fh-plank--accent" : "fh-plank";
    return '<div class="'+plankClass+'" style="'+(col.s&&!forceAccent?"background:"+col.s:"")+'">'+
      (lead?'<div class="fh-pennant">★ EN TÊTE</div>':"")+
      (photo?'<img src="'+photo+'" style="width:36px;height:36px;object-fit:cover;border:2px solid rgba(255,255,255,.4);margin-bottom:4px;"/>':"")+
      '<div class="fh-plank-team">'+name+'</div>'+
      (c.playersPerTeam===2&&players&&players.filter(function(p){return p;}).length?'<div class="fh-plank-players">'+players.filter(function(p){return p;}).slice(0,2).join(" · ")+'</div>':"")+
      '<div class="fh-plank-digits" id="'+pid+'">'+String(Math.abs(Math.round(score))).padStart(2,"0")+'</div>'+
      '<div class="fh-plank-goal">/ '+c.winScore+' pts</div>'+
      '<div class="fh-plank-bar"><div class="fh-plank-bar-fill" style="width:'+Math.min((score/(c.winScore||21))*100,100)+'%;transition:width .5s;"></div></div>'+
    '</div>';
  }

  var html=
    '<div style="padding:13px 14px 0;display:flex;align-items:center;justify-content:space-between;">'+
      '<button onclick="renderSKSetup()" class="fh-btn fh-btn--ghost" style="padding:5px 11px;font-size:11px;">◀ Setup</button>'+
      '<div style="text-align:center;">'+(c.tournamentName?'<div class="fh-eyebrow" style="font-size:9px;">'+c.tournamentName+'</div>':"")+
        '<div style="font-family:'+FA+';font-size:10px;letter-spacing:.24em;color:var(--ink-soft);">CORNHOLE · ACL SCORING</div></div>'+
      '<div class="fh-chip fh-chip--ink" style="font-size:10px;">'+(c.useMaxRounds?g.round+"/"+c.maxRounds:"R"+g.round)+'</div>'+
    '</div>';

  if(isLast){
    html+='<div style="margin:8px 14px 0;background:var(--accent);border:2px solid var(--ink);padding:8px 14px;text-align:center;animation:last-round-pulse 1.2s ease-in-out infinite;">'+
      '<div style="font-family:'+FW+';font-size:13px;color:var(--cream);text-transform:uppercase;letter-spacing:.06em;">⚠ DERNIÈRE MANCHE</div></div>';
  }

  var badges=[c.playersPerTeam+"v"+c.playersPerTeam,"ACL Cancel.",c.gameMode==="bust"&&"BUST →15",c.ghostMode&&ghost.label+" Ghost",c.useMaxRounds&&c.maxRounds+" manches"].filter(Boolean);
  html+='<div style="padding:6px 14px;display:flex;gap:5px;flex-wrap:wrap;">'+
    badges.map(function(b){return '<span class="fh-chip" style="font-size:9px;">'+b+'</span>';}).join('')+'</div>';

  html+='<div style="padding:0 14px;display:flex;gap:10px;min-height:200px;">'+
    scorePanel(c.teamA.name,g.scores.a,cA,g.scores.a>g.scores.b,c.teamA.photo,c.teamA.players,"sk-a",g.scores.a>g.scores.b)+
    (c.ghostMode?
      '<div class="fh-plank" style="opacity:.75;">'+
        '<div class="fh-plank-team">Ghost</div>'+
        '<div class="fh-plank-digits" id="sk-b">'+String(Math.abs(Math.round(g.scores.b))).padStart(2,"0")+'</div>'+
        '<div class="fh-plank-bar"><div class="fh-plank-bar-fill" style="width:'+Math.min((g.scores.b/(c.winScore||21))*100,100)+'%;"></div></div>'+
      '</div>'
      :scorePanel(c.teamB.name,g.scores.b,cB,g.scores.b>g.scores.a,c.teamB.photo,c.teamB.players,"sk-b",g.scores.b>g.scores.a))+
  '</div>';

  if(g.history.length){
    html+='<div style="padding:8px 14px 0;">'+
      '<div class="fh-eyebrow" style="margin-bottom:6px;">Historique des manches</div>'+
      '<div class="fh-hist-row">'+
      g.history.slice().reverse().map(function(h){
        return '<div class="fh-hist-chip">'+
          '<div class="fh-hist-r">R'+h.round+'</div>'+
          '<div class="fh-hist-pts"><span style="color:var(--accent-deep);">+'+h.pts.a+'</span><span style="color:var(--ink-soft);margin:0 2px;">|</span><span style="color:var(--ink);">+'+h.pts.b+'</span></div>'+
        '</div>';
      }).join('')+'</div></div>';
  }

  html+='<div style="padding:14px;display:flex;gap:7px;">'+
    '<button onclick="skStats()" class="fh-btn fh-btn--ghost" style="flex:1;padding:11px 0;font-size:13px;">📊</button>'+
    '<button onclick="skUndo()" '+(g.history.length?"":"disabled")+' class="fh-btn fh-btn--ghost" style="flex:1;padding:11px 0;font-size:13px;'+(g.history.length?"":"opacity:.35;cursor:not-allowed;")+'">↩</button>'+
    '<button onclick="skReset()" class="fh-btn fh-btn--ghost" style="flex:1;padding:11px 0;font-size:13px;">↺</button>'+
    '<button onclick="skOpenScore()" class="fh-btn fh-btn--accent" style="flex:3;padding:11px 0;font-size:13px;letter-spacing:.1em;">+ SAISIR LES SACS</button>'+
  '</div>';

  if(sk.showScore) html+=renderSKScoreModal();
  if(sk.showStats) html+=renderSKStatsModal();
  if(g.winner&&g.winner!=="tie") html+=renderSKWinner();
  if(g.winner==="tie") html+=renderSKTie();
  $("root").innerHTML=html;
}

function renderSKStatsModal() {
  var c=sk.cfg, g=sk.game, h=g.history;
  var cA=COLORS[c.teamA.colorIdx], cB=COLORS[c.teamB.colorIdx];
  var totA=h.reduce(function(s,x){return s+x.raw.a;},0);
  var totB=h.reduce(function(s,x){return s+x.raw.b;},0);

  var avgB=h.length?(g.scores.b/h.length).toFixed(1):"0.0";
  function statRow(label,a,b){
    var tot=(Number(a)+Number(b))||1, pct=Math.round(Number(a)/tot*100);
    return '<div style="border:1.5px solid var(--ink);padding:9px 13px;margin-bottom:7px;">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:5px;align-items:center;">'+

        '<span style="font-family:'+FW+';font-size:15px;color:'+cB.s+';">'+b+'</span>'+
      '</div>'+
      '<div style="display:flex;height:5px;">'+
        '<div style="width:'+pct+'%;background:'+cA.s+';"></div>'+
        '<div style="width:'+(100-pct)+'%;background:'+cB.s+';"></div>'+
      '</div>'+
    '</div>';
  }
  return '<div style="position:fixed;inset:0;background:rgba(29,41,68,.88);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(3px);">'+

window.setSKEntry = function(key,type,val){
  sk.game.entry[key][type]=sk.game.entry[key][type]===val?0:val;
  renderSKGame();
  var m=calcManche(sk.game.entry.a,sk.game.entry.b);
  setTimeout(function(){ flipTo("modal-ra",m.rawA); flipTo("modal-rb",m.rawB); flipTo("modal-a",m.ptsA); flipTo("modal-b",m.ptsB); },20);
};
window.skOpenScore  = function(){sk.showScore=true; renderSKGame();};
window.skCloseScore = function(){sk.showScore=false; sk.game.entry={a:{hole:0,board:0},b:{hole:0,board:0}}; renderSKGame();};
window.skStats      = function(){sk.showStats=true; renderSKGame();};
window.skCloseStats = function(){sk.showStats=false; renderSKGame();};
window.skUndo = function(){
  if(!sk.game.history.length)return;
  var last=sk.game.history[sk.game.history.length-1];
  sk.game.scores={a:last.before.a,b:last.before.b};
  sk.game.round=last.round;
  sk.game.history=sk.game.history.slice(0,-1);
  sk.game.winner=null; renderSKGame();
};
window.skReset = function(){
  sk.game={scores:{a:0,b:0},round:1,history:[],winner:null,entry:{a:{hole:0,board:0},b:{hole:0,board:0}}};
  sk.showScore=false; renderSKGame();
};
window.skSaveRound = function(){
  var c=sk.cfg, g=sk.game;
  var m=calcManche(g.entry.a,g.entry.b);
  var ghost=GHOST[c.ghostDiff];
  var gPts=c.ghostMode?Math.floor(Math.random()*(ghost.max-ghost.min+1))+ghost.min:m.ptsB;
  var nA=g.scores.a+m.ptsA, nB=g.scores.b+(c.ghostMode?gPts:m.ptsB);
  if(c.gameMode==="bust"){if(nA>c.winScore)nA=15; if(nB>c.winScore)nB=15;}
  var hist=g.history.concat([{round:g.round,entry:JSON.parse(JSON.stringify(g.entry)),pts:{a:m.ptsA,b:c.ghostMode?gPts:m.ptsB},raw:{a:m.rawA,b:m.rawB},before:{a:g.scores.a,b:g.scores.b}}]);
  var nR=g.round+1, winner=null;
  if(c.useWinScore){
    if(nA>=c.winScore&&nA>nB)winner="a";
    else if(nB>=c.winScore&&nB>nA)winner="b";
    else if(nA>=c.winScore&&nB>=c.winScore)winner=nA>=nB?"a":"b";
  }
  if(!winner&&c.useMaxRounds&&nR>c.maxRounds){
    if(nA>nB)winner="a"; else if(nB>nA)winner="b"; else winner="tie";
  }
  sk.game={scores:{a:nA,b:nB},round:nR,history:hist,winner:winner,entry:{a:{hole:0,board:0},b:{hole:0,board:0}}};
  sk.showScore=false; renderSKGame();
  setTimeout(function(){flipTo("sk-a",nA); flipTo("sk-b",nB);},30);
};

window.creerTournoi = function() {
  var nom=($("tNom")&&$("tNom").value.trim())||"Tournoi Cornhole";

  var nT=parseInt(($("tTerrains")&&$("tTerrains").value)||2);
  var win=parseInt(($("tWin")&&$("tWin").value)||21);
  var maxR=parseInt(($("tMaxR")&&$("tMaxR").value)||"")||null;
  var id=uid();
  db.ref("tournois/"+id).set({nom:nom,ppt:ppt,nTerrains:nT,winScore:win,maxRounds:maxR,cree:Date.now(),statut:"en_cours",equipes:{},matchs:{}});

function matchCard(id, m, eqMap) {
  var home=eqMap[m.homeId]?eqMap[m.homeId].nom:"?";
  var away=eqMap[m.awayId]?eqMap[m.awayId].nom:"?";
  var live=m.statut==="en_cours", done=m.statut==="termine";
  var sl=live?"⚡ EN COURS":done?"✅ TERMINÉ":"⏳ PRÉVU";
  var chipClass=live?"fh-chip--accent":done?"fh-chip--ink":"fh-chip";
  return '<div class="fh-match-row'+(live?" live":"")+(done?" done":"")+'" style="margin-bottom:8px;'+(done?"opacity:.7;":"")+'">' +
    '<div style="grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'+
      '<div class="fh-eyebrow">Terrain '+m.terrain+'</div>'+
      '<div class="fh-chip '+chipClass+'" style="font-size:9px;">'+sl+'</div>'+
    '</div>'+
    '<div style="text-align:left;">'+
      '<div style="font-family:'+FW+';font-size:13px;text-transform:uppercase;'+(live?"color:var(--cream);":"")+'">'+home+'</div>'+
      '<div class="fh-eyebrow" style="font-size:8px;'+(live?"color:rgba(247,238,219,.6);":"")+'">HOME</div>'+
    '</div>'+
    (m.statut!=="prevu"?
      '<div style="text-align:center;flex-shrink:0;">'+
        '<div style="font-family:'+FW+';font-size:26px;'+(live?"color:var(--cream);":"")+'">'+
          (m.scoreHome||0)+'<span style="opacity:.3;margin:0 3px;">–</span>'+(m.scoreAway||0)+
        '</div>'+
        '<div class="fh-eyebrow" style="font-size:8px;'+(live?"color:rgba(247,238,219,.6);":"")+'">R'+(m.round||1)+'</div>'+
      '</div>'
      :'<div style="font-family:'+FW+';font-size:16px;text-align:center;opacity:.3;">vs</div>')+
    '<div style="text-align:right;">'+
      '<div style="font-family:'+FW+';font-size:13px;text-transform:uppercase;'+(live?"color:var(--cream);":"")+'">'+away+'</div>'+
      '<div class="fh-eyebrow" style="font-size:8px;'+(live?"color:rgba(247,238,219,.6);":"")+'">AWAY</div>'+
    '</div>'+
    '<div style="grid-column:1/-1;display:flex;gap:6px;margin-top:4px;">'+
      (m.statut==="prevu"?'<button onclick="lancerMatch(\''+id+'\')" class="fh-btn fh-btn--gold" style="flex:1;padding:7px;font-size:11px;">▶ Lancer</button>':"")+
      (m.statut==="en_cours"?'<button onclick="terminerMatch(\''+id+'\')" class="fh-btn fh-btn--ghost" style="flex:1;padding:7px;font-size:11px;color:var(--cream);border-color:var(--cream);">✓ Terminer</button>':"")+
      '<button onclick="supprimerMatch(\''+id+'\')" class="fh-btn fh-btn--ghost" style="padding:7px 11px;font-size:11px;color:var(--accent);border-color:var(--accent);">🗑</button>'+
    '</div>'+
  '</div>';
}

window.prevEqPhoto=function(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){eqPhotoB64=e.target.result;var p=$("eq-photo-prev");if(p)p.innerHTML='<img src="'+eqPhotoB64+'" style="width:100%;height:100%;object-fit:cover;border-radius:6px;"/>';};r.readAsDataURL(f);};

window.ajouterEq    = function(){
  var nom=($("eq-nom")&&$("eq-nom").value.trim())||"";
  if(!nom){alert("Entre le nom !");return;}
  var j1=($("eq-j1")&&$("eq-j1").value.trim())||"";
  var j2=($("eq-j2")&&$("eq-j2").value.trim())||"";
  var ref=db.ref("tournois/"+tournoiId+"/equipes").push();
  ref.set({nom:nom,joueurs:[j1,j2].filter(function(j){return j;}),photo:eqPhotoB64||null,inscrit:Date.now()});
  eqPhotoB64=null;
};
window.supprimerEq  = function(eid){if(!confirm("Supprimer cette équipe ?"))return;db.ref("tournois/"+tournoiId+"/equipes/"+eid).remove();};
window.showAddMatch  = function(){var el=$("form-match");if(el)el.style.display="block";};
window.hideAddMatch  = function(){var el=$("form-match");if(el)el.style.display="none";};
window.ajouterMatch  = function(){
  var homeId=($("m-home")&&$("m-home").value)||"";
  var awayId=($("m-away")&&$("m-away").value)||"";
  var terrain=($("m-terrain")&&$("m-terrain").value)||"";
  if(!homeId||!awayId||!terrain){alert("Sélectionne Home, Away et Terrain !");return;}
  if(homeId===awayId){alert("Les deux équipes doivent être différentes !");return;}
  var ref=db.ref("tournois/"+tournoiId+"/matchs").push();
  ref.set({homeId:homeId,awayId:awayId,terrain:parseInt(terrain),winScore:tournoi.winScore,maxRounds:tournoi.maxRounds||null,scoreHome:0,scoreAway:0,round:1,statut:"prevu",cree:Date.now()});
  var el=$("form-match");if(el)el.style.display="none";
};
window.lancerMatch   = function(id){db.ref("tournois/"+tournoiId+"/matchs/"+id).update({statut:"en_cours"});};
window.terminerMatch = function(id){if(!confirm("Terminer ce match ?"))return;db.ref("tournois/"+tournoiId+"/matchs/"+id).update({statut:"termine"});};
window.supprimerMatch= function(id){if(!confirm("Supprimer ?"))return;db.ref("tournois/"+tournoiId+"/matchs/"+id).remove();};
window.supprimerTournoi=function(){if(!confirm("Supprimer définitivement ce tournoi ?\nIrréversible."))return;db.ref("tournois/"+tournoiId).remove();tournoiId=null;localStorage.removeItem("cornhole_admin_id");tournoi=null;renderHome();};

// Init
renderHome();
</script>
</body>
