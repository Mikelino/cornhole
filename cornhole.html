// Génère le HTML d'un flip counter (appelé une seule fois par render)
function flipHTML(value, color, size=64, id="") {
  const digits = String(Math.abs(Math.round(value))).padStart(2,"0").split("");
  const fs = Math.round(size * 0.66);
  const w  = Math.round(size * 0.76);
  return `<div class="flip-wrap" style="display:inline-flex;gap:3px;perspective:600px;">
    ${digits.map((d,i) => `
      <div class="flip-digit" id="${id?`fd-${id}-${i}`:""}" data-val="${d}"
           style="position:relative;width:${w}px;height:${size}px;font-size:${fs}px;font-family:'Barlow Condensed',sans-serif;font-weight:900;">
        <div class="fd-top" style="position:absolute;top:0;left:0;right:0;height:50%;overflow:hidden;
             background:#222;border-radius:8px 8px 0 0;
             display:flex;align-items:flex-end;justify-content:center;
             border-bottom:1.5px solid #111;">
          <span style="color:${color};transform:translateY(50%);display:block;line-height:1;">${d}</span>
        </div>
        <div class="fd-bot" style="position:absolute;bottom:0;left:0;right:0;height:50%;overflow:hidden;
             background:#1a1a1a;border-radius:0 0 8px 8px;
             display:flex;align-items:flex-start;justify-content:center;">
          <span style="color:${color};transform:translateY(-50%);display:block;line-height:1;">${d}</span>
        </div>
        <div class="fd-fold" style="position:absolute;top:0;left:0;right:0;height:50%;overflow:hidden;
             background:#222;border-radius:8px 8px 0 0;
             display:flex;align-items:flex-end;justify-content:center;
             transform-origin:bottom center;z-index:2;backface-visibility:hidden;
             box-shadow:0 2px 6px rgba(0,0,0,.4);">
          <span style="color:${color};transform:translateY(50%);display:block;line-height:1;">${d}</span>
        </div>
        <div class="fd-unfold" style="position:absolute;bottom:0;left:0;right:0;height:50%;overflow:hidden;
             background:#1a1a1a;border-radius:0 0 8px 8px;
             display:flex;align-items:flex-start;justify-content:center;
             transform-origin:top center;z-index:2;transform:rotateX(90deg);backface-visibility:hidden;">
          <span style="color:${color};transform:translateY(-50%);display:block;line-height:1;">${d}</span>
        </div>
      </div>`).join("")}
  </div>`;
}

// Anime un seul digit vers une nouvelle valeur (sans recréer le DOM)
function flipDigitTo(el, newVal) {
  if (!el) return;
  const cur = el.dataset.val;
  if (cur === String(newVal)) return;
  const fold   = el.querySelector(".fd-fold span");
  const unfold = el.querySelector(".fd-unfold span");
  const top    = el.querySelector(".fd-top span");
  const bot    = el.querySelector(".fd-bot span");
  const foldEl   = el.querySelector(".fd-fold");
  const unfoldEl = el.querySelector(".fd-unfold");

  // Préparer : fold affiche l'ancienne valeur, unfold affiche la nouvelle
  fold.textContent   = cur;
  unfold.textContent = newVal;
  el.dataset.val = String(newVal);

  // Reset animations
  foldEl.style.animation   = "none";
  unfoldEl.style.animation = "none";
  void foldEl.offsetWidth; // reflow

  // Lancer
  foldEl.style.animation   = "flip-top .2s ease-in forwards";
  unfoldEl.style.animation = "flip-bot .2s ease-out .2s forwards";

  // Mettre à jour top/bot (valeurs statiques) après l'anim
  setTimeout(() => {
    top.textContent = newVal;
    bot.textContent = newVal;
    foldEl.style.animation   = "none";
    unfoldEl.style.animation = "none";
    // Remettre fold sur la nouvelle valeur pour le prochain flip
    fold.textContent = newVal;
  }, 450);
}

// Anime un compteur complet (2 digits) par son id
function flipTo(id, newValue) {
  const digits = String(Math.abs(Math.round(newValue))).padStart(2,"0").split("");
  digits.forEach((d, i) => {
    const el = document.getElementById(`fd-${id}-${i}`);
    if (el) flipDigitTo(el, d);
  });
}

// Wrapper avec fond coloré et label
function flipScoreHTML(value, color, label, id, size=56) {

      <div style="margin-bottom:5px;">${flipHTML(value, color, size, id)}</div>
      <div style="font-size:10px;color:${color};opacity:.6;letter-spacing:2px;">${label}</div>
    </div>`;
}

function calcPts(entry, cancel) {
  const ra=entry.a.hole*3+entry.a.board, rb=entry.b.hole*3+entry.b.board;
  if(cancel){const d=ra-rb;return{a:Math.max(0,d),b:Math.max(0,-d)};}
  return{a:ra,b:rb};
}

      <div style="flex:1;background:#0d0d0d;border-radius:4px;height:4px;overflow:hidden;"><div class="bar-b" style="width:${Math.min((m.scoreB/m.winScore)*100,100)}%;background:#1d6fa4;height:4px;float:right;transition:width .6s;"></div></div>
    </div>
    ${gagnant
      ? `<div style="background:linear-gradient(135deg,#b37700,#f4a100);border-radius:10px;padding:10px;text-align:center;margin-bottom:10px;"><div style="font-size:16px;font-weight:900;color:#000;">🏆 ${gagnant} GAGNE !</div></div>`
      : renderSaisieSection(m, st)

function renderCarteTermineeSimple(m) {

      <div><span style="font-size:22px;font-weight:900;color:#e63946;">${m.scoreA}</span><span style="color:#222;margin:0 4px;">–</span><span style="font-size:22px;font-weight:900;color:#1d6fa4;">${m.scoreB}</span></div>

window.ajouterMatchSimple=()=>{
  const nomA=$("sNomA").value.trim(),nomB=$("sNomB").value.trim();
  if(!nomA||!nomB){alert("Entre les deux noms !");return;}
  matchsSimple.unshift({id:uid(),nomA,nomB,terrain:$("sTerrain").value,winScore:parseInt($("sWin").value)||21,cancellation:$("sCancel").checked,scoreA:0,scoreB:0,round:1,termine:false});
  saveSimple();$("sNomA").value="";$("sNomB").value="";renderListeSimple();
};
window.setSacsSimple=(id,eq,type,val)=>{
  if(!sacsEnCours[id])sacsEnCours[id]={A:{trou:0,plateau:0},B:{trou:0,plateau:0}};
  sacsEnCours[id][eq][type]=sacsEnCours[id][eq][type]===val?0:val;
  const m = matchsSimple.find(x=>x.id===id);
  const sect = document.querySelector(`#carte-${id} .saisie-sect`);
  if(sect && m){
    sect.outerHTML = renderSaisieSection(m, sacsEnCours[id]);
    // Animer les flip des points manche
    const st=sacsEnCours[id];
    const rawA=st.A.trou*3+st.A.plateau, rawB=st.B.trou*3+st.B.plateau;
    const ptsA=m.cancellation?Math.max(0,rawA-rawB):rawA;
    const ptsB=m.cancellation?Math.max(0,rawB-rawA):rawB;
    setTimeout(()=>{
      flipTo(`pts-${id}-a`, ptsA);
      flipTo(`pts-${id}-b`, ptsB);
    }, 20);
  } else renderListeSimple();
};
window.annulerSaisie=(id)=>{
  sacsEnCours[id]={A:{trou:0,plateau:0},B:{trou:0,plateau:0}};
  const m = matchsSimple.find(x=>x.id===id);
  const sect = document.querySelector(`#carte-${id} .saisie-sect`);
  if(sect && m) sect.outerHTML = renderSaisieSection(m, sacsEnCours[id]);
  else renderListeSimple();
};
window.validerMancheSimple=(id)=>{
  const m=matchsSimple.find(x=>x.id===id);if(!m)return;
  const st=sacsEnCours[id]||{A:{trou:0,plateau:0},B:{trou:0,plateau:0}};
  const rawA=st.A.trou*3+st.A.plateau,rawB=st.B.trou*3+st.B.plateau;
  const ptsA=m.cancellation?Math.max(0,rawA-rawB):rawA;
  const ptsB=m.cancellation?Math.max(0,rawB-rawA):rawB;
  m.scoreA+=ptsA;m.scoreB+=ptsB;m.round++;
  if(m.scoreA>=m.winScore||m.scoreB>=m.winScore)m.termine=true;
  sacsEnCours[id]={A:{trou:0,plateau:0},B:{trou:0,plateau:0}};
  saveSimple();

  if(m.termine){
    // Partie terminée : re-render complet pour afficher le banner gagnant
    renderListeSimple();
  } else {
    // Pas terminée : flip in-place, puis re-render les boutons seulement
    if(ptsA>0) flipTo(`s-${id}-a`, m.scoreA);
    if(ptsB>0) flipTo(`s-${id}-b`, m.scoreB);
    // Mettre à jour les barres de progression sans full re-render
    const barA = document.querySelector(`#carte-${id} .bar-a`);
    const barB = document.querySelector(`#carte-${id} .bar-b`);
    if(barA) barA.style.width = Math.min((m.scoreA/m.winScore)*100,100)+"%";
    if(barB) barB.style.width = Math.min((m.scoreB/m.winScore)*100,100)+"%";
    // Re-render uniquement la section saisie pour le round suivant
    const saisieSect = document.querySelector(`#carte-${id} .saisie-sect`);
    if(saisieSect) saisieSect.outerHTML = renderSaisieSection(m, sacsEnCours[id]||{A:{trou:0,plateau:0},B:{trou:0,plateau:0}});
    // Mettre à jour le numéro de manche
    const infoEl = document.querySelector(`#carte-${id} .match-info`);
    if(infoEl) infoEl.innerHTML = `${m.terrain?m.terrain+" · ":""}${m.winScore}pts · Manche ${m.round}${m.cancellation?" · <span style='color:#f4a100;font-size:10px;'>ACL</span>":""}`;
  }
};
function animScore(elId){const el=document.getElementById(elId);if(!el)return;el.classList.remove("score-pop");void el.offsetWidth;el.classList.add("score-pop");}
window.supprimerMatchSimple=(id)=>{if(!confirm("Supprimer ce match ?"))return;matchsSimple=matchsSimple.filter(m=>m.id!==id);delete sacsEnCours[id];saveSimple();renderListeSimple();};
window.revancher=(id)=>{const o=matchsSimple.find(m=>m.id===id);if(!o)return;matchsSimple.unshift({id:uid(),nomA:o.nomA,nomB:o.nomB,terrain:o.terrain,winScore:o.winScore,cancellation:o.cancellation,scoreA:0,scoreB:0,round:1,termine:false});saveSimple();renderListeSimple();};
window.renderHome=renderHome;
window.renderSimple=renderSimple;

function renderSKGame(){
  const c=sk.cfg,g=sk.game;
  const cA=COLORS[c.teamA.colorIdx],cB=COLORS[c.teamB.colorIdx];

  const prev=calcPts(g.entry,c.cancellation);
  const ghost=GHOST_PRESET();

  const scorePanel=(name,score,col,lead,photo,players,panelId)=>`
    <div style="flex:1;background:${col.bg};border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 10px;box-shadow:0 8px 32px ${col.s}44;position:relative;overflow:hidden;">

      ${photo?`<img src="${photo}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.4);margin-bottom:4px;"/>` : ""}
      <div style="font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.8);margin-bottom:8px;text-align:center;max-width:90%;line-height:1.1;">${name}</div>
      ${c.playersPerTeam===2&&players?.filter(p=>p).length>0?`<div style="font-size:9px;color:rgba(255,255,255,.4);margin-bottom:6px;">${players.filter(p=>p).slice(0,2).join(" · ")}</div>`:""}
      <div style="margin:4px 0;">${flipHTML(score,"#fff",72,panelId)}</div>
      <div style="font-size:10px;color:rgba(255,255,255,.45);margin-top:4px;">/ ${c.winScore} pts</div>
      <div style="width:100%;background:rgba(0,0,0,.2);border-radius:6px;height:5px;margin-top:8px;"><div style="width:${Math.min((score/c.winScore)*100,100)}%;background:#fff;border-radius:6px;height:5px;opacity:.8;transition:width .5s ease;"></div></div>
    </div>`;

  $("root").innerHTML=`
    <div style="padding:13px 14px 0;display:flex;align-items:center;justify-content:space-between;">
      <button onclick="renderSKSetup()" style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:9px;padding:5px 11px;color:#aaa;font-size:12px;font-weight:700;cursor:pointer;">◀ Setup</button>
      <div style="text-align:center;">
        ${c.tournamentName?`<div style="font-size:10px;color:#f4a100;letter-spacing:2px;font-weight:700;">🏆 ${c.tournamentName}</div>`:""}
        <div style="font-size:10px;letter-spacing:3px;color:#444;">CORNHOLE SCOREKEEPER</div>
      </div>
      <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:9px;padding:5px 11px;font-size:12px;font-weight:700;color:#aaa;">${c.useMaxRounds?`${g.round-1}/${c.maxRounds}`:`R${g.round}`}</div>
    </div>
    <div style="padding:6px 14px;display:flex;gap:5px;flex-wrap:wrap;">
      ${[`${c.playersPerTeam}v${c.playersPerTeam}`,c.cancellation&&"ACL CANCEL.",c.gameMode==="bust"&&"BUST +21→15",c.ghostMode&&`👻 ${ghost.label}`,c.useMaxRounds&&`${Math.round(c.maxRounds/c.playersPerTeam)}×/j`].filter(Boolean).map(b=>`<div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:18px;padding:2px 9px;font-size:10px;color:#aaa;letter-spacing:1px;font-weight:700;">${b}</div>`).join("")}
    </div>
    <div style="padding:0 14px;display:flex;gap:9px;flex:1;min-height:200px;">
      ${scorePanel(c.teamA.name,g.scores.a,cA,g.scores.a>g.scores.b,c.teamA.photo,c.teamA.players,"sk-a")}
      ${c.ghostMode
        ?`<div style="flex:1;background:#1a1a1a;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 10px;border:1px solid #2a2a2a;position:relative;"><div style="position:absolute;top:8px;right:8px;font-size:18px;">👻</div><div style="font-size:11px;font-weight:800;letter-spacing:2px;color:#444;margin-bottom:2px;">GHOST</div><div style="font-size:76px;font-weight:900;line-height:1;color:#444;">${g.scores.b}</div></div>`
        :scorePanel(c.teamB.name,g.scores.b,cB,g.scores.b>g.scores.a,c.teamB.photo,c.teamB.players,"sk-b")
      }
    </div>
    ${g.history.length?`<div style="padding:10px 14px 0;"><div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;">${g.history.slice().reverse().map(h=>`<div style="background:#1a1a1a;border-radius:7px;padding:5px 9px;min-width:56px;text-align:center;border:1px solid #222;flex-shrink:0;"><div style="font-size:9px;color:#444;margin-bottom:1px;">R${h.round}</div><div style="font-size:12px;font-weight:700;"><span style="color:${cA.s};">+${h.pts.a}</span><span style="color:#333;margin:0 2px;">|</span><span style="color:${c.ghostMode?"#555":cB.s};">+${h.pts.b}</span></div></div>`).join("")}</div></div>`:""}
    ${c.sponsors.length?`<div style="margin:8px 14px 0;background:#111;border-radius:9px;padding:5px 0;overflow:hidden;border:1px solid #1e1e1e;"><div style="display:flex;animation:ticker ${c.sponsors.length*4}s linear infinite;width:max-content;">${[...c.sponsors,...c.sponsors].map(sp=>`<div style="display:flex;align-items:center;gap:7px;padding:0 20px;border-right:1px solid #222;flex-shrink:0;">${sp.logo?`<img src="${sp.logo}" style="height:20px;width:auto;object-fit:contain;opacity:.8;"/>`:""}${sp.name?`<span style="font-size:12px;font-weight:700;color:#555;letter-spacing:1px;white-space:nowrap;">${sp.name}</span>`:""}</div>`).join("")}</div></div>`:""}
    <div style="padding:14px;display:flex;gap:7px;">
      <button onclick="skShowStats()" style="flex:1;padding:11px 0;border-radius:11px;background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;font-size:13px;font-weight:700;cursor:pointer;">📊</button>
      <button onclick="skUndo()" ${!g.history.length?"disabled":""} style="flex:1;padding:11px 0;border-radius:11px;background:#1a1a1a;border:1px solid #2a2a2a;color:${g.history.length?"#aaa":"#333"};font-size:13px;font-weight:700;cursor:${g.history.length?"pointer":"not-allowed"};">↩</button>
      <button onclick="skReset()" style="flex:1;padding:11px 0;border-radius:11px;background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;font-size:13px;font-weight:700;cursor:pointer;">↺</button>
      <button onclick="skOpenScore()" style="flex:3;padding:11px 0;border-radius:11px;background:linear-gradient(135deg,#f4a100,#f77f00);border:none;color:#000;font-size:15px;font-weight:900;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 20px rgba(244,161,0,.3);">+ Score</button>
    </div>
    ${sk.showScore?renderSKScoreModal():""}
    ${sk.showStats?renderSKStatsModal():""}
    ${g.winner&&g.winner!=="tie"?renderSKWinner():""}
    ${g.winner==="tie"?renderSKTie():""}`;
}

      ${c.cancellation&&(g.entry.a.hole+g.entry.a.board+g.entry.b.hole+g.entry.b.board)>0?`<div style="background:#0d0d0d;border-radius:10px;padding:8px 12px;margin-bottom:12px;border:1px solid #1a1a1a;display:flex;justify-content:space-between;align-items:center;"><div style="font-size:11px;color:#555;">ACL Cancellation</div><div style="font-size:13px;font-weight:700;"><span style="color:${cA.s};">+${prev.a}</span><span style="color:#333;margin:0 6px;">|</span><span style="color:${cB.s};">+${prev.b}</span><span style="font-size:10px;color:#444;margin-left:6px;">(brut: ${g.entry.a.hole*3+g.entry.a.board}–${g.entry.b.hole*3+g.entry.b.board})</span></div></div>`:""}

function renderSKStatsModal(){
  const c=sk.cfg,g=sk.game,h=g.history;
  const cA=COLORS[c.teamA.colorIdx],cB=COLORS[c.teamB.colorIdx];
  const hA=h.reduce((a,x)=>a+x.entry.a.hole,0),hB=h.reduce((a,x)=>a+x.entry.b.hole,0);
  const bA=h.reduce((a,x)=>a+x.entry.a.board,0),bB=h.reduce((a,x)=>a+x.entry.b.board,0);
  const rp=h.length;
  return`<div style="position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(4px);">
    <div style="background:#111;border-radius:18px;padding:22px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.8);border:1px solid #2a2a2a;max-height:90vh;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div style="font-size:19px;font-weight:900;letter-spacing:1px;">Statistiques</div>
        <div style="background:#1a1a1a;border:1px solid #333;border-radius:7px;padding:3px 9px;font-size:12px;color:#aaa;">Rounds: <span style="color:#fff;font-weight:800;">${rp}</span></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
        <div style="font-size:34px;font-weight:900;color:${cA.s};">${g.scores.a}</div>
        <div style="font-size:34px;font-weight:900;color:${cB.s};">${g.scores.b}</div>
      </div>
      ${[["Bags In Hole",hA,hB],["Bags On Board",bA,bB],["Overall Bags",hA+bA,hB+bB],["Avg PPR",rp?(g.scores.a/rp).toFixed(2):"0.00",rp?(g.scores.b/rp).toFixed(2):"0.00"]].map(([lbl,a,b])=>{
        const tot=(Number(a)+Number(b))||1,pct=Math.round(Number(a)/tot*100);
        return`<div style="background:#1a1a1a;border-radius:11px;padding:9px 13px;margin-bottom:7px;border:1px solid #222;">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px;font-weight:700;"><span style="color:${cA.s};">${a}</span><span style="color:#555;font-size:11px;text-transform:uppercase;letter-spacing:1px;">${lbl}</span><span style="color:${cB.s};">${b}</span></div>
          <div style="display:flex;border-radius:5px;overflow:hidden;height:6px;"><div style="width:${pct}%;background:${cA.s};transition:width .4s;"></div><div style="width:${100-pct}%;background:${cB.s};"></div></div>
        </div>`;
      }).join("")}
      <button onclick="skCloseStats()" style="width:100%;padding:12px 0;border-radius:11px;margin-top:5px;background:#1a1a1a;border:1px solid #333;color:#fff;font-size:14px;font-weight:700;cursor:pointer;">Fermer</button>
    </div>
  </div>`;
}

      <div style="font-size:46px;font-weight:900;color:${cc};letter-spacing:2px;text-shadow:0 0 40px ${cc}77;animation:tsh .6s ease-in-out;line-height:1;margin-bottom:12px;">${name}</div>
      <div style="display:flex;justify-content:center;gap:16px;margin-bottom:18px;">
        <div style="text-align:center;"><div style="font-size:40px;font-weight:900;color:#e63946;">${g.scores.a}</div><div style="font-size:9px;color:#e63946;opacity:.6;letter-spacing:2px;">${c.teamA.name.toUpperCase().slice(0,10)}</div></div>
        <div style="font-size:24px;color:#333;font-weight:900;align-self:center;">–</div>
        <div style="text-align:center;"><div style="font-size:40px;font-weight:900;color:#1d6fa4;">${g.scores.b}</div><div style="font-size:9px;color:#1d6fa4;opacity:.6;letter-spacing:2px;">${c.teamB.name.toUpperCase().slice(0,10)}</div></div>

      <button onclick="skReset()" style="width:100%;padding:13px 0;border-radius:13px;background:linear-gradient(135deg,#f4a100,#f77f00);border:none;color:#000;font-size:18px;font-weight:900;cursor:pointer;letter-spacing:1px;box-shadow:0 6px 24px rgba(244,161,0,.4);margin-bottom:8px;">🎮 Nouvelle Partie</button>
      <button onclick="renderSKSetup()" style="width:100%;padding:11px 0;border-radius:11px;background:#1a1a1a;border:1px solid #333;color:#aaa;font-size:14px;font-weight:700;cursor:pointer;">◀ Retour au Menu</button>
    </div>
  </div>`;
}

function renderSKTie(){

    <div style="background:#111;border-radius:24px;padding:28px 22px;width:100%;max-width:400px;text-align:center;border:1px solid #2a2a2a;">
      <div style="font-size:52px;margin-bottom:8px;">🤝</div>
      <div style="font-size:32px;font-weight:900;letter-spacing:2px;margin-bottom:16px;">ÉGALITÉ !</div>
      <div style="font-size:22px;color:#aaa;margin-bottom:20px;">${sk.game.scores.a} – ${sk.game.scores.b}</div>
      <button onclick="skUndo()" style="width:100%;padding:12px 0;border-radius:11px;background:#1a1a1a;border:1px solid #333;color:#aaa;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:9px;">↩ Undo Last Round</button>
      <button onclick="skReset()" style="width:100%;padding:13px 0;border-radius:13px;background:linear-gradient(135deg,#f4a100,#f77f00);border:none;color:#000;font-size:17px;font-weight:900;cursor:pointer;letter-spacing:1px;margin-bottom:9px;">🎮 Nouvelle Partie</button>
      <button onclick="renderSKSetup()" style="width:100%;padding:12px 0;border-radius:11px;background:#1a1a1a;border:1px solid #333;color:#aaa;font-size:14px;font-weight:700;cursor:pointer;">◀ Retour au Menu</button>
    </div>
  </div>`;
}

window.setSKEntry=(key,type,val)=>{
  sk.game.entry[key][type]=sk.game.entry[key][type]===val?0:val;
  renderSKGame();
};
window.skOpenScore=()=>{sk.showScore=true;renderSKGame();};
window.skCloseScore=()=>{sk.showScore=false;sk.game.entry={a:{hole:0,board:0},b:{hole:0,board:0}};renderSKGame();};
window.skShowStats=()=>{sk.showStats=true;renderSKGame();};
window.skCloseStats=()=>{sk.showStats=false;renderSKGame();};
window.skUndo=()=>{if(!sk.game.history.length)return;const l=sk.game.history[sk.game.history.length-1];sk.game.scores=l.before;sk.game.round=l.round;sk.game.history=sk.game.history.slice(0,-1);sk.game.winner=null;renderSKGame();};
window.skReset=()=>{sk.game={scores:{a:0,b:0},round:1,history:[],winner:null,entry:{a:{hole:0,board:0},b:{hole:0,board:0}}};sk.showScore=false;renderSKGame();};
window.skSaveRound=()=>{
  const c=sk.cfg,g=sk.game;
  const pts=calcPts(g.entry,c.cancellation);
  const ghost=GHOST_PRESET();
  let gPts=0;
  if(c.ghostMode){gPts=Math.floor(Math.random()*(ghost.max-ghost.min+1))+ghost.min;gPts=Math.min(gPts,12);}
  let nA=g.scores.a+pts.a,nB=c.ghostMode?g.scores.b+gPts:g.scores.b+pts.b;
  if(c.gameMode==="bust"){if(nA>c.winScore)nA=15;if(nB>c.winScore)nB=15;}
  const hist=[...g.history,{round:g.round,entry:{...g.entry},pts:{a:pts.a,b:c.ghostMode?gPts:pts.b},before:{...g.scores}}];
  const nRound=g.round+1;
  let winner=null;
  if(c.useWinScore){if(nA>=c.winScore&&nA>nB)winner="a";else if(nB>=c.winScore&&nB>nA)winner="b";else if(nA>=c.winScore&&nB>=c.winScore)winner=nA>=nB?"a":"b";}
  if(!winner&&c.useMaxRounds&&nRound>c.maxRounds+1){if(nA>nB)winner="a";else if(nB>nA)winner="b";else winner="tie";}
  sk.game={...g,scores:{a:nA,b:nB},round:nRound,history:hist,winner,entry:{a:{hole:0,board:0},b:{hole:0,board:0}}};
  sk.showScore=false;
  if(winner&&winner!=="tie"){sk.allGames.push({date:new Date().toLocaleDateString("fr-FR"),nA:c.teamA.name,nB:c.teamB.name,sA:nA,sB:nB,winner:winner==="a"?c.teamA.name:c.teamB.name,rounds:hist.length});}
  renderSKGame();
  // Animer les scores via flip
  setTimeout(()=>{
    if(pts.a>0||c.ghostMode) flipTo("sk-a", nA);
    if(pts.b>0||c.ghostMode) flipTo("sk-b", nB);
  }, 30);
};

// ════════════════════════════════════════
function renderSetupTournoi(){
  $("root").innerHTML=`
    <div style="padding:18px 18px 0;display:flex;align-items:center;gap:10px;margin-bottom:18px;">
      ${backBtn("renderHome")}
      <div><div style="font-size:10px;letter-spacing:3px;color:#555;">MODE</div><div style="font-size:22px;font-weight:900;">TOURNOI LIVE</div></div>
    </div>
    <div style="padding:0 18px;">
      <div style="background:#111;border-radius:14px;padding:18px;border:1px solid #1e1e1e;">
        <div style="font-size:10px;letter-spacing:2px;color:#555;margin-bottom:10px;">NOUVEAU TOURNOI</div>
        <input id="tNom" placeholder="Nom du tournoi" style="width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:9px;padding:12px;color:#fff;font-size:17px;font-weight:700;box-sizing:border-box;margin-bottom:12px;"/>
        <button onclick="creerTournoi()" style="width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#f4a100,#f77f00);border:none;color:#000;font-size:18px;font-weight:900;cursor:pointer;letter-spacing:1px;">🏆 Créer le Tournoi</button>
      </div>
    </div>`;
}

window.creerTournoi=async()=>{
  const nom=$("tNom").value.trim()||"Tournoi Cornhole";
  const id=uid();
  await set(ref(db,`tournois/${id}`),{nom,format:"tournoi",cree:Date.now(),statut:"en_cours",matchs:{}});
  tournoiId=id;localStorage.setItem("cornhole_admin_id",id);loadTournoi();
};

function loadTournoi(){
  onValue(ref(db,`tournois/${tournoiId}`),snap=>{
    if(!snap.exists()){tournoiId=null;localStorage.removeItem("cornhole_admin_id");renderHome();return;}
    tournoi=snap.val();renderTournoi();
    // Animer les scores Firebase via flip
    if(tournoi.matchs){
      Object.entries(tournoi.matchs).forEach(([id,m])=>{
        setTimeout(()=>{
          flipTo(`t-${id}-a`, m.scoreA||0);
          flipTo(`t-${id}-b`, m.scoreB||0);
        }, 50);
      });
    }
  });
}

function renderTournoi(){
  const matchs=tournoi.matchs?Object.entries(tournoi.matchs):[];
  const enCours=matchs.filter(([,m])=>m.statut!=="termine");
  const termines=matchs.filter(([,m])=>m.statut==="termine");
  $("root").innerHTML=`
    <div style="padding:18px 18px 0;display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      ${backBtn("renderHome")}
      <div style="flex:1;"><div style="font-size:10px;letter-spacing:2px;color:#f4a100;">TOURNOI EN COURS</div><div style="font-size:20px;font-weight:900;">${tournoi.nom}</div></div>
    </div>
    <div style="padding:0 18px;">
      <div style="display:flex;gap:8px;margin-bottom:14px;">
        <a href="cornhole-scoreboard.html?t=${tournoiId}" target="_blank" style="flex:1;display:block;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:11px;padding:10px;text-align:center;text-decoration:none;"><div style="font-size:18px;">📺</div><div style="font-size:11px;color:#aaa;font-weight:700;letter-spacing:1px;">SCOREBOARD</div></a>
        <a href="cornhole-classement.html?t=${tournoiId}" target="_blank" style="flex:1;display:block;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:11px;padding:10px;text-align:center;text-decoration:none;"><div style="font-size:18px;">🏆</div><div style="font-size:11px;color:#aaa;font-weight:700;letter-spacing:1px;">CLASSEMENT</div></a>
        <div onclick="nouveauTournoi()" style="flex:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:11px;padding:10px;text-align:center;cursor:pointer;"><div style="font-size:18px;">➕</div><div style="font-size:11px;color:#aaa;font-weight:700;letter-spacing:1px;">NOUVEAU</div></div>
      </div>
      <div style="background:#111;border-radius:14px;padding:16px;border:1px solid #1e1e1e;margin-bottom:14px;">
        <div style="font-size:10px;letter-spacing:2px;color:#555;margin-bottom:10px;">NOUVEAU MATCH</div>
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <input id="tNomA" placeholder="Équipe A" style="flex:1;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:10px;color:#fff;font-size:14px;font-weight:700;"/>
          <input id="tNomB" placeholder="Équipe B" style="flex:1;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:10px;color:#fff;font-size:14px;font-weight:700;"/>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:10px;">
          <select id="tTerrain" style="flex:1;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:10px;color:#aaa;font-size:13px;"><option value="">Terrain (optionnel)</option>${[1,2,3,4,5,6,7,8].map(n=>`<option>Terrain ${n}</option>`).join("")}</select>
          <select id="tWin" style="flex:1;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:10px;color:#aaa;font-size:13px;"><option value="21">21 pts</option><option value="15">15 pts</option><option value="11">11 pts</option></select>
        </div>
        <button onclick="ajouterMatchTournoi()" style="width:100%;padding:12px;border-radius:11px;background:linear-gradient(135deg,#f4a100,#f77f00);border:none;color:#000;font-size:16px;font-weight:900;cursor:pointer;letter-spacing:1px;">+ Créer le Match & QR Codes</button>
      </div>
      <div style="font-size:10px;letter-spacing:2px;color:#555;margin-bottom:8px;">EN COURS (${enCours.length})</div>
      ${enCours.length===0?`<div style="text-align:center;color:#2a2a2a;padding:20px;font-size:14px;">Aucun match en cours</div>`:""}
      <div id="matchs-tournoi">${enCours.map(([id,m])=>renderCarteTournoi(id,m)).join("")}</div>
      ${termines.length?`<div style="margin-top:14px;"><div style="font-size:10px;letter-spacing:2px;color:#555;margin-bottom:8px;">TERMINÉS (${termines.length})</div>${termines.map(([id,m])=>`<div style="background:#0d0d0d;border-radius:11px;padding:12px;margin-bottom:8px;border:1px solid #151515;opacity:.75;"><div style="display:flex;justify-content:space-between;align-items:center;"><div><div style="font-size:14px;font-weight:700;">${m.equipeA} vs ${m.equipeB}</div><div style="font-size:11px;color:#f4a100;margin-top:2px;">🏆 ${(m.scoreA||0)>=(m.winScore||21)?m.equipeA:m.equipeB}</div></div><div><span style="font-size:22px;font-weight:900;color:#e63946;">${m.scoreA||0}</span><span style="color:#333;margin:0 4px;">–</span><span style="font-size:22px;font-weight:900;color:#1d6fa4;">${m.scoreB||0}</span></div></div></div>`).join("")}</div>`:""}
    </div>`;
  enCours.forEach(([id])=>{genQR(`qr-a-${id}`,`${baseUrl()}cornhole-equipe.html?t=${tournoiId}&m=${id}&e=a`);genQR(`qr-b-${id}`,`${baseUrl()}cornhole-equipe.html?t=${tournoiId}&m=${id}&e=b`);});
}

function renderCarteTournoi(id,m){
  const mc=m.manche_courante;
  const sA=mc?.sacs_A?.soumis,sB=mc?.sacs_B?.soumis;
  return`<div style="background:#111;border-radius:13px;padding:14px;margin-bottom:10px;border:1px solid #1e1e1e;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div><div style="font-size:15px;font-weight:900;">${m.equipeA} <span style="color:#444;">vs</span> ${m.equipeB}</div>${m.terrain?`<div style="font-size:11px;color:#444;">${m.terrain} · ${m.winScore||21}pts · M${m.round||1}</div>`:""}</div>
      <div style="display:flex;align-items:center;gap:6px;">
        ${flipHTML(m.scoreA||0,"#e63946",44,`t-${id}-a`)}
        <span style="color:#333;font-size:18px;font-weight:900;">–</span>
        ${flipHTML(m.scoreB||0,"#1d6fa4",44,`t-${id}-b`)}
      </div>
    </div>
    <div style="background:#0a0a0a;border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:11px;">
      <div style="display:flex;justify-content:space-between;color:#444;margin-bottom:4px;"><span>Manche ${m.round||1}</span><span style="color:${sA&&sB?"#2e7d32":"#f4a100"};">${sA&&sB?"En attente de validation":"Saisie en cours..."}</span></div>
      <div style="display:flex;gap:6px;">
        <div style="flex:1;text-align:center;padding:4px;background:#111;border-radius:6px;"><div style="font-size:9px;color:#444;margin-bottom:1px;">${m.equipeA}</div><div style="font-size:12px;font-weight:700;color:${sA?"#fff":"#333"};">${sA?"✓ Soumis":"En attente"}</div>${mc?.confirmation_A!=null?`<div style="font-size:10px;color:${mc.confirmation_A?"#2e7d32":"#e63946"};">${mc.confirmation_A?"✅":"❌"}</div>`:""}</div>
        <div style="flex:1;text-align:center;padding:4px;background:#111;border-radius:6px;"><div style="font-size:9px;color:#444;margin-bottom:1px;">${m.equipeB}</div><div style="font-size:12px;font-weight:700;color:${sB?"#fff":"#333"};">${sB?"✓ Soumis":"En attente"}</div>${mc?.confirmation_B!=null?`<div style="font-size:10px;color:${mc.confirmation_B?"#2e7d32":"#e63946"};">${mc.confirmation_B?"✅":"❌"}</div>`:""}</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <div style="flex:1;background:#0a0a0a;border-radius:10px;padding:10px;text-align:center;border:1px solid #1a1a1a;"><div style="font-size:10px;color:#e63946;letter-spacing:1px;margin-bottom:6px;font-weight:700;">${m.equipeA}</div><div id="qr-a-${id}" style="display:flex;justify-content:center;"></div><div style="font-size:9px;color:#333;margin-top:4px;">Scanner pour jouer</div></div>
      <div style="flex:1;background:#0a0a0a;border-radius:10px;padding:10px;text-align:center;border:1px solid #1a1a1a;"><div style="font-size:10px;color:#1d6fa4;letter-spacing:1px;margin-bottom:6px;font-weight:700;">${m.equipeB}</div><div id="qr-b-${id}" style="display:flex;justify-content:center;"></div><div style="font-size:9px;color:#333;margin-top:4px;">Scanner pour jouer</div></div>
    </div>
    <div style="display:flex;gap:6px;">
      <button onclick="terminerMatchTournoi('${id}')" style="flex:1;padding:8px;border-radius:8px;background:#1a1a1a;border:1px solid #2a2a2a;color:#e63946;font-size:12px;font-weight:700;cursor:pointer;">✓ Terminer</button>
      <button onclick="supprimerMatchTournoi('${id}')" style="padding:8px 14px;border-radius:8px;background:#1a1a1a;border:1px solid #2a2a2a;color:#555;font-size:12px;cursor:pointer;">🗑</button>
    </div>
  </div>`;
}

function genQR(cId,url){const c=document.getElementById(cId);if(!c||c.childNodes.length>0)return;new QRCode(c,{text:url,width:90,height:90,colorDark:"#ffffff",colorLight:"#0a0a0a"});}
window.ajouterMatchTournoi=async()=>{
  const nomA=$("tNomA").value.trim(),nomB=$("tNomB").value.trim();
  if(!nomA||!nomB){alert("Entre les deux noms !");return;}
  const mr=push(ref(db,`tournois/${tournoiId}/matchs`));
  await set(mr,{equipeA:nomA,equipeB:nomB,scoreA:0,scoreB:0,winScore:parseInt($("tWin").value)||21,terrain:$("tTerrain").value,round:1,statut:"en_cours",cree:Date.now(),manche_courante:null});
  $("tNomA").value="";$("tNomB").value="";
};
window.terminerMatchTournoi=async(id)=>{if(!confirm("Terminer ce match ?"))return;await update(ref(db,`tournois/${tournoiId}/matchs/${id}`),{statut:"termine"});};
window.supprimerMatchTournoi=async(id)=>{if(!confirm("Supprimer ce match ?"))return;await remove(ref(db,`tournois/${tournoiId}/matchs/${id}`));};
window.nouveauTournoi=()=>{if(!confirm("Créer un nouveau tournoi ?"))return;tournoiId=null;localStorage.removeItem("cornhole_admin_id");renderSetupTournoi();};

// ── Init ──
renderHome();
</script>
