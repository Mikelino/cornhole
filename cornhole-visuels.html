<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cornhole — Visuels par page</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Oswald:wght@500;600;700&family=Stardos+Stencil:wght@400;700&family=Yellowtail&family=Libre+Franklin:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="redesign-styles.css" />

  <style>
    /* artboard caption */
    .ab-cap {
      background: #1d2944;
      color: #f7eedb;
      padding: 14px 18px;
      border-bottom: 3px double #caa047;
      display: flex; align-items: center; gap: 14px;
    }
    .ab-cap .n {
      font-family: "Alfa Slab One", serif;
      font-size: 40px; color: #e8654b;
      line-height: 0.9;
    }
    .ab-cap .label-stack { display: flex; flex-direction: column; gap: 4px; line-height: 1; }
    .ab-cap .eb {
      font-family: "Yellowtail", cursive;
      font-size: 18px; color: #caa047; line-height: 1;
    }
    .ab-cap .t {
      font-family: "Alfa Slab One", serif;
      font-size: 22px; text-transform: uppercase;
      letter-spacing: 0.02em; line-height: 1;
    }
    .ab-cap .d {
      font-family: "Libre Franklin", sans-serif;
      font-size: 12px; color: rgba(247,238,219,0.65);
      margin-left: auto; max-width: 480px; text-align: right; line-height: 1.4;
    }
    .ab-stage {
      background: #efe6d4;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ab-stage.tv { padding: 0; background: #1d2944; }
  </style>
