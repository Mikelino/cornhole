<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cornhole — Scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Oswald:wght@500;600;700&family=Stardos+Stencil:wght@400;700&family=Yellowtail&family=Libre+Franklin:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="firebase-config.js?v=2"></script>
  <style>
    :root{
      --paper:#f1e4cf;--cream:#f7eedb;
      --ink:#1d2944;--ink-soft:#2c3a58;
      --accent:#e8654b;--gold:#caa047;--gold-deep:#a47f2d;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--ink);color:var(--cream);
      font-family:'Libre Franklin',sans-serif;
      min-height:100vh;overflow:hidden;
    }
    body::after{
      content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
      mix-blend-mode:multiply;opacity:.08;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='7' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16  0 0 0 0 0.10  0 0 0 0 0.04  0 0 0 0.9 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      background-size:220px 220px;
    }
    @keyframes score-pop{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
    @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    @keyframes fade-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse-gold{0%,100%{opacity:.6}50%{opacity:1}}
    .score-anim{animation:score-pop .35s ease}
    .fade-in{animation:fade-in .4s ease forwards}

    /* TV Header */
    .tv-header{
      background:var(--ink);
      border-bottom:3px double var(--gold);
      padding:14px 36px;
      display:flex;align-items:center;justify-content:space-between;
      flex-shrink:0;
    }
    .tv-wordmark{display:flex;align-items:flex-end;gap:10px;}
    .tv-wordmark-script{font-family:'Yellowtail',cursive;font-size:22px;color:var(--gold);line-height:1;}
    .tv-wordmark-title{font-family:'Alfa Slab One',serif;font-size:26px;text-transform:uppercase;letter-spacing:.02em;line-height:1;}
    .tv-event{font-family:'Alfa Slab One',serif;font-size:22px;color:var(--gold);text-transform:uppercase;letter-spacing:.02em;}
    .tv-round-box{background:var(--gold);color:var(--ink);font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;letter-spacing:.18em;padding:5px 13px;border:1.5px solid var(--cream);}

    /* Plank score panels (TV-size) */
    .tv-plank{
      background:var(--ink-soft);border:2px solid var(--cream);
      position:relative;padding:20px 24px;
      display:flex;flex-direction:column;align-items:center;text-align:center;
      overflow:hidden;flex:1;
    }
    .tv-plank::before{content:"";position:absolute;inset:5px;border:1px dashed rgba(202,160,71,.3);pointer-events:none;}
    .tv-plank--lead{background:var(--accent);}
    .tv-plank-team{font-family:'Alfa Slab One',serif;font-size:22px;letter-spacing:.03em;text-transform:uppercase;line-height:1;margin-bottom:6px;}
    .tv-plank-digits{font-family:'Stardos Stencil',sans-serif;line-height:.85;color:var(--cream);text-shadow:3px 3px 0 rgba(0,0,0,.25);}
    .tv-plank-goal{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.14em;opacity:.55;margin-top:4px;}
    .tv-plank-bar{width:90%;height:6px;background:rgba(255,255,255,.15);margin-top:14px;}
    .tv-plank-bar-fill{height:100%;background:var(--gold);transition:width .8s ease;}
    .tv-plank-pennant{
      position:absolute;top:10px;right:-1px;
      background:var(--gold);color:var(--ink);
      font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.14em;
      padding:4px 9px;border:1.5px solid var(--ink);
    }
    /* VS separator */
    .tv-vs{
      font-family:'Alfa Slab One',serif;font-size:52px;color:rgba(247,238,219,.12);
      padding:0 28px;flex-shrink:0;text-align:center;display:flex;
      flex-direction:column;align-items:center;justify-content:center;
    }
    .tv-vs-terrain{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.2em;color:var(--gold);margin-top:8px;}
    .tv-vs-status{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.14em;color:var(--accent);margin-top:6px;animation:pulse-gold 1.4s ease-in-out infinite;}

    /* Grid card */
    .tv-card{
      background:var(--ink-soft);border:2px solid var(--cream);
      padding:20px;display:flex;flex-direction:column;gap:10px;
      position:relative;
    }
    .tv-card::before{content:"";position:absolute;inset:5px;border:1px dashed rgba(202,160,71,.25);pointer-events:none;}

    /* Ticker */
    .tv-ticker{
      height:44px;background:#12193a;border-top:2px solid var(--gold);
      display:flex;align-items:center;overflow:hidden;flex-shrink:0;
    }
    .tv-ticker-label{
      background:var(--gold);color:var(--ink);
      font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.2em;
      padding:0 14px;height:100%;display:flex;align-items:center;flex-shrink:0;
      border-right:2px solid var(--ink);
    }
    .tv-ticker-inner{display:flex;width:max-content;}
    .tv-ticker-item{
      font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.1em;
      color:var(--cream);padding:0 32px;border-right:1px solid rgba(202,160,71,.3);
      flex-shrink:0;display:flex;align-items:center;gap:10px;
    }
  </style>
</head>
<body>
<div id="root" style="min-height:100vh;display:flex;flex-direction:column;"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const app = initializeApp(FIREBASE_CONFIG);
  const db  = getDatabase(app);

  const params    = new URLSearchParams(location.search);
  const tournoiId = params.get("t");
  let   tournoi   = null;
  let   prevScores = {};

  if (!tournoiId) {
    document.getElementById("root").innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;">
        <div style="font-family:'Yellowtail',cursive;font-size:28px;color:var(--gold);">Cornhole</div>
        <div style="font-family:'Alfa Slab One',serif;font-size:20px;letter-spacing:.08em;opacity:.4;">Ajoute ?t=ID_TOURNOI dans l'URL</div>
      </div>`;
  } else {
    onValue(ref(db, `tournois/${tournoiId}`), snap => {
      if (!snap.exists()) return;
      tournoi = snap.val();
      render();
    });
  }

  function render() {
    if (!tournoi) return;
    const matchs = Object.entries(tournoi.matchs || {}).filter(([,m]) => m.statut !== "termine");
    const root = document.getElementById("root");

    if (matchs.length === 0) {
      root.innerHTML = renderIdle();
      return;
    }

    if (matchs.length === 1) {
      root.innerHTML = renderPleinEcran(matchs[0][0], matchs[0][1]);
    } else if (matchs.length <= 4) {
      root.innerHTML = renderGrille(matchs);
    } else {
      root.innerHTML = renderListe(matchs);
    }

    matchs.forEach(([id, m]) => {
      const prev = prevScores[id] || { a: -1, b: -1 };
      if (m.scoreA !== prev.a) animerScore(`score-a-${id}`);
      if (m.scoreB !== prev.b) animerScore(`score-b-${id}`);
      prevScores[id] = { a: m.scoreA||0, b: m.scoreB||0 };
    });

    renderSponsors();
  }

  function animerScore(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove("score-anim");
    void el.offsetWidth;
    el.classList.add("score-anim");
  }

  function tvHeader(nom, extra = "") {
    return `
      <div class="tv-header">
        <div class="tv-wordmark">
          <div class="tv-wordmark-script">Cornhole</div>
          <div class="tv-wordmark-title">Field House</div>
        </div>
        <div class="tv-event">${nom}</div>
        ${extra}
      </div>`;
  }

  // ── 1 match → plein écran ──
  function renderPleinEcran(id, m) {
    const mc = m.manche_courante;
    const saisieEnCours = mc && (!mc.sacs_A?.soumis || !mc.sacs_B?.soumis);
    const attentConf    = mc && mc.sacs_A?.soumis && mc.sacs_B?.soumis &&
                          (mc.confirmation_A == null || mc.confirmation_B == null);

    const scoreA = m.scoreA||0, scoreB = m.scoreB||0, win = m.winScore||21;
    const leadA = scoreA > scoreB, leadB = scoreB > scoreA;

    return `
      <div style="flex:1;display:flex;flex-direction:column;min-height:calc(100vh - 60px);">
        ${tvHeader(tournoi.nom, `<div class="tv-round-box">MANCHE ${m.round||1}</div>`)}

        <div style="flex:1;display:flex;align-items:stretch;padding:32px 48px;gap:0;">
          <!-- Équipe A -->
          <div class="tv-plank ${leadA ? 'tv-plank--lead' : ''}" style="padding:40px 32px;">
            ${leadA ? '<div class="tv-plank-pennant">★ EN TÊTE</div>' : ""}
            <div class="tv-plank-team" style="font-size:28px;">${m.equipeA}</div>
            <div id="score-a-${id}" class="tv-plank-digits" style="font-size:200px;margin:12px 0 8px;">${String(scoreA).padStart(2,"0")}</div>
            <div class="tv-plank-goal">/ ${win} pts</div>
            <div class="tv-plank-bar" style="width:80%;"><div class="tv-plank-bar-fill" style="width:${Math.min((scoreA/win)*100,100)}%;"></div></div>
          </div>

          <!-- VS -->
          <div class="tv-vs">
            VS
            ${m.terrain ? `<div class="tv-vs-terrain">${m.terrain}</div>` : ""}
            ${saisieEnCours ? `<div class="tv-vs-status">⚡ SAISIE</div>` : ""}
            ${attentConf   ? `<div class="tv-vs-status">🔄 VALIDATION</div>` : ""}
          </div>

          <!-- Équipe B -->
          <div class="tv-plank ${leadB ? 'tv-plank--lead' : ''}" style="padding:40px 32px;">
            ${leadB ? '<div class="tv-plank-pennant">★ EN TÊTE</div>' : ""}
            <div class="tv-plank-team" style="font-size:28px;">${m.equipeB}</div>
            <div id="score-b-${id}" class="tv-plank-digits" style="font-size:200px;margin:12px 0 8px;">${String(scoreB).padStart(2,"0")}</div>
            <div class="tv-plank-goal">/ ${win} pts</div>
            <div class="tv-plank-bar" style="width:80%;"><div class="tv-plank-bar-fill" style="width:${Math.min((scoreB/win)*100,100)}%;"></div></div>
          </div>
        </div>

        ${mc && mc.sacs_A?.soumis && mc.sacs_B?.soumis ? `
        <div style="padding:0 48px 24px;display:flex;gap:12px;">
          <div style="flex:1;background:rgba(247,238,219,.06);border:1.5px solid rgba(202,160,71,.3);padding:10px 18px;display:flex;justify-content:space-between;align-items:center;">
            <div style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.14em;opacity:.6;">${m.equipeA} · MANCHE</div>
            <div style="font-family:'Stardos Stencil',sans-serif;font-size:28px;color:var(--gold);">+${(mc.sacs_A?.trou||0)*3+(mc.sacs_A?.plateau||0)}</div>
          </div>
          <div style="flex:1;background:rgba(247,238,219,.06);border:1.5px solid rgba(202,160,71,.3);padding:10px 18px;display:flex;justify-content:space-between;align-items:center;">
            <div style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.14em;opacity:.6;">${m.equipeB} · MANCHE</div>
            <div style="font-family:'Stardos Stencil',sans-serif;font-size:28px;color:var(--gold);">+${(mc.sacs_B?.trou||0)*3+(mc.sacs_B?.plateau||0)}</div>
          </div>
        </div>` : ""}
      </div>`;
  }

  // ── 2-4 matchs → grille ──
  function renderGrille(matchs) {
    const cols = matchs.length <= 2 ? 1 : 2;
    return `
      ${tvHeader(tournoi.nom, `<div style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.2em;color:var(--gold);">${matchs.length} MATCHS</div>`)}
      <div style="flex:1;display:grid;grid-template-columns:repeat(${cols},1fr);gap:16px;padding:20px 28px 20px;">
        ${matchs.map(([id,m]) => renderCarteMatch(id, m)).join("")}
      </div>`;
  }

  function renderCarteMatch(id, m) {
    const mc = m.manche_courante;
    const enSaisie = mc && (!mc.sacs_A?.soumis || !mc.sacs_B?.soumis);
    const scoreA = m.scoreA||0, scoreB = m.scoreB||0, win = m.winScore||21;
    const leadA = scoreA > scoreB, leadB = scoreB > scoreA;

    return `
      <div class="tv-card fade-in">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.2em;color:var(--gold);">${m.terrain ? m.terrain + " · " : ""}MANCHE ${m.round||1}</div>
          ${enSaisie ? `<div style="font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.14em;color:var(--accent);animation:pulse-gold 1.4s ease-in-out infinite;">⚡ SAISIE</div>` : ""}
        </div>

        <div style="display:flex;gap:10px;">
          <!-- Plank A -->
          <div class="tv-plank ${leadA ? 'tv-plank--lead' : ''}" style="padding:14px;">
            ${leadA ? '<div class="tv-plank-pennant" style="font-size:8px;padding:2px 6px;">★</div>' : ""}
            <div class="tv-plank-team" style="font-size:15px;">${m.equipeA}</div>
            <div id="score-a-${id}" class="tv-plank-digits" style="font-size:72px;">${String(scoreA).padStart(2,"0")}</div>
            <div class="tv-plank-bar" style="width:85%;height:4px;margin-top:8px;"><div class="tv-plank-bar-fill" style="width:${Math.min((scoreA/win)*100,100)}%;"></div></div>
          </div>
          <!-- Plank B -->
          <div class="tv-plank ${leadB ? 'tv-plank--lead' : ''}" style="padding:14px;">
            ${leadB ? '<div class="tv-plank-pennant" style="font-size:8px;padding:2px 6px;">★</div>' : ""}
            <div class="tv-plank-team" style="font-size:15px;">${m.equipeB}</div>
            <div id="score-b-${id}" class="tv-plank-digits" style="font-size:72px;">${String(scoreB).padStart(2,"0")}</div>
            <div class="tv-plank-bar" style="width:85%;height:4px;margin-top:8px;"><div class="tv-plank-bar-fill" style="width:${Math.min((scoreB/win)*100,100)}%;"></div></div>
          </div>
        </div>

        <div style="font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.14em;opacity:.4;text-align:center;">/ ${win} pts</div>
      </div>`;
  }

  // ── 5+ matchs → liste compacte ──
  function renderListe(matchs) {
    return `
      ${tvHeader(tournoi.nom, `<div style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.2em;color:var(--gold);">${matchs.length} MATCHS</div>`)}
      <div style="flex:1;padding:20px 36px;display:flex;flex-direction:column;gap:10px;">
        ${matchs.map(([id,m]) => {
          const scoreA = m.scoreA||0, scoreB = m.scoreB||0;
          return `
          <div style="border:1.5px solid rgba(247,238,219,.15);padding:12px 20px;display:flex;align-items:center;gap:16px;" class="fade-in">
            ${m.terrain ? `<div style="font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.2em;color:var(--gold);min-width:80px;">${m.terrain}</div>` : `<div style="min-width:80px;"></div>`}
            <div style="flex:1;font-family:'Alfa Slab One',serif;font-size:17px;text-transform:uppercase;text-align:right;">${m.equipeA}</div>
            <div style="display:flex;gap:12px;align-items:center;flex-shrink:0;">
              <div id="score-a-${id}" style="font-family:'Stardos Stencil',sans-serif;font-size:48px;min-width:60px;text-align:center;">${String(scoreA).padStart(2,"0")}</div>
              <div style="font-family:'Alfa Slab One',serif;font-size:20px;opacity:.2;">—</div>
              <div id="score-b-${id}" style="font-family:'Stardos Stencil',sans-serif;font-size:48px;min-width:60px;text-align:center;">${String(scoreB).padStart(2,"0")}</div>
            </div>
            <div style="flex:1;font-family:'Alfa Slab One',serif;font-size:17px;text-transform:uppercase;">${m.equipeB}</div>
            <div style="font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.18em;color:var(--gold);min-width:40px;text-align:right;">R${m.round||1}</div>
          </div>`;
        }).join("")}
      </div>`;
  }

  function renderIdle() {
    return `
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px;">
        <div style="font-family:'Yellowtail',cursive;font-size:42px;color:var(--gold);">Cornhole</div>
        <div style="font-family:'Alfa Slab One',serif;font-size:26px;text-transform:uppercase;letter-spacing:.04em;">${tournoi.nom}</div>
        <div style="font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.24em;opacity:.4;margin-top:6px;">EN ATTENTE DES MATCHS…</div>
      </div>`;
  }

  function renderSponsors() {
    const sponsors = (tournoi.sponsors || []).filter(s => s.name);
    if (!sponsors.length) return;
    const ticker = document.createElement("div");
    ticker.className = "tv-ticker";
    const label = document.createElement("div");
    label.className = "tv-ticker-label";
    label.textContent = "SPONSORS";
    ticker.appendChild(label);
    const wrap = document.createElement("div");
    wrap.style.cssText = "flex:1;overflow:hidden;";
    const inner = document.createElement("div");
    inner.className = "tv-ticker-inner";
    inner.style.animation = `ticker ${sponsors.length * 5}s linear infinite`;
    [...sponsors, ...sponsors].forEach(s => {
      const item = document.createElement("div");
      item.className = "tv-ticker-item";
      if (s.logo) {
        const img = document.createElement("img");
        img.src = s.logo;
        img.style.cssText = "height:24px;width:auto;object-fit:contain;opacity:.6;";
        item.appendChild(img);
      }
      if (s.name) {
        const span = document.createElement("span");
        span.textContent = s.name;
        item.appendChild(span);
      }
      inner.appendChild(item);
    });
    wrap.appendChild(inner);
    ticker.appendChild(wrap);
    document.getElementById("root").appendChild(ticker);
  }
</script>
</body>
</html>
